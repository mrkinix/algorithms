<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" id="themeColor" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BC Algo">
<link rel="manifest" href="manifest.json">
<title>BC Algorithms</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══ RESET ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;font-size:14px}
body{height:100%;overflow:hidden;font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased}

/* ═══ THEMES ═══ */
:root{
  --bg0:#0d1117;--bg1:#161b22;--bg2:#1c2128;--bg3:#22272e;
  --b1:#30363d;--b2:#444c56;
  --t1:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --acc:#38bdf8;--acc2:#0ea5e9;--accbg:rgba(56,189,248,.1);--accbg2:rgba(56,189,248,.06);
  --green:#4ade80;--greenbg:rgba(74,222,128,.1);
  --red:#f87171;--redbg:rgba(248,113,113,.1);
  --yellow:#fbbf24;--yellowbg:rgba(251,191,36,.1);
  --purple:#a78bfa;--purplebg:rgba(167,139,250,.1);
  --orange:#fb923c;
  --nav-h:56px;--hdr-h:52px;--ctrl-h:64px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --font:'IBM Plex Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
.sepia{
  --bg0:#f4ede3;--bg1:#ede4d8;--bg2:#e6dace;--bg3:#ddd0c4;
  --b1:#c4b49e;--b2:#a89880;
  --t1:#2c1f0e;--t2:#6b5540;--t3:#a8906e;
  --acc:#7c5a2e;--acc2:#9b7040;--accbg:rgba(124,90,46,.1);--accbg2:rgba(124,90,46,.06);
  --green:#2d6a4f;--greenbg:rgba(45,106,79,.1);
  --red:#9b2226;--redbg:rgba(155,34,38,.1);
  --yellow:#996a00;--yellowbg:rgba(153,106,0,.1);
  --purple:#5e3a8c;--purplebg:rgba(94,58,140,.1);
  --orange:#a84a00;
}
.light{
  --bg0:#f6f8fa;--bg1:#ffffff;--bg2:#f0f4f8;--bg3:#e8ecf0;
  --b1:#d0d7de;--b2:#afb8c1;
  --t1:#1f2328;--t2:#57606a;--t3:#8c959f;
  --acc:#0284c7;--acc2:#0369a1;--accbg:rgba(2,132,199,.09);--accbg2:rgba(2,132,199,.05);
  --green:#16a34a;--greenbg:rgba(22,163,74,.09);
  --red:#dc2626;--redbg:rgba(220,38,38,.09);
  --yellow:#d97706;--yellowbg:rgba(217,119,6,.09);
  --purple:#7c3aed;--purplebg:rgba(124,58,237,.09);
  --orange:#ea580c;
}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:4px}

/* ═══ APP SHELL ═══ */
#app{
  display:flex;height:100dvh;overflow:hidden;
  background:var(--bg0);color:var(--t1);
  padding-bottom:calc(var(--nav-h) + var(--safe-b));
  padding-top:var(--safe-t);
}

/* ═══ OVERLAY ═══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none;backdrop-filter:blur(3px)}
.overlay.show{display:block}

/* ═══ SIDEBAR ═══ */
.sidebar{
  width:280px;min-width:280px;background:var(--bg1);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;height:100%;
  transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:400;flex-shrink:0;
}
@media(max-width:768px){
  .sidebar{
    position:fixed;inset:0;width:100vw;max-width:100vw;height:100dvh;
    transform:translateX(-110%);border-right:none;
    padding-bottom:0;
  }
  .sidebar.open{transform:translateX(0)}
}

.sb-top{
  padding:12px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;
  flex-shrink:0;background:var(--bg1);
  padding-top:calc(12px + var(--safe-t));
}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-sq{
  width:26px;height:26px;background:var(--acc);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:600;font-size:13px;color:#0d1117;flex-shrink:0;
}
.logo-txt{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--t1)}
.logo-txt em{color:var(--acc);font-style:normal}
.sb-close{
  margin-left:auto;display:none;width:28px;height:28px;border-radius:6px;
  border:1px solid var(--b1);background:var(--bg2);cursor:pointer;
  align-items:center;justify-content:center;font-size:14px;color:var(--t2);flex-shrink:0;
}
@media(max-width:768px){.sb-close{display:flex}}

.sb-search{padding:10px 12px;border-bottom:1px solid var(--b1);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.search-inp{
  width:100%;background:var(--bg2);border:1px solid var(--b1);
  border-radius:7px;padding:7px 12px 7px 32px;font-size:13px;
  font-family:var(--font);color:var(--t1);outline:none;transition:border-color .15s;
}
.search-inp:focus{border-color:var(--acc)}
.search-inp::placeholder{color:var(--t3)}
.search-wrap{position:relative}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--t3);pointer-events:none}
.sb-actions{display:flex;gap:6px}
.sb-act-btn{
  flex:1;padding:5px 8px;border-radius:6px;border:1px solid var(--b1);
  background:var(--bg2);cursor:pointer;font-size:11px;color:var(--t2);
  font-family:var(--mono);transition:.12s;text-align:center;
}
.sb-act-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--accbg)}

.sb-scroll{flex:1;overflow-y:auto;padding:6px 8px 16px}
.sb-scroll:focus-within .search-inp{border-color:var(--acc)}

.cat-hd{
  display:flex;align-items:center;gap:6px;padding:7px 10px;
  border-radius:7px;cursor:pointer;transition:background .1s;user-select:none;
}
.cat-hd:hover{background:var(--bg2)}
.cat-hd-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);flex:1}
.cat-cnt{font-family:var(--mono);font-size:10px;color:var(--t3);background:var(--bg3);
  border:1px solid var(--b1);border-radius:10px;padding:1px 6px}
.cat-open .cat-cnt{color:var(--acc);border-color:var(--b2)}
.cat-arr{font-size:8px;color:var(--t3);transition:transform .2s}
.cat-open .cat-arr{transform:rotate(90deg)}

.alg-list{padding:2px 0 6px 6px}
.alg-item{
  padding:5px 10px;border-radius:6px;cursor:pointer;
  font-size:12.5px;color:var(--t2);transition:.1s;
  display:flex;align-items:center;gap:7px;
}
.alg-item:hover{background:var(--bg2);color:var(--t1)}
.alg-item.sel{background:var(--accbg);color:var(--acc);font-weight:500}
.alg-pip{width:4px;height:4px;border-radius:50%;background:var(--b2);flex-shrink:0;transition:.1s}
.alg-item.sel .alg-pip{background:var(--acc)}

.sb-foot{
  padding:10px 14px;border-top:1px solid var(--b1);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  background:var(--bg1);
}
.sb-foot a{font-size:11px;color:var(--t3);text-decoration:none;display:flex;align-items:center;gap:5px;transition:.1s;flex:1}
.sb-foot a:hover{color:var(--acc)}
.theme-btns{display:flex;gap:4px}
.th-btn{
  width:28px;height:28px;border-radius:6px;border:1px solid var(--b1);
  background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:.1s;color:var(--t2);
}
.th-btn:hover,.th-btn.active{border-color:var(--acc);background:var(--accbg);color:var(--acc)}

/* ═══ MAIN ═══ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;position:relative}

/* ═══ TOPBAR ═══ */
.topbar{
  height:var(--hdr-h);background:var(--bg1);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:10;
}
.menu-btn{
  display:none;width:30px;height:30px;border-radius:7px;border:1px solid var(--b1);
  background:var(--bg2);cursor:pointer;align-items:center;justify-content:center;
  font-size:16px;color:var(--t2);flex-shrink:0;
}
@media(max-width:768px){.menu-btn{display:flex}}
.tb-info{min-width:0;flex:1}
.tb-title{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:10px;color:var(--t3);font-family:var(--mono)}
.tb-placeholder{font-family:var(--mono);font-size:13px;color:var(--t3)}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.complexity-chips{display:flex;gap:6px}
.chip{
  font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;
  border:1px solid var(--b1);background:var(--bg2);color:var(--t2);white-space:nowrap;
}
.chip.time{border-color:rgba(56,189,248,.3);color:var(--acc);background:var(--accbg2)}
.chip.space{border-color:rgba(74,222,128,.3);color:var(--green);background:var(--greenbg)}

/* ═══ CONTENT AREA ═══ */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}

/* ═══ TAB PANELS ═══ */
.tab-panel{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;padding-bottom:4px;display:none}
.tab-panel.active{display:flex;flex-direction:column;gap:12px}

/* ═══ EMPTY STATE ═══ */
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:.25;pointer-events:none}
.empty-glyph{font-size:48px;font-family:var(--mono);color:var(--t3)}
.empty-text{font-family:var(--mono);font-size:15px;color:var(--t3);text-align:center;line-height:1.6}

/* ═══ CANVAS AREA ═══ */
.cvs-outer{
  background:var(--bg1);border:1px solid var(--b1);border-radius:10px;
  overflow:hidden;flex-shrink:0;position:relative;min-height:200px;
}
.cvs-label{
  position:absolute;top:8px;left:12px;right:12px;display:flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:10px;color:var(--t3);z-index:2;pointer-events:none;
}
.cvs-stat{
  position:absolute;bottom:8px;left:12px;right:12px;display:flex;align-items:center;gap:12px;
  font-family:var(--mono);font-size:10px;color:var(--t3);z-index:2;pointer-events:none;
}
.cvs-stat-item{display:flex;align-items:center;gap:4px}
.cvs-stat-val{color:var(--acc)}
canvas{width:100%;display:block}

/* ═══ PARAMS PANEL ═══ */
.params-row{
  background:var(--bg1);border:1px solid var(--b1);border-radius:10px;
  padding:12px 14px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;
}
.param-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.param-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);font-family:var(--mono);white-space:nowrap}
.param-select{
  background:var(--bg2);border:1px solid var(--b1);border-radius:6px;
  padding:4px 8px;font-size:12px;color:var(--t1);font-family:var(--mono);
  outline:none;cursor:pointer;transition:.12s;
}
.param-select:focus{border-color:var(--acc)}
.param-range{display:flex;align-items:center;gap:6px}
.param-range input[type=range]{accent-color:var(--acc);width:80px}
.param-val{font-family:var(--mono);font-size:11px;color:var(--acc);min-width:24px}
.param-toggle{display:flex;gap:4px}
.ptog{
  padding:3px 10px;border-radius:5px;border:1px solid var(--b1);
  background:var(--bg2);cursor:pointer;font-size:11px;color:var(--t2);
  font-family:var(--mono);transition:.1s;
}
.ptog:hover{border-color:var(--acc);color:var(--acc)}
.ptog.on{background:var(--accbg);border-color:var(--acc);color:var(--acc)}

/* ═══ MEDIA CONTROLS ═══ */
.media-controls{
  position:fixed;bottom:calc(var(--nav-h) + var(--safe-b));left:0;right:0;
  height:var(--ctrl-h);background:var(--bg1);border-top:1px solid var(--b1);
  display:flex;align-items:center;padding:0 14px;gap:10px;z-index:50;
}
.mc-btn{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--b1);
  background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--t2);transition:.12s;flex-shrink:0;
}
.mc-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--accbg)}
.mc-btn:disabled{opacity:.3;cursor:not-allowed}
.mc-play{
  width:40px;height:40px;border-radius:10px;border:none;
  background:var(--acc);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#0d1117;transition:.12s;flex-shrink:0;
}
.mc-play:hover{background:var(--acc2);transform:scale(1.05)}
.mc-play.active{background:var(--bg2);border:1px solid var(--b1);color:var(--acc)}
.mc-speed{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.mc-speed-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:var(--mono);white-space:nowrap}
.mc-speed input[type=range]{flex:1;accent-color:var(--acc);min-width:0}
.mc-step-info{font-family:var(--mono);font-size:10px;color:var(--t3);white-space:nowrap}
.mc-step-info span{color:var(--acc)}
.mc-restart{
  width:28px;height:28px;border-radius:7px;border:1px solid var(--b1);
  background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--t3);transition:.12s;flex-shrink:0;
}
.mc-restart:hover{border-color:var(--red);color:var(--red);background:var(--redbg)}

/* ═══ BOTTOM TABS ═══ */
.bottom-tabs{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:var(--bg1);border-top:1px solid var(--b1);
  display:flex;align-items:stretch;z-index:100;
}
.btab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;cursor:pointer;color:var(--t3);
  transition:.12s;padding:6px 4px;font-family:var(--mono);
  border-top:2px solid transparent;
}
.btab.on{color:var(--acc);border-top-color:var(--acc)}
.btab-ico{font-size:17px;line-height:1}
.btab-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* ═══ ELI5 TAB ═══ */
.eli5-panel{padding:14px;overflow-y:auto;gap:14px}
.eli5-body{
  font-size:14px;line-height:1.75;color:var(--t2);
  background:var(--bg2);border-radius:8px;padding:14px;
  border-left:3px solid var(--acc);
}
.eli5-section-title{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:10px;font-family:var(--mono);
}
.eli5-section-title.g{color:var(--green)}.eli5-section-title.r{color:var(--red)}.eli5-section-title.b{color:var(--acc)}
.eli5-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.eli5-list li{font-size:13px;color:var(--t2);line-height:1.5;padding-left:14px;position:relative}
.eli5-list li::before{content:'';position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%}
.eli5-list.g li::before{background:var(--green)}
.eli5-list.r li::before{background:var(--red)}
.eli5-list.b li::before{background:var(--acc)}
.eli5-avoid{margin-top:12px;font-size:12px;color:var(--t3);padding:8px 10px;background:var(--redbg);border-radius:6px;border:1px solid var(--b1)}
.eli5-avoid strong{color:var(--red)}
.eli5-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:600px){.eli5-grid{grid-template-columns:1fr}}
.eli5-col{background:var(--bg1);border:1px solid var(--b1);border-radius:8px;padding:14px}

/* ═══ CODE TAB ═══ */
.code-hdr{
  background:#161614;border:1px solid #30302e;border-bottom:none;
  border-radius:9px 9px 0 0;padding:8px 14px;display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.code-dots{display:flex;gap:5px}
.code-dots span{width:11px;height:11px;border-radius:50%;display:block}
.code-fn{font-family:var(--mono);font-size:11px;color:#6e6e6a;margin-left:auto}
.code-body{
  background:#1e1e1c;border:1px solid #30302e;border-top:none;
  border-radius:0 0 9px 9px;overflow:auto;flex:1;
}
.code-body pre{
  font-family:var(--mono);font-size:12.5px;line-height:1.7;
  white-space:pre;color:#f8f8f2;padding:16px 18px;
  tab-size:4;min-width:0;
}

/* ═══ LEGEND ═══ */
.legend{display:flex;flex-wrap:wrap;gap:8px;flex-shrink:0}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);font-family:var(--mono)}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ═══ UTILS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .18s ease both}

/* ═══ MOBILE adjustments ═══ */
@media(max-width:768px){
  .content{padding-bottom:0}
  .tab-panel{padding:10px;padding-bottom:2px}
}
</style>
</head>
<body>
<div id="app">
  <div class="overlay" :class="{show:drawerOpen}" @click="drawerOpen=false"></div>

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar" :class="{open:drawerOpen}" ref="sidebarEl">
    <div class="sb-top">
      <a class="logo" href="#">
        <div class="logo-sq">B</div>
        <div class="logo-txt">BC<em>Algo</em></div>
      </a>
      <button class="sb-close" @click="drawerOpen=false">✕</button>
    </div>

    <div class="sb-search">
      <div class="search-wrap">
        <span class="search-ico">⌕</span>
        <input class="search-inp" ref="searchInp" v-model="q" placeholder="Search algorithms…" @input="onSearch">
      </div>
      <div class="sb-actions">
        <button class="sb-act-btn" @click="expandAll">Expand All</button>
        <button class="sb-act-btn" @click="collapseAll">Collapse All</button>
      </div>
    </div>

    <div class="sb-scroll" ref="sbScroll" @scroll="onSbScroll">
      <div v-for="(algs,cat) in filtered" :key="cat" style="margin-bottom:2px">
        <div class="cat-hd" :class="{'cat-open':ex[cat]}" @click="toggleCat(cat)">
          <span class="cat-arr">▶</span>
          <span class="cat-hd-name">{{ cat }}</span>
          <span class="cat-cnt">{{ algs.length }}</span>
        </div>
        <div class="alg-list" v-if="ex[cat]">
          <div v-for="a in algs" :key="a"
            class="alg-item" :class="{sel:selAlg===a}"
            @click="pick(cat,a)">
            <span class="alg-pip"></span>
            <span>{{ fmt(a) }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="sb-foot">
      <a href="https://github.com/mrkinix/algorithms/tree/main" target="_blank">

<script>

// ═══════════════════════════════════════════════

const ALGS = {

  'Bit Manipulation':['add_bitwise_operator','binary_gap','count_ones','find_difference','find_missing_number','flip_bit_longest_sequence','gray_code','has_alternative_bit','power_of_two','reverse_bits','single_number','single_number2','swap_pair'],

  'Queue':['max_sliding_window','moving_average','reconstruct_queue'],
  'Searching':['binary_search','exponential_search','find_min_rotate','first_occurrence','interpolation_search','jump_search','last_occurrence','linear_search','next_greatest_letter','search_insert','search_range','search_rotate','ternary_search','two_sum'],

  'Tree':['binary_tree_paths','bst_height','bst_is_bst','bst_kth_smallest','bst_lowest_common_ancestor','invert_tree','is_balanced','is_subtree','is_symmetric','lowest_common_ancestor','max_height','max_path_sum','path_sum','same_tree','traversal_inorder','traversal_level_order','traversal_postorder','traversal_preorder','traversal_zigzag']
};

// ═══════════════════════════════════════════════
// ELI5 DATABASE  
// ═══════════════════════════════════════════════
const ELI5_DB = {
  'Sorting:bubble_sort':{eli5:"Walk through the list again and again, swapping adjacent elements if they're in the wrong order. Large values 'bubble up' to the end like air bubbles rising in water. Repeat until a full pass makes zero swaps.",pros:['Simple to code from memory','No extra memory needed','Stable — equal elements keep their original order'],cons:['O(n²) — extremely slow on large data','Makes many redundant comparisons','Never used in production code'],uses:['Teaching sorting fundamentals','Tiny arrays (< 20 items)'],avoid:'Any real-world application with more than ~50 items',time:'O(n²)',space:'O(1)',desc:'Repeatedly compares adjacent elements, swapping when out of order. Terminates when a full pass yields no swaps.'},
  'Sorting:insertion_sort':{eli5:"Like organizing playing cards in your hand: hold a sorted left portion, take one new card from the right, slide it left until it finds its spot among the sorted cards. Repeat until all cards are sorted.",pros:['Fast on nearly-sorted data','Stable sort','Extremely low overhead — great for small n','Adaptive: O(n) best case'],cons:['O(n²) average/worst on random data','Lots of element shifting'],uses:['Small arrays (< 30 items)','Nearly-sorted streams','Used inside Timsort for small runs'],avoid:'Large random datasets',time:'O(n²)',space:'O(1)',desc:'Builds the sorted array one element at a time, inserting each new element into its correct position within the sorted portion.'},
  'Sorting:selection_sort':{eli5:"Divide the array into sorted and unsorted parts. Repeatedly scan the entire unsorted part, find the minimum, and move it to the end of the sorted part. Like choosing the shortest kid first in a line-up.",pros:['Minimal number of swaps: exactly O(n)','Easy to understand','Works well when writing to memory is costly'],cons:['Always O(n²) comparisons — never adapts to input','Not stable'],uses:['When memory writes are expensive (e.g. flash storage)','Tiny arrays'],avoid:'Any performance-sensitive scenario',time:'O(n²)',space:'O(1)',desc:'Divides the array into sorted/unsorted portions; repeatedly extracts the minimum from unsorted and appends to sorted.'},
  'Sorting:quick_sort':{eli5:"Pick a pivot element. Partition: put everything smaller to its left, everything larger to its right. Pivot is now in its final position! Recursively do the same to both halves. Conquer by dividing!",pros:['Fastest in practice — O(n log n) average','In-place: O(log n) stack space','Cache-friendly memory access pattern'],cons:['Worst case O(n²) with bad pivot selection','Not stable','Stack overflow risk on deeply unbalanced partitions'],uses:["Most languages' built-in sort (or variant)","General-purpose sorting of large in-memory data"],avoid:'When worst-case guarantee is required',time:'O(n log n)',space:'O(log n)',desc:'Divide-and-conquer: select a pivot, partition array around it, recursively sort each partition.'},
  'Sorting:merge_sort':{eli5:"Split the array exactly in half. Recursively sort each half. Then merge the two sorted halves together, like shuffling two sorted decks of cards — always picking the smaller front card. Guaranteed O(n log n) always.",pros:['Guaranteed O(n log n) — no bad cases','Stable sort','Excellent for external sorting and linked lists'],cons:['Requires O(n) auxiliary memory','Slower constants than quicksort for arrays'],uses:['External sorting (data too large for RAM)','Stable sort requirements','Merge sort is used in Java and Python'],avoid:'Memory-constrained environments',time:'O(n log n)',space:'O(n)',desc:'Divide array in half recursively, sort each half, merge sorted halves using the classic two-pointer merge.'},
  'Sorting:heap_sort':{eli5:"First build a max-heap: a tree where every parent is bigger than its children. Now the root is always the largest element. Swap root to the end, shrink the heap, restore heap property. Repeat until heap is empty.",pros:['Guaranteed O(n log n) — consistent performance','In-place: O(1) extra space','Good worst-case guarantee'],cons:['Not stable','Poor cache behavior due to non-sequential access','Slower than quicksort in practice'],uses:['When O(1) extra space is required','Real-time systems with worst-case guarantees','Used in introspective sort (introsort)'],avoid:'When average-case speed is the priority',time:'O(n log n)',space:'O(1)',desc:'Convert array to max-heap in O(n), then repeatedly extract the max to sort in O(n log n).'},
  'Sorting:shell_sort':{eli5:"Insertion sort, but smarter: start by sorting elements that are far apart (gap = n/2), then progressively shrink the gap. This pre-arranges the array so the final insertion sort (gap=1) is very fast.",pros:['Much faster than O(n²) in practice','In-place sort','Simple to implement'],cons:['Not stable','Time complexity depends on gap sequence (hard to analyze)','Not as fast as O(n log n) algorithms'],uses:['Embedded systems with limited memory','When simplicity and decent speed both matter'],avoid:'When proven O(n log n) is required',time:'O(n log² n)',space:'O(1)',desc:'Generalization of insertion sort. Sorts elements at decreasing gap intervals, making the final pass very efficient.'},
  'Sorting:counting_sort':{eli5:"Don't compare at all! Count how many times each value appears. Use the counts to fill a sorted output array directly. If the value range k is small, this is incredibly fast.",pros:['Linear O(n+k) — fastest possible for integers in range','Stable sort'],cons:['Only works for integers in a known small range','Needs O(k) extra memory — unusable if k >> n'],uses:['Sorting small integers (ages, grades, characters)','Subroutine in radix sort'],avoid:'Floating-point numbers, strings, or huge value ranges',time:'O(n+k)',space:'O(k)',desc:"Count occurrences of each value, compute prefix sums to determine sorted positions, place elements."},
  'Sorting:radix_sort':{eli5:"Sort numbers digit by digit, from the least significant digit to the most significant. Use a stable counting sort for each digit position. After d digit passes, the array is fully sorted!",pros:['O(d·n) — linear for fixed-width integers','Stable sort','Very fast for integers and fixed-length strings'],cons:['Only works for integers or fixed-length data','More complex implementation','d passes needed (d = number of digits)'],uses:['Phone numbers, postal codes, IP addresses','Fixed-width integer arrays in competitive programming'],avoid:'Variable-length data or floating-point numbers',time:'O(d·n)',space:'O(n+k)',desc:'Sorts by processing each digit position from LSD to MSD, using stable counting sort at each pass.'},
  'Sorting:counting_sort':{eli5:"Don't compare at all! Count how many times each value appears. Use prefix sums to place each value directly into its sorted position in the output array.",pros:['O(n+k) linear time','Stable'],cons:['Integer-only, small range k','O(k) memory'],uses:['Small integer ranges','Radix sort subroutine'],avoid:'Large ranges or non-integer data',time:'O(n+k)',space:'O(k)',desc:'Count value frequencies, compute prefix sums, place elements at their correct sorted positions.'},
  'Sorting:bucket_sort':{eli5:"Scatter n numbers into n equal-width buckets based on their value range. Sort each bucket individually (usually with insertion sort). Concatenate all buckets in order.",pros:['O(n) average for uniformly distributed data','Can be parallelized'],cons:['Worst case O(n²) if data clusters in one bucket','Sensitive to data distribution'],uses:['Uniformly distributed floats in [0,1)','Distributed computing scenarios'],avoid:'Skewed or clustered data distributions',time:'O(n+k)',space:'O(n)',desc:'Distribute elements into n buckets, sort each bucket, concatenate.'},
  'Sorting:gnome_sort':{eli5:"Like a gnome sorting flower pots: move forward if current and previous pots are in order. If not, swap them and step back. When you reach the start, step forward again. Slow but simple.",pros:['Extremely simple code (< 10 lines)','Stable sort','In-place'],cons:['O(n²) — very slow in practice','Lots of unnecessary back-tracking'],uses:['Educational purposes only'],avoid:'Any real application',time:'O(n²)',space:'O(1)',desc:'Move forward if sorted, otherwise swap adjacent elements and step back. Repeat until end.'},
  'Sorting:cocktail_shaker_sort':{eli5:"Bubble sort that goes both ways! One pass goes left-to-right (moving max to end), the next goes right-to-left (moving min to start). Both ends get sorted simultaneously — slightly faster than bubble.",pros:['Faster than bubble sort (handles small values at end better)','Stable','Reduces passes for some inputs'],cons:['Still O(n²) overall'],uses:['Educational — shows improvement over bubble sort'],avoid:'Large datasets',time:'O(n²)',space:'O(1)',desc:'Bidirectional bubble sort: one pass pushes max right, next pass pushes min left, alternating.'},
  'Sorting:comb_sort':{eli5:"Bubble sort improved: instead of comparing only adjacent elements, start by comparing elements far apart (gap = n/1.3). Shrink the gap each pass. When gap = 1, it's bubble sort — but the array is almost sorted!",pros:["Significantly faster than bubble sort","Simple modification of bubble sort"],cons:['Not stable','Still O(n²) worst case theoretical'],uses:['When bubble sort is the baseline but more speed needed'],avoid:'Production environments',time:'O(n²)',space:'O(1)',desc:'Improves bubble sort by using a gap > 1 initially (n/1.3), shrinking by factor 1.3 each pass.'},
  'Sorting:cycle_sort':{eli5:"Every element belongs to a 'cycle' — a circular chain of positions. Move each element directly to its correct position, completing one cycle at a time. Theoretically minimizes total writes.",pros:['Minimum possible writes: O(n)','In-place'],cons:['O(n²) comparisons','Complex implementation'],uses:['Flash memory / EEPROM where writes are expensive and limited'],avoid:'General-purpose sorting',time:'O(n²)',space:'O(1)',desc:'Places each element directly in its final position by completing cycles, minimizing total write operations.'},
  'Sorting:pancake_sort':{eli5:"You can only flip a prefix of the array (like flipping a stack of pancakes upside down). Strategy: find the max in unsorted portion, flip it to position 0, then flip it to its final position. Repeat.",pros:['Only uses prefix reversal operations','Interesting theoretical model'],cons:['O(n²) flips','Not practical'],uses:['Theoretical CS','Biological sequence sorting models'],avoid:'Any real sorting task',time:'O(n²)',space:'O(1)',desc:'Sorts using only prefix reversals: repeatedly bring max to front, then flip to final position.'},
  'Sorting:wiggle_sort':{eli5:"Rearrange the array so it alternates: small, big, small, big (nums[0] ≤ nums[1] ≥ nums[2] ≤ nums[3]…). Not a full sort — just ensure the zigzag property holds. One pass!",pros:['O(n) linear time','In-place, O(1) space'],cons:['Not a full sort — just a zigzag arrangement','Limited use cases'],uses:['Interview problems','Specific data visualization','Alternating sequence generation'],avoid:'When full sorted order is needed',time:'O(n)',space:'O(1)',desc:'Single-pass: at each even index ensure element ≤ next; at odd index ensure ≥ next. Swap if violated.'},
  'Sorting:stooge_sort':{eli5:"Recursively sort the first 2/3 of the array, then the last 2/3, then the first 2/3 again. Extremely inefficient — this is essentially a joke algorithm like bogo sort but slightly better.",pros:["It's an interesting recursive algorithm","Has a known time complexity unlike bogo"],cons:['O(n^2.7) — worse than O(n²)','Never use this'],uses:['Theoretical interest only'],avoid:'Everything',time:'O(n^2.7)',space:'O(n)',desc:'Recursively sort first 2/3, last 2/3, first 2/3 again. A deliberately inefficient sorting algorithm.'},
  'Sorting:bogo_sort':{eli5:"Randomly shuffle the entire array. Check if it's sorted. No? Shuffle again. Repeat until lucky. The average case is O(n·n!) — for 10 elements, that's 36 million shuffles on average!",pros:["Simplest possible code","Has a 1/n! chance of sorting instantly"],cons:['Average O(n·n!) — practically infinite time','Entirely randomness-dependent','Might never terminate'],uses:['Teaching what NOT to do','Comedy and thought experiments'],avoid:'Absolutely everything',time:'O(n·n!)',space:'O(1)',desc:'Randomly permutes the array until it happens to be sorted. The worst sorting algorithm ever conceived.'},
  'Searching:binary_search':{eli5:"Search a sorted array by always checking the middle element. If the target is smaller, discard the right half. If larger, discard the left half. Each step eliminates half the remaining elements — like finding a word in a dictionary.",pros:['O(log n) — very fast','Simple and well-understood','Works on any sorted random-access data'],cons:['Requires sorted input','Not suitable for linked lists (no random access)'],uses:['Database indexes','Standard library search functions','Finding boundaries in sorted arrays'],avoid:'Unsorted data',time:'O(log n)',space:'O(1)',desc:'Halves the search space at each step: compare target to midpoint, eliminate left or right half.'},
  'Searching:linear_search':{eli5:"Check each element one by one from start to end. Simple — but must examine every element in the worst case. Like looking for your keys by checking each drawer one at a time.",pros:['Works on ANY data (sorted or unsorted)','No preprocessing needed','Works on linked lists'],cons:['O(n) — slow for large datasets'],uses:['Small unsorted lists','Linked lists','One-off searches where sorting is not worth it'],avoid:'Large datasets or repeated searches on the same data',time:'O(n)',space:'O(1)',desc:'Sequentially checks each element until target found or list exhausted.'},
  'Searching:jump_search':{eli5:"Instead of checking every element, jump ahead in blocks of size √n. When you overshoot the target, go back to the previous block and do a linear scan within it.",pros:['O(√n) — between linear and binary','Works with sequential access (magnetic disks)'],cons:['Requires sorted input','Slower than binary search for random access'],uses:['Sorted data on sequential-access storage','When backward jumps are costly'],avoid:'When random access is available (use binary search)',time:'O(√n)',space:'O(1)',desc:'Jumps ahead by √n steps until overshooting target, then linearly scans backwards within the block.'},
  'Searching:interpolation_search':{eli5:"Like binary search, but instead of always checking the middle, estimate WHERE the target should be based on its value relative to the range. Like opening a dictionary at 'Z' when looking for 'zebra'.",pros:['O(log log n) for uniformly distributed data','Fewer probes than binary search for uniform distributions'],cons:['O(n) worst case if data is non-uniform','Complex formula','Requires sorted uniform data'],uses:['Uniformly distributed sorted arrays','Phone book-style lookups'],avoid:'Non-uniform distributions or small datasets',time:'O(log log n)',space:'O(1)',desc:'Estimates probe position using value interpolation: pos = lo + (target-arr[lo])/(arr[hi]-arr[lo]) * (hi-lo).'},
  'Searching:exponential_search':{eli5:"Start from index 1, keep doubling (1, 2, 4, 8, 16, 32...) until you find a value ≥ target or exceed array bounds. Then run binary search in the last doubling range [prev, current].",pros:['O(log n) — same as binary search','Works on unbounded/infinite sorted arrays','Better than binary search when target is near the start'],cons:['Requires sorted input'],uses:['Unbounded sorted arrays','When the range is not known'],avoid:'Standard fixed-size arrays where binary search works fine',time:'O(log n)',space:'O(1)',desc:'Find range by exponential doubling, then binary search within that range.'},
  'Searching:ternary_search':{eli5:"Like binary search but split into THREE parts instead of two. Compare target against two midpoints (m1 = lo+range/3, m2 = hi-range/3). Target determines which third to recurse on.",pros:['Works on unimodal functions (finding min/max)'],cons:['More comparisons per step than binary search','Not actually faster for sorted arrays'],uses:['Finding minimum/maximum of unimodal functions','Optimization in competitive programming'],avoid:'Standard sorted array searching (binary search is better)',time:'O(log₃ n)',space:'O(1)',desc:'Splits search space into 3 parts using 2 probes, useful for unimodal functions.'},
  'Graph:dijkstra':{eli5:"Find the shortest path from a source to all other nodes. Always expand the nearest unvisited node. When visiting a node, update distances to all its neighbors if we found a shorter route.",pros:['Optimal shortest paths for non-negative weights','O((V+E) log V) with a min-heap'],cons:['Fails with negative edge weights','Memory-intensive for dense graphs'],uses:['GPS navigation','Network routing protocols (OSPF)','Game AI pathfinding'],avoid:'Graphs with negative edge weights (use Bellman-Ford)',time:'O((V+E)log V)',space:'O(V)',desc:"Greedy single-source shortest path: always visit nearest unvisited node, relax all outgoing edges."},
  'Graph:bellman_ford':{eli5:"Relax ALL edges V-1 times. In each relaxation, update distance to a node if a shorter path through another node is found. Unlike Dijkstra, handles negative weights and detects negative cycles.",pros:['Handles negative edge weights','Detects negative cycles','Simpler to implement than Dijkstra'],cons:['O(V·E) — much slower than Dijkstra','Overkill when all weights are non-negative'],uses:['Currency arbitrage detection','Routing with negative costs','Detecting negative cycles in financial graphs'],avoid:'Large graphs with all non-negative weights (use Dijkstra)',time:'O(V·E)',space:'O(V)',desc:'Relax all V-1 edges iteratively. A V-th relaxation that still improves means a negative cycle exists.'},
  'Graph:a_star':{eli5:"Like Dijkstra but guided by a heuristic: f(n) = g(n) + h(n). g(n) is actual cost so far; h(n) is estimated remaining cost to goal. Always expand the node with lowest f(n) first.",pros:['Faster than Dijkstra with a good heuristic','Optimal if heuristic is admissible (never overestimates)'],cons:['Heuristic design is problem-specific','High memory usage in worst case'],uses:['Game pathfinding (most used algorithm in games)','Robot navigation','Puzzle solving (8-puzzle, 15-puzzle)'],avoid:'When no good heuristic exists',time:'O(E)',space:'O(V)',desc:'Best-first search using f(n)=g(n)+h(n). Expands most promising nodes first guided by heuristic.'},
  'Graph:traversal':{eli5:"BFS (Breadth-First): visit neighbors level by level using a queue — explores all nodes at distance d before distance d+1. DFS (Depth-First): dive as deep as possible using a stack before backtracking.",pros:['BFS finds shortest paths in unweighted graphs','DFS uses O(h) memory vs O(w) for BFS','Both find all reachable nodes in O(V+E)'],cons:['Must visit every reachable node','BFS can use a lot of memory for wide graphs'],uses:['BFS: shortest path, web crawling, social network levels','DFS: cycle detection, topological sort, maze solving'],avoid:'Weighted shortest paths (use Dijkstra)',time:'O(V+E)',space:'O(V)',desc:'BFS uses queue for level-order traversal. DFS uses stack (or recursion) for depth-first traversal.'},
  'Graph:cycle_detection':{eli5:"Walk through the graph using DFS, tracking the current recursion path (a 'stack'). If we reach a node that is already in the current path, we found a back edge — a cycle!",pros:['O(V+E) time and space','Works for directed and undirected graphs','Also reveals the cycle path'],cons:['Directed vs undirected requires different handling'],uses:['Dependency cycle detection in build systems','Deadlock detection in OS','Detecting circular references'],avoid:"Trees (they're acyclic by definition)",time:'O(V+E)',space:'O(V)',desc:'DFS with a recursion stack; if we visit a node already in the current path, a cycle is found.'},
  'Graph:kahns_algorithm':{eli5:"Topological sort using in-degrees. Find all nodes with in-degree 0 (no dependencies). Process them: add to result, decrement neighbors' in-degrees. New 0-in-degree nodes go into the queue.",pros:['Intuitive queue-based approach','Also detects cycles (if result has fewer than V nodes)'],cons:['Only for DAGs (directed acyclic graphs)','Multiple valid orderings exist'],uses:['Build systems (make, webpack)','Course prerequisites','Package manager dependency resolution'],avoid:'Graphs with cycles',time:'O(V+E)',space:'O(V)',desc:"Kahn's algorithm: process nodes with in-degree 0, decrement neighbors, add new 0-degree nodes to queue."},
  'Graph:minimum_spanning_tree':{eli5:"Connect all nodes with edges of minimum total weight, without creating any cycles. Kruskal's: sort all edges, greedily add cheapest edges that don't form a cycle. Prim's: grow from a starting node, always add cheapest connection to the tree.",pros:['Guarantees minimum total weight spanning tree'],cons:['Only for connected undirected graphs','Not unique if equal-weight edges exist'],uses:['Network cable layout (minimize cable length)','Power grid design','Cluster analysis in machine learning'],avoid:'Directed graphs or when not all nodes must be connected',time:'O(E log E)',space:'O(V)',desc:"Kruskal's: sort edges, union-find to check cycles. Prim's: grow tree greedily from start node."},
  'Graph:topological_sort_dfs':{eli5:"Run DFS on the graph. When you completely finish processing a node (all its descendants visited), push it onto a stack. When DFS finishes, the stack contains a valid topological order (read from top to bottom).",pros:['Natural recursive DFS approach','O(V+E) time'],cons:['Only for DAGs','Must check for cycles separately'],uses:['Compiler dependency analysis','Task scheduling','Expression evaluation order'],avoid:'Graphs with cycles',time:'O(V+E)',space:'O(V)',desc:'DFS-based topological sort: push node to result stack when fully processed (after all descendants).'},
  'Graph:maximum_flow':{eli5:"Model flow through a network (pipes with capacities). Ford-Fulkerson: find any path from source to sink with available capacity (augmenting path). Push maximum possible flow through it. Repeat until no augmenting path exists.",pros:['Finds maximum possible flow through network','Correct and complete'],cons:['Ford-Fulkerson: O(E·max_flow) — slow for large flows','Edmonds-Karp (BFS): O(V·E²)'],uses:['Network bandwidth maximization','Job assignment (bipartite matching)','Image segmentation'],avoid:'Simple graphs where direct calculation is easier',time:'O(V·E²)',space:'O(V+E)',desc:'Repeatedly find augmenting paths from source to sink; push flow along them until no path remains.'},
  'Graph:markov_chain':{eli5:"A system where the next state depends only on the current state (memoryless). Each state has transition probabilities to other states. Simulate by repeatedly jumping to a new state based on current state's probabilities.",pros:['Models many real-world stochastic processes','Simple to simulate'],cons:['Memoryless assumption may not hold','Can be hard to analyze analytically'],uses:['PageRank algorithm','Weather modeling','Text generation','Board game probability analysis'],avoid:'When history matters (use higher-order models)',time:'O(n)',space:'O(n²)',desc:'Random process where state transitions depend only on current state. Simulate using probability distributions.'},
  'Tree:traversal_inorder':{eli5:"Visit Left subtree → Current node → Right subtree. For a BST, this visits all nodes in sorted ascending order. Like reading a number line: left (smaller) first, then center, then right (larger).",pros:['Produces sorted output for BST','Clean recursive structure'],cons:['O(h) stack space — deep trees risk stack overflow'],uses:['Getting sorted elements from BST','BST validity checking','Expression tree evaluation (infix notation)'],avoid:'When level-by-level processing is needed',time:'O(n)',space:'O(h)',desc:'Recursively: left subtree → root → right subtree. Produces sorted order for BSTs.'},
  'Tree:traversal_preorder':{eli5:"Visit Current node → Left subtree → Right subtree. The root is processed FIRST, then children. Like a family tree: parent always comes before children.",pros:['Good for tree serialization','Creates a copy of the tree','Prefix expression evaluation'],cons:['Not sorted output'],uses:['Tree serialization / copying','Directory structure printing','Prefix notation in expression trees'],avoid:'When sorted output is needed',time:'O(n)',space:'O(h)',desc:'Recursively: root → left subtree → right subtree. Processes current node before its children.'},
  'Tree:traversal_postorder':{eli5:"Visit Left subtree → Right subtree → Current node. Children are processed BEFORE their parent. Like cleaning up: clean all sub-folders before deleting the parent folder.",pros:['Correct order for tree deletion','Postfix expression evaluation','Computes subtree sizes naturally'],cons:['Less intuitive than preorder/inorder'],uses:['Deleting/freeing tree nodes','Postfix (RPN) expression evaluation','Calculating directory sizes'],avoid:'When preorder or inorder is appropriate',time:'O(n)',space:'O(h)',desc:'Recursively: left subtree → right subtree → root. Processes children before parent.'},
  'Tree:traversal_level_order':{eli5:"Visit all nodes floor by floor — first the root, then all of root's children, then all their children, etc. Uses a queue: dequeue a node, process it, enqueue its children.",pros:['Finds shortest path in unweighted trees','Intuitive level-by-level processing','Ideal for serialization'],cons:['O(w) memory where w = maximum width of tree'],uses:['Finding minimum depth','Serializing/deserializing trees','Finding nodes at a specific level'],avoid:'When DFS traversal is sufficient',time:'O(n)',space:'O(w)',desc:'BFS using a queue: process nodes level by level, left to right.'},
  'Tree:traversal_zigzag':{eli5:"Level-order traversal but alternating direction: even levels go left-to-right, odd levels go right-to-left. Use a deque (double-ended queue) — add to front or back based on current level direction.",pros:['Creates interesting zigzag visual','Used in certain tree interview problems'],cons:['More complex than standard level-order'],uses:['Interview problems','Specific tree visualization requirements'],avoid:'When standard level-order suffices',time:'O(n)',space:'O(w)',desc:'Level-order traversal with alternating direction per level using a deque.'},
  'Tree:invert_tree':{eli5:"Recursively swap every node's left and right children throughout the entire tree. The result is the mirror image of the original tree. A classic recursive problem!",pros:['Clean O(n) recursion','Modifies in-place'],cons:['Modifies the original tree'],uses:['Mirror image generation','Symmetry checking','Classic interview problem (the famous Homebrew tweet)'],avoid:'When original tree must be preserved',time:'O(n)',space:'O(h)',desc:'Recursively swap left and right children of every node. Returns mirror image of tree.'},
  'Tree:is_balanced':{eli5:"A height-balanced tree: for every node, left and right subtree heights differ by at most 1. Check recursively — compute heights bottom-up, immediately returning -1 (invalid) if imbalance detected.",pros:['O(n) with height caching (no recomputation)'],cons:['Multiple definitions of balanced exist'],uses:['AVL tree validation','Checking if rebalancing is needed','Guaranteeing BST O(log n) operations'],avoid:'When approximate balance is sufficient',time:'O(n)',space:'O(h)',desc:'Post-order DFS checking that every node\'s left/right subtree heights differ by ≤ 1.'},
  'Tree:max_height':{eli5:"The height of a tree is the longest path from root to any leaf. Recursively compute: height(node) = 1 + max(height(left), height(right)). Height of null = 0.",pros:['Simple recursion','Foundation for many tree algorithms'],cons:['O(h) recursive call stack'],uses:['Tree analysis','Balance checking','Complexity bounds'],avoid:'Non-tree data structures',time:'O(n)',space:'O(h)',desc:'Recursively computes tree height as 1 + max(left_height, right_height).'},
  'Tree:bst_is_bst':{eli5:"A BST must satisfy: every node in left subtree < node, every node in right subtree > node. Check by passing min/max bounds down the recursion — left subtree has an upper bound, right subtree has a lower bound.",pros:['O(n) time, O(h) space','Validates the BST property correctly for all nodes'],cons:['Easy to get wrong (naive: only compare with direct children, misses global violations)'],uses:['BST validation after insertion','Checking deserialized trees','Interview problem'],avoid:'Nothing — this is a standard tree check',time:'O(n)',space:'O(h)',desc:'Recursively validate BST property by passing valid range [min, max] to each subtree.'},
  'Tree:lowest_common_ancestor':{eli5:"Find the lowest (deepest) node that is an ancestor of both given nodes. In a BST: if both nodes < current, go left; if both > current, go right; otherwise, current is the LCA.",pros:['O(h) time for BST','O(n) for general binary tree','Classic tree problem'],cons:['General trees require full traversal'],uses:['File system operations','Network routing','Hierarchical data queries'],avoid:'Non-tree structures',time:'O(h)',space:'O(h)',desc:'BST: navigate left/right based on value comparisons. General tree: find nodes in left/right subtrees.'},
  'Linked List:reverse':{eli5:"Use three pointers: prev (starts null), curr (starts at head), next (temporary). At each step: save next, point curr → prev, advance prev to curr, advance curr to next. When curr is null, prev is the new head.",pros:['O(n) time, O(1) space','Classic pointer manipulation','No extra data structures needed'],cons:['Easy to lose track of pointer order'],uses:['Palindrome checking','Undo operations','Reversing segments for k-groups'],avoid:'Arrays (just index from end)',time:'O(n)',space:'O(1)',desc:'Iterative: track prev/curr/next pointers, reverse each next pointer, advance all three each step.'},
  'Linked List:is_cyclic':{eli5:"Floyd's Cycle Detection (Tortoise and Hare): slow pointer moves 1 step, fast pointer moves 2 steps. If there's a cycle, fast eventually laps slow and they meet. If fast reaches null, no cycle.",pros:['O(n) time, O(1) space — no hash set needed','Detects cycle with minimal memory'],cons:['Doesn\'t find cycle length or start without extra steps'],uses:['Detecting infinite loops in data structures','Finding cycle entry point (second phase of Floyd\'s)'],avoid:'Arrays (just check indices)',time:'O(n)',space:'O(1)',desc:"Floyd's algorithm: slow advances 1 step, fast advances 2. They meet if and only if a cycle exists."},
  'Linked List:merge_two_list':{eli5:"Compare the front nodes of both sorted lists. Take the smaller one, advance that list's pointer. Repeat, building a merged sorted list. When one list empties, append the other.",pros:['O(n+m) time, O(1) space','Stable merge — preserves relative order'],cons:['Modifies original list structure'],uses:['Merge sort for linked lists','Combining sorted streams','Database merge joins'],avoid:'Random-access structures (use array merge instead)',time:'O(n+m)',space:'O(1)',desc:'Two-pointer merge: compare heads, take smaller, advance pointer. Append remainder.'},
  'Linked List:kth_to_last':{eli5:"Use two pointers separated by k steps. Move fast pointer k steps ahead. Then move both together. When fast hits the end, slow is at the kth-from-last node.",pros:['O(n) single pass, O(1) space','Elegant two-pointer technique'],cons:['k must be valid'],uses:['Removing nth from end','Interview classic'],avoid:'Arrays (just index at len-k)',time:'O(n)',space:'O(1)',desc:'Two-pointer: separate by k steps, then advance together until fast reaches end.'},
  'Dynamic Programming:fibonacci':{eli5:"Naive recursion recomputes fib(n-1) and fib(n-2) repeatedly — exponential! DP memoization: write each result on a sticky note. When needed again, just look it up. O(2ⁿ) becomes O(n).",pros:['Transforms O(2ⁿ) to O(n)','Core example of memoization technique','Can be reduced to O(1) space (just keep last two)'],cons:['For Fibonacci specifically, the iterative solution is even simpler'],uses:['Teaching memoization','Sequence generation','Dynamic programming intro problem'],avoid:'Using pure recursion on large n',time:'O(n)',space:'O(n)',desc:'Store computed Fibonacci values to avoid redundant recursion. Bottom-up: fill array F[0..n].'},
  'Dynamic Programming:coin_change':{eli5:"Find minimum coins to make amount A. For each amount from 1 to A: try every coin denomination. If coin ≤ current amount, dp[amount] = min(dp[amount], dp[amount-coin]+1). Build up from base case.",pros:['Guaranteed optimal solution','Classic bottom-up DP template'],cons:['O(n·amount) may be slow for huge amounts'],uses:['Vending machine design','Making change in minimal bills','Resource allocation with discrete units'],avoid:'When greedy works (e.g., standard US coins) — but DP works always',time:'O(n·amount)',space:'O(amount)',desc:'Bottom-up DP: dp[i] = minimum coins to make amount i. For each amount, try all coin denominations.'},
  'Dynamic Programming:knapsack':{eli5:"You have a bag with weight limit W. Items have weights and values. Fill bag to maximize value without exceeding W. dp[i][w] = max value using first i items with weight limit w. Either include item i or don't.",pros:['Guaranteed optimal solution','Classic 2D DP example'],cons:['O(n·W) may be too slow for large W','Only works for integer weights'],uses:['Resource allocation','Portfolio optimization','Cargo loading problems'],avoid:'Fractional knapsack (use greedy) or huge W',time:'O(n·W)',space:'O(n·W)',desc:'2D DP table: rows = items, cols = weight limits. dp[i][w] = max value with i items and limit w.'},
  'Dynamic Programming:longest_increasing':{eli5:"Find the length of the longest strictly increasing subsequence. For each element i, dp[i] = longest increasing subsequence ending at i. dp[i] = 1 + max(dp[j]) for all j < i where arr[j] < arr[i].",pros:['O(n²) DP, O(n log n) with patience sort','Classic subsequence DP'],cons:['Subsequence, not substring — elements need not be adjacent'],uses:['Stock price trend analysis','Patience sorting (solitaire)','Bioinformatics sequence analysis'],avoid:'When you need contiguous subarray',time:'O(n log n)',space:'O(n)',desc:'dp[i] = LIS length ending at index i. O(n log n): maintain sorted list of smallest tail elements.'},
  'Dynamic Programming:edit_distance':{eli5:"Minimum operations (insert/delete/replace) to transform string A into string B. dp[i][j] = edit distance between first i chars of A and first j chars of B. If chars match: free! If not: 1 + min(insert, delete, replace).",pros:['Exact O(m·n) solution','Works for any pair of strings'],cons:['O(m·n) time and space — slow for very long strings'],uses:['Spell checkers','DNA sequence alignment','Diff tools (git diff, Unix diff)','Autocorrect'],avoid:'Very long strings without approximation algorithms',time:'O(m·n)',space:'O(m·n)',desc:'dp[i][j] = min edits to transform A[0..i] to B[0..j]. Recurrence handles match, insert, delete, replace.'},
  'Dynamic Programming:max_subarray':{eli5:"Kadane's Algorithm: scan left to right. At each position, decide: extend the current subarray OR start a new subarray at this element (whichever gives a larger sum). Track the global maximum seen.",pros:['O(n) linear time','O(1) space','Elegant greedy-DP hybrid'],cons:['Only contiguous subarrays'],uses:['Maximum profit in time series','Signal processing (finding strongest signal)','Image analysis'],avoid:'Non-contiguous subset sum problems',time:'O(n)',space:'O(1)',desc:"Kadane's: current_sum = max(arr[i], current_sum + arr[i]). max_sum = max(max_sum, current_sum)."},
  'Dynamic Programming:buy_sell_stock':{eli5:"Track the minimum price seen so far. For each day, profit = today's price - min price so far. Track the maximum profit. One pass, O(n)!",pros:['O(n) time, O(1) space','Classic greedy/DP problem'],cons:['Only one transaction allowed in basic version'],uses:['Stock trading strategy','Profit maximization problems','Time series analysis'],avoid:'Multiple transactions (needs different DP)',time:'O(n)',space:'O(1)',desc:'Track min_price as we scan. profit = price - min_price. Answer is max profit seen.'},
  'Dynamic Programming:climbing_stairs':{eli5:"You can take 1 or 2 steps. Ways to reach step n? It's Fibonacci! To reach step n, you came from step n-1 (1 step) or step n-2 (2 steps). dp[n] = dp[n-1] + dp[n-2].",pros:['O(n) DP, O(1) iterative','Reveals connection between problems and Fibonacci'],cons:['Limited to this specific problem type'],uses:['Teaching DP transitions','Interview warmup','Counting paths problems'],avoid:'Nothing — it\'s just Fibonacci in disguise',time:'O(n)',space:'O(1)',desc:'dp[n] = dp[n-1] + dp[n-2]. Equivalent to Fibonacci sequence.'},
  'Dynamic Programming:longest_common_subsequence':{eli5:"Find the longest sequence of characters that appears in both strings, in order (but not necessarily adjacent). dp[i][j] = LCS length of first i chars of A and first j chars of B. If chars match, extend; otherwise take best of two choices.",pros:['Classic 2D DP','Finds optimal common subsequence'],cons:['O(m·n) time and space'],uses:['DNA sequence similarity','Diff algorithms (git diff)','Plagiarism detection'],avoid:'Substring (consecutive) — use different DP',time:'O(m·n)',space:'O(m·n)',desc:'dp[i][j] = LCS of A[0..i] and B[0..j]. If A[i]==B[j]: dp[i-1][j-1]+1. Else: max(dp[i-1][j], dp[i][j-1]).'},
  'Array:two_sum':{eli5:"Find two indices whose values sum to target. Brute force: check all pairs O(n²). Optimal: use a hash map. For each element x, check if (target-x) is already in the map. If yes, found! If no, add x to map.",pros:['O(n) time with hash map, O(n) space','Single pass'],cons:['O(n) extra space for hash map'],uses:['Pair finding in arrays','Sum problems in competitive programming','Foundation for 3Sum and kSum'],avoid:'When O(n log n) sort-based solution is preferred',time:'O(n)',space:'O(n)',desc:'Hash map: for each element x, check if complement (target-x) exists in map. Add x to map if not found.'},
  'Array:three_sum':{eli5:"Find all triplets summing to zero. Sort the array first. Fix one element, then use two-pointer technique on the remaining sorted subarray to find pairs summing to its negative. Skip duplicates.",pros:['O(n²) after O(n log n) sort','Returns all unique triplets without duplicates'],cons:['O(n²) — not suitable for very large arrays'],uses:['Triplet finding','Foundation for k-sum problems','Geometry (triangle existence)'],avoid:'When simple pair finding suffices',time:'O(n²)',space:'O(1)',desc:'Sort. Fix one element, use two-pointer on remainder. Carefully skip duplicate elements.'},
  'Array:move_zeros':{eli5:"Move all zeros to the end while maintaining relative order of non-zero elements. Two-pointer: write pointer j tracks where to place next non-zero element. Scan with i: when arr[i] ≠ 0, place at j, advance j. Fill rest with zeros.",pros:['O(n) time, O(1) space','Stable: preserves relative order'],cons:['In-place: modifies original array'],uses:['Array cleanup','Partitioning data','Interview classic'],avoid:'When original array must be preserved',time:'O(n)',space:'O(1)',desc:'Write pointer j places non-zeros. Read pointer i scans. Fill arr[j..end] with zeros.'},
  'Array:merge_intervals':{eli5:"Given overlapping time intervals, merge them. Sort by start time. For each interval: if it overlaps the last merged interval (start ≤ last_end), extend last_end. Otherwise, add as new interval.",pros:['O(n log n) — sort dominates','Clean greedy merge'],cons:['Requires sorting first'],uses:['Calendar event merging','File version ranges','Network packet reassembly'],avoid:'Non-overlapping interval problems',time:'O(n log n)',space:'O(n)',desc:'Sort by start. Scan: if overlap with last merged (start ≤ last.end), extend. Else add new interval.'},
  'Array:rotate':{eli5:"Rotate array right by k positions. Clever O(1) space solution: reverse entire array, then reverse first k elements, then reverse last n-k elements. Three reversals = rotation!",pros:['O(n) time, O(1) space','Elegant triple-reverse trick'],cons:['Non-obvious algorithm','Modifies in place'],uses:['Array manipulation','Circular buffer operations','Image rotation'],avoid:'When creating a new array is fine (simpler)',time:'O(n)',space:'O(1)',desc:'Reverse(all), Reverse(0..k-1), Reverse(k..n-1). Three reversals produce a right rotation by k.'},
  'Array:remove_duplicates':{eli5:"Remove duplicates from a sorted array in-place. Two pointers: j = slow writer, i = fast scanner. When arr[i] ≠ arr[j], advance j and copy arr[i] there. Return j+1 as new length.",pros:['O(n) time, O(1) space','No extra array needed'],cons:['Only works efficiently on sorted input'],uses:['Deduplication','Pre-processing for algorithms needing unique values'],avoid:'Unsorted arrays (sort first or use hash set)',time:'O(n)',space:'O(1)',desc:'Two-pointer on sorted array: write unique elements forward. Return new length.'},
  'Array:flatten':{eli5:"Given a nested array (arrays within arrays), produce a single flat list. Recursively: for each element, if it's an array, flatten it; if it's a value, add it to result. Stack-based iterative version also works.",pros:['O(n) total elements','Clean recursive structure'],cons:['Deep recursion risk for deeply nested arrays','Multiple possible implementations'],uses:['Data preprocessing','JSON flattening','Tree to array conversion'],avoid:'Fixed-depth nesting (slice is faster)',time:'O(n)',space:'O(n)',desc:'Recursively check each element: if array, flatten recursively; if value, append to result.'},
  'Array:longest_non_repeat':{eli5:"Find the longest substring (contiguous) with no repeating characters. Sliding window: expand right, shrink left when a duplicate enters the window. Track character positions in a hash map for O(1) left pointer jumps.",pros:['O(n) sliding window','Classic string/array problem'],cons:['O(min(n, alphabet)) hash map space'],uses:['Text processing','Compression preprocessing','Interview classic'],avoid:'When overall unique count is needed (not contiguous)',time:'O(n)',space:'O(min(n,k))',desc:'Sliding window: right pointer scans, left pointer jumps when duplicate found. Track last positions in map.'},
  'Array:plus_one':{eli5:"Represent an integer as an array of digits. Add 1. Handle carry: start from the last digit, add 1. If result is 10, set to 0, carry the 1 to the next digit left. If all digits were 9, prepend a 1.",pros:['O(n)','Handles arbitrary precision integers'],cons:['Only adds 1 (not a general adder)'],uses:['Arbitrary precision arithmetic','Digit manipulation problems'],avoid:'When native integers suffice',time:'O(n)',space:'O(1)',desc:'Scan from right, add 1 with carry. If carry propagates past index 0, prepend 1.'},
  'Backtracking:permute':{eli5:"Generate all n! orderings of a list. Fix one element at position 0 (try each element there by swapping), then recursively generate all permutations of the remaining n-1 elements. Backtrack: undo the swap after recursion.",pros:['Generates ALL permutations','Clean swap-based implementation'],cons:['O(n!) space for output','Only feasible for n ≤ ~10'],uses:['All orderings needed','Password brute-force','Traveling salesman (brute force)'],avoid:'n > 10 without heavy pruning',time:'O(n!)',space:'O(n)',desc:'Swap element into position 0, recurse on suffix, swap back. Tree of n! leaf nodes.'},

const DEFAULT_ELI5 = (cat, alg) => ({
  eli5:`This ${cat} algorithm processes input data step by step to arrive at the correct output. Step through the animation to observe how state changes with each operation.`,
  pros:['Well-studied algorithm with known complexity','Clear and deterministic behavior'],
  cons:['May not be optimal for all input distributions','Verify complexity before use at scale'],
  uses:['Competitive programming','CS education','Foundation for more complex algorithms'],
  avoid:'When a simpler built-in function already solves the problem',
  time:'O(n)',space:'O(1)',
  desc:`A ${cat} algorithm — ${fmt(alg)}. See the Code tab for the original Python implementation. Step through the animation to understand each phase.`
});

function fmt(s){ return s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }
function getInfo(cat,alg){ return ELI5_DB[`${cat}:${alg}`] || DEFAULT_ELI5(cat,alg); }

createApp({
  setup(){

    // ─── FILTERED ALGS ───
    const filtered = computed(()=>{
      if(!q.value) return ALGS;
      const qv = q.value.toLowerCase();
      const r={};
      for(const [cat,algs] of Object.entries(ALGS)){
        const f=algs.filter(a=>a.includes(qv)||cat.toLowerCase().includes(qv));
        if(f.length) r[cat]=f;
      }
      return r;
    });

    const info = computed(()=> selAlg.value ? getInfo(selCat.value, selAlg.value) : {});

    // ─── SIDEBAR ───
    function toggleCat(cat){ ex[cat]=!ex[cat]; }
    function expandAll(){ for(const c of Object.keys(filtered.value)) ex[c]=true; }
    function collapseAll(){ for(const c of Object.keys(ALGS)) ex[c]=false; }
    function onSearch(){
      if(q.value) for(const c of Object.keys(filtered.value)) ex[c]=true;
    }
    function onSbScroll(e){
      if(e.target.scrollTop === 0 && searchInp.value) searchInp.value.focus();
    }

    // ─── PICK ALGORITHM ───
    async function pick(cat, alg){
      stopAnim();
      selCat.value = cat;
      selAlg.value = alg;
      tab.value = 'vis';
      code.value = '';
      histIdx.value = 0;
      history = [];
      playing.value = false;
      drawerOpen.value = false;

      // Fetch code
      const folder = cat.toLowerCase().replace(/\s+/g,'_');
      fetch(`https://raw.githubusercontent.com/mrkinix/algorithms/main/algorithms/${folder}/${alg}.py`)
        .then(r=>r.text()).then(t=>{ code.value=t; })
        .catch(()=>{ code.value=`# ${alg}.py\n# https://github.com/mrkinix/algorithms`; });

      await nextTick();
      initVis(cat, alg);
    }

    // ─── THEME ───
    function setTheme(t){
      theme.value = t;
      document.documentElement.classList.remove('dark','sepia','light');
      if(t!=='dark') document.documentElement.classList.add(t);
      // Update Android nav bar color
      const colors = {dark:'#0d1117',sepia:'#ede4d8',light:'#f6f8fa'};
      document.getElementById('themeColor').setAttribute('content', colors[t]);
      if(currentVis) currentVis.draw();
    }

    function initCanvas(){
      if(!cvs.value) return;
      const el = cvs.value;
      const dpr = window.devicePixelRatio || 1;
      const w = el.parentElement.offsetWidth;
      const h = canvasH.value;
      el.width = w * dpr;
      el.height = h * dpr;
      el.style.width = w+'px';
      el.style.height = h+'px';
      ctx = el.getContext('2d');
      ctx.scale(dpr, dpr);
    }

    function getH(){ return canvasH.value; }

        bg:'#0d1117',bg2:'#161b22',bg3:'#1c2128',
        bar:'#1e3a52',barAlt:'#1a3347',

        border:'#30363d',
        nodeDefault:'#1c2d42',nodeBorder:'#2d4a6b',
