    function initCanvas() {
      if (!cvs.value) return;
      ctx = cvs.value.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      cvs.value.width = cvs.value.offsetWidth * dpr;
      cvs.value.height = 360 * dpr;
      ctx.scale(dpr, dpr);
    }

    // ─── STATE BUILDERS per category ───
    function buildState(cat, alg) {
      const n = 24;
      const arr = Array.from({length:n}, () => Math.floor(Math.random()*280)+30);
      const sorted = () => Array.from({length:n}, (_,i) => Math.round(30 + (i/n)*280));
      visState = {
        cat, alg, done: false, step: 0,
        arr: [...arr],
        hi: [], special: [],
        // sorting
        si: 0, sj: 0, sStack: [], sGap: Math.floor(n/2),
        // searching
        target: arr[Math.floor(Math.random()*n)], lo: 0, mid: -1, high: n-1, found: -1,
        searchArr: [...arr].sort((a,b)=>a-b),
        searchStep: 0,
        // graph
        nodes: buildGraphNodes(), edges: [], visitQueue: [], visitedSet: new Set(),
        graphStep: 0, graphPath: [],
        // tree
        treeNodes: buildTree(), treeStep: 0, treeQueue: [], treeVisited: [],
        // LL
        llNodes: buildLL(8), llStep: 0, llActive: 0,
        // dp
        dpTable: [], dpStep: 0, dpN: 8,
        // array
        arrI: 0, arrJ: 1, arrSwaps: 0,
        // stack
        stackArr: [], stackStep: 0,
        // string
        strS: randomStr(12), strP: randomStr(4), strI: 0, strJ: 0, strMatches: [],
        // matrix
        matData: buildMat(6), matI: 0, matJ: 0, matVisited: [],
        // bit
        bitNum: Math.floor(Math.random()*255)+1, bitStep: 0,
        // backtrack
        btArr: [1,2,3,4], btResult: [], btStep: 0, btCurrent: [],
        // math
        mathN: Math.floor(Math.random()*50)+10, mathStep: 0, mathPrimes: [], mathCurrent: 2,
        // heap
        heapArr: [...arr], heapSize: n, heapI: Math.floor(n/2)-1,
        // compression
        compStr: 'AAABBCCCCDDDDDEEEEE', compI: 0, compResult: [],
        // map/hash
        hashKeys: Array.from({length:8}, () => randomStr(3)), hashI: 0, hashMap: {},
      };
      // init edges for graph
      const gn = visState.nodes;
      for (let i=0;i<gn.length;i++) {
        const nc = 1+Math.floor(Math.random()*2);
        for (let k=0;k<nc;k++) {
          const t = (i+1+Math.floor(Math.random()*3))%gn.length;
          if (t!==i) visState.edges.push({from:i,to:t,w:Math.floor(Math.random()*9)+1,hi:false});
        }
      }
      visState.visitQueue = [0];
      visState.visitedSet.add(0);
      // init dp table
      const dpN = visState.dpN;
      visState.dpTable = Array.from({length:dpN+1}, (_,i)=>i);
      // init heap
      for (let i=Math.floor(n/2)-1;i>=0;i--) heapifyDown(visState.heapArr, n, i);
    }

    function randomStr(n) {
      const chars = 'abcdefghij';
      return Array.from({length:n}, ()=>chars[Math.floor(Math.random()*chars.length)]).join('');
    }

    function buildGraphNodes() {
      const n = 9;
      return Array.from({length:n}, (_,i) => ({
        x: 80 + (i%3)*220, y: 60 + Math.floor(i/3)*100,
        label: String.fromCharCode(65+i),
        visited: false, active: false, inPath: false,
        dist: Infinity
      }));
    }

    function buildTree() {
      const vals = [50,30,70,20,40,60,80,10,25,35,45];
      return vals.map((v,i) => ({
        v, visited: false, active: false,
        left: 2*i+1 < vals.length ? 2*i+1 : -1,
        right: 2*i+2 < vals.length ? 2*i+2 : -1
      }));
    }

    function buildLL(n) {
      return Array.from({length:n}, (_,i) => ({val:Math.floor(Math.random()*90)+10, active:false, visited:false}));
    }

    function buildMat(n) {
      return Array.from({length:n}, ()=>Array.from({length:n}, ()=>Math.floor(Math.random()*9)+1));
    }

    function heapifyDown(arr, n, i) {
      let lg=i,l=2*i+1,r=2*i+2;
      if(l<n&&arr[l]>arr[lg])lg=l;
      if(r<n&&arr[r]>arr[lg])lg=r;
      if(lg!==i){ [arr[i],arr[lg]]=[arr[lg],arr[i]]; heapifyDown(arr,n,lg); }
    }

    // ─── STEP LOGIC ───
    function doStep() {
      if (!sel.value || visState.done) { playing.value = false; return; }
      stepN.value++;
      const s = visState;
      const cat = s.cat;
      const alg = s.alg;

      if (cat === 'Sorting') stepSort(s, alg);
      else if (cat === 'Searching') stepSearch(s, alg);
      else if (cat === 'Graph') stepGraph(s, alg);
      else if (cat === 'Tree') stepTree(s, alg);
      else if (cat === 'Linked List') stepLL(s, alg);
      else if (cat === 'Dynamic Programming') stepDP(s, alg);
      else if (cat === 'Array') stepArray(s, alg);
      else if (cat === 'Stack') stepStack(s, alg);
      else if (cat === 'String') stepString(s, alg);
      else if (cat === 'Matrix') stepMatrix(s, alg);
      else if (cat === 'Bit Manipulation') stepBit(s, alg);
      else if (cat === 'Backtracking') stepBacktrack(s, alg);
      else if (cat === 'Math') stepMath(s, alg);
      else if (cat === 'Heap') stepHeap(s, alg);
      else if (cat === 'Compression') stepCompression(s, alg);
      else if (cat === 'Map') stepMap(s, alg);
      else if (cat === 'Greedy') stepGreedy(s, alg);
      else if (cat === 'Queue') stepQueue(s, alg);
      else { s.hi = [(s.step++) % s.arr.length]; if(s.step > s.arr.length*3) s.done=true; }

      draw();
    }

    // SORT
    function stepSort(s, alg) {
      const a = s.arr, n = a.length;
      if (alg==='bubble_sort'||alg==='exchange_sort') {
        if(s.si<n){ if(s.sj<n-s.si-1){ s.hi=[s.sj,s.sj+1]; if(a[s.sj]>a[s.sj+1]){[a[s.sj],a[s.sj+1]]=[a[s.sj+1],a[s.sj]];} s.sj++; } else{s.sj=0;s.si++;} } else s.done=true;
      } else if(alg==='insertion_sort') {
        if(s.si===0) s.si=1;
        if(s.si<n){ let k=a[s.si],j=s.si-1; s.hi=[s.si]; while(j>=0&&a[j]>k){a[j+1]=a[j];j--;} a[j+1]=k; s.si++; } else s.done=true;
      } else if(alg==='selection_sort') {
        if(s.si<n-1){ let mn=s.si; for(let k=s.si+1;k<n;k++) if(a[k]<a[mn])mn=k; s.hi=[s.si,mn]; if(mn!==s.si)[a[s.si],a[mn]]=[a[mn],a[s.si]]; s.si++; } else s.done=true;
      } else if(alg==='quick_sort') {
        if(!s.sStack.length) s.sStack=[[0,n-1]];
        if(s.sStack.length){ const [lo,hi]=s.sStack.pop(); if(lo<hi){ const pv=a[hi]; let p=lo; for(let k=lo;k<hi;k++) if(a[k]<=pv){[a[k],a[p]]=[a[p],a[k]];p++;} [a[p],a[hi]]=[a[hi],a[p]]; s.hi=[p,hi]; s.sStack.push([lo,p-1],[p+1,hi]); } } else s.done=true;
      } else if(alg==='merge_sort') {
        if(!s.mWidth) s.mWidth=1;
        if(s.mWidth<n){ for(let k=0;k<n;k+=s.mWidth*2){ const l=k,m=Math.min(k+s.mWidth-1,n-1),r=Math.min(k+s.mWidth*2-1,n-1); if(m<r){ const L=a.slice(l,m+1),R=a.slice(m+1,r+1); let i=0,j=0,idx=l; while(i<L.length&&j<R.length)a[idx++]=(L[i]<=R[j])?L[i++]:R[j++]; while(i<L.length)a[idx++]=L[i++]; while(j<R.length)a[idx++]=R[j++]; } } s.hi=[s.mWidth%n]; s.mWidth*=2; } else s.done=true;
      } else if(alg==='heap_sort') {
        if(!s.heapInit){ for(let k=Math.floor(n/2)-1;k>=0;k--) heapifyDown(a,n,k); s.heapInit=true; s.hk=n-1; }
        if(s.hk>0){ [a[0],a[s.hk]]=[a[s.hk],a[0]]; s.hi=[0,s.hk]; heapifyDown(a,s.hk,0); s.hk--; } else s.done=true;
      } else if(alg==='shell_sort') {
        if(s.sGap>0){ if(s.shI===undefined)s.shI=s.sGap; if(s.shI<n){ let t=a[s.shI],j=s.shI; s.hi=[s.shI]; while(j>=s.sGap&&a[j-s.sGap]>t){a[j]=a[j-s.sGap];j-=s.sGap;} a[j]=t; s.shI++; } else{s.sGap=Math.floor(s.sGap/2);s.shI=s.sGap;} } else s.done=true;
      } else if(alg==='counting_sort') {
        if(!s.csDone){ const mx=Math.max(...a),mn=Math.min(...a),cnt=new Array(mx-mn+1).fill(0); a.forEach(v=>cnt[v-mn]++); let idx=0; cnt.forEach((c,i)=>{while(c>0)a[idx++]=i+mn;}); s.hi=[0,n-1]; s.csDone=true; s.done=true; }
      } else if(alg==='gnome_sort'||alg==='cocktail_shaker_sort') {
        if(s.gi===undefined)s.gi=1;
        if(s.gi<n){ s.hi=[s.gi-1,s.gi]; if(s.gi===0||a[s.gi]>=a[s.gi-1])s.gi++; else{[a[s.gi],a[s.gi-1]]=[a[s.gi-1],a[s.gi]];s.gi--;} } else s.done=true;
      } else if(alg==='wiggle_sort') {
        if(s.wi===undefined)s.wi=0;
        if(s.wi<n-1){ s.hi=[s.wi,s.wi+1]; const e=s.wi%2===0; if((e&&a[s.wi]>a[s.wi+1])||(!e&&a[s.wi]<a[s.wi+1]))[a[s.wi],a[s.wi+1]]=[a[s.wi+1],a[s.wi]]; s.wi++; } else s.done=true;
      } else {
        // fallback bubble
        if(s.si<n){ if(s.sj<n-s.si-1){s.hi=[s.sj,s.sj+1];if(a[s.sj]>a[s.sj+1])[a[s.sj],a[s.sj+1]]=[a[s.sj+1],a[s.sj]];s.sj++;} else{s.sj=0;s.si++;} } else s.done=true;
      }
    }

    // SEARCH
    function stepSearch(s, alg) {
      const a = s.searchArr;
      if(alg==='binary_search'||alg==='find_min_rotate'||alg==='search_insert'||alg==='search_range'||alg==='search_rotate'||alg==='first_occurrence'||alg==='last_occurrence'||alg==='next_greatest_letter') {
        if(s.lo<=s.high&&s.found===-1){ s.mid=Math.floor((s.lo+s.high)/2); s.hi=[s.mid]; s.special=[s.lo,s.high]; if(a[s.mid]===s.target){s.found=s.mid;s.done=true;} else if(a[s.mid]<s.target)s.lo=s.mid+1; else s.high=s.mid-1; } else s.done=true;
      } else if(alg==='linear_search'||alg==='two_sum') {
        if(s.searchStep<a.length){ s.hi=[s.searchStep]; if(a[s.searchStep]===s.target){s.found=s.searchStep;s.done=true;} s.searchStep++; } else s.done=true;
      } else if(alg==='jump_search') {
        if(!s.jsBlock)s.jsBlock=Math.floor(Math.sqrt(a.length));
        if(s.searchStep<a.length){ s.hi=[Math.min(s.searchStep,a.length-1)]; if(a[Math.min(s.searchStep,a.length-1)]>=s.target){s.found=s.searchStep;s.done=true;} s.searchStep+=s.jsBlock; } else s.done=true;
      } else if(alg==='ternary_search') {
        if(s.lo<s.high){ const t1=Math.floor(s.lo+(s.high-s.lo)/3),t2=Math.floor(s.high-(s.high-s.lo)/3); s.hi=[t1,t2]; s.special=[s.lo,s.high]; if(a[t1]===s.target){s.found=t1;s.done=true;} else if(a[t2]===s.target){s.found=t2;s.done=true;} else if(s.target<a[t1])s.high=t1-1; else if(s.target>a[t2])s.lo=t2+1; else{s.lo=t1+1;s.high=t2-1;} } else s.done=true;
      } else {
        if(s.lo<=s.high&&s.found===-1){ s.mid=Math.floor((s.lo+s.high)/2); s.hi=[s.mid]; if(a[s.mid]===s.target)s.done=true; else if(a[s.mid]<s.target)s.lo=s.mid+1; else s.high=s.mid-1; } else s.done=true;
      }
    }

    // GRAPH
    function stepGraph(s, alg) {
      const nodes = s.nodes;
      if(s.visitQueue.length===0){s.done=true;return;}
      const curr = s.visitQueue.shift();
      nodes[curr].visited = true; nodes[curr].active = true;
      s.hi = [curr]; s.graphStep++;
      // find edges from curr
      const neighbours = s.edges.filter(e=>e.from===curr).map(e=>e.to);
      for(const nb of neighbours){
        if(!s.visitedSet.has(nb)){
          s.visitedSet.add(nb);
          s.visitQueue.push(nb);
          nodes[nb].active = false;
        }
        // highlight edge
        const e = s.edges.find(e=>e.from===curr&&e.to===nb);
        if(e) e.hi = true;
      }
      if(s.visitQueue.length===0 && s.visitedSet.size < nodes.length) s.done=true;
    }

    // TREE
    function stepTree(s, alg) {
      const nodes = s.treeNodes;
      if(s.treeStep===0) s.treeQueue=[0];
      if(s.treeQueue.length===0){s.done=true;return;}
      let idx;
      if(alg==='traversal_inorder'||alg==='traversal_preorder'||alg==='traversal_postorder'||alg==='bst_is_bst'||alg==='bst_height'||alg==='is_balanced'||alg==='is_symmetric'||alg==='is_subtree'||alg==='same_tree'||alg==='invert_tree') {
        idx = s.treeQueue.shift();
        nodes[idx].visited=true; nodes[idx].active=true;
        if(nodes[idx].right>=0&&!nodes[nodes[idx].right].visited) s.treeQueue.push(nodes[idx].right);
        if(nodes[idx].left>=0&&!nodes[nodes[idx].left].visited) s.treeQueue.push(nodes[idx].left);
      } else {
        idx = s.treeQueue.shift();
        nodes[idx].visited=true; nodes[idx].active=true;
        if(nodes[idx].left>=0&&!nodes[nodes[idx].left].visited) s.treeQueue.push(nodes[idx].left);
        if(nodes[idx].right>=0&&!nodes[nodes[idx].right].visited) s.treeQueue.push(nodes[idx].right);
      }
      s.treeVisited.push(idx);
      s.hi=[idx]; s.treeStep++;
      if(s.treeQueue.length===0) s.done=true;
    }

    // LINKED LIST
    function stepLL(s, alg) {
      const nodes = s.llNodes;
      if(s.llActive < nodes.length){
        if(s.llActive>0) nodes[s.llActive-1].active=false;
        nodes[s.llActive].visited=true; nodes[s.llActive].active=true;
        s.hi=[s.llActive]; s.llActive++;
      } else s.done=true;
    }

    // DYNAMIC PROGRAMMING
    function stepDP(s, alg) {
      if(alg==='fibonacci'||alg==='climbing_stairs') {
        if(s.dpStep<s.dpN){ s.hi=[s.dpStep]; if(s.dpStep>1)s.dpTable[s.dpStep]=s.dpTable[s.dpStep-1]+s.dpTable[s.dpStep-2]; s.special=[Math.max(0,s.dpStep-1),Math.max(0,s.dpStep-2)]; s.dpStep++; } else s.done=true;
      } else if(alg==='coin_change'||alg==='rod_cut'||alg==='max_subarray'||alg==='max_product_subarray') {
        if(s.dpStep<s.dpN){ s.hi=[s.dpStep]; s.dpTable[s.dpStep]=Math.max(s.dpTable[s.dpStep]||0,(s.dpTable[s.dpStep-1]||0)+Math.floor(Math.random()*20)-5); s.dpStep++; } else s.done=true;
      } else {
        if(s.dpStep<s.dpN){ s.hi=[s.dpStep]; s.dpTable[s.dpStep]+=s.dpStep; s.dpStep++; } else s.done=true;
      }
    }

    // ARRAY
    function stepArray(s, alg) {
      const a = s.arr, n = a.length;
      if(alg==='two_sum'||alg==='three_sum'||alg==='n_sum') {
        if(s.arrJ<n){ s.hi=[s.arrI,s.arrJ]; s.arrJ++; if(s.arrJ>=n){s.arrI++;s.arrJ=s.arrI+1;} if(s.arrI>=n-1)s.done=true; } else s.done=true;
      } else if(alg==='move_zeros'||alg==='remove_duplicates'||alg==='rotate') {
        if(s.arrI<n){ s.hi=[s.arrI]; const val=a[s.arrI]; if(val===0&&s.arrJ<s.arrI){[a[s.arrJ],a[s.arrI]]=[a[s.arrI],a[s.arrJ]];s.arrJ++;} s.arrI++; } else s.done=true;
      } else if(alg==='merge_intervals') {
        if(s.arrI<n-1){ s.hi=[s.arrI,s.arrI+1]; if(a[s.arrI]>a[s.arrI+1])[a[s.arrI],a[s.arrI+1]]=[a[s.arrI+1],a[s.arrI]]; s.arrI++; } else s.done=true;
      } else {
        if(s.arrI<n){ s.hi=[s.arrI,(s.arrI+1)%n]; s.arrI++; } else s.done=true;
      }
    }

    // STACK
    function stepStack(s, alg) {
      if(s.stackStep < 12){
        const action = s.stackStep%3;
        if(action<2) s.stackArr.push(Math.floor(Math.random()*90)+10);
        else if(s.stackArr.length>0) s.stackArr.pop();
        s.hi=[s.stackArr.length-1]; s.stackStep++;
      } else s.done=true;
    }

    // STRING
    function stepString(s, alg) {
      const str = s.strS, pat = s.strP;
      if(s.strI < str.length){
        s.hi=[s.strI];
        if(alg==='knuth_morris_pratt'||alg==='rabin_karp'||alg==='z_algorithm'||alg==='manacher') {
          // sliding window match
          if(s.strI+pat.length <= str.length){
            const sub = str.slice(s.strI, s.strI+pat.length);
            if(sub===pat) s.strMatches.push(s.strI);
          }
        }
        s.special = s.strMatches.slice();
        s.strI++;
      } else s.done=true;
    }

    // MATRIX
    function stepMatrix(s, alg) {
      const m = s.matData, rows = m.length, cols = m[0].length;
      if(alg==='spiral_traversal') {
        if(!s.matSpiral){
          s.matSpiral=[];
          let t=0,b=rows-1,l=0,r=cols-1;
          while(t<=b&&l<=r){
            for(let j=l;j<=r;j++) s.matSpiral.push([t,j]);
            t++;
            for(let i=t;i<=b;i++) s.matSpiral.push([i,r]);
            r--;
            if(t<=b){for(let j=r;j>=l;j--) s.matSpiral.push([b,j]);b--;}
            if(l<=r){for(let i=b;i>=t;i--) s.matSpiral.push([i,l]);l++;}
          }
          s.matSpiralIdx=0;
        }
        if(s.matSpiralIdx<s.matSpiral.length){ const [ri,ci]=s.matSpiral[s.matSpiralIdx]; s.matVisited.push(`${ri},${ci}`); s.matI=ri;s.matJ=ci; s.matSpiralIdx++; } else s.done=true;
      } else {
        // row-by-row
        if(s.matI<rows){ s.matVisited.push(`${s.matI},${s.matJ}`); s.matJ++; if(s.matJ>=cols){s.matJ=0;s.matI++;} } else s.done=true;
      }
    }

    // BIT
    function stepBit(s, alg) {
      if(s.bitStep < 8){ s.hi=[s.bitStep]; s.bitStep++; } else s.done=true;
    }

    // BACKTRACKING
    function stepBacktrack(s, alg) {
      if(s.btStep < 16){
        const idx = s.btStep % s.btArr.length;
        s.hi=[idx];
        if(s.btCurrent.length<3) s.btCurrent.push(s.btArr[idx]);
        else { s.btResult.push([...s.btCurrent]); s.btCurrent=[]; }
        s.btStep++;
      } else s.done=true;
    }

    // MATH
    function stepMath(s, alg) {
      if(alg==='primes_sieve_of_eratosthenes'||alg==='prime_check'||alg==='goldbach') {
        const n = s.mathN;
        if(s.mathCurrent <= n){
          let isPrime = true;
          for(let k=2;k*k<=s.mathCurrent;k++) if(s.mathCurrent%k===0){isPrime=false;break;}
          if(isPrime) s.mathPrimes.push(s.mathCurrent);
          s.hi=[s.mathCurrent-2]; s.mathCurrent++;
        } else s.done=true;
      } else {
        if(s.mathStep < s.mathN){ s.hi=[s.mathStep]; s.mathStep++; } else s.done=true;
      }
    }

    // HEAP
    function stepHeap(s, alg) {
      const a = s.heapArr, n = s.heapSize;
      if(s.heapI >= 0){ s.hi=[s.heapI,2*s.heapI+1,2*s.heapI+2].filter(x=>x<n); heapifyDown(a,n,s.heapI); s.heapI--; }
      else if(s.hk===undefined){s.hk=n-1;}
      else if(s.hk>0){ [a[0],a[s.hk]]=[a[s.hk],a[0]]; s.hi=[0,s.hk]; heapifyDown(a,s.hk,0); s.hk--; }
      else s.done=true;
    }

    // COMPRESSION
    function stepCompression(s, alg) {
      const str = s.compStr;
      if(s.compI < str.length){
        let cnt=1;
        while(s.compI+cnt<str.length&&str[s.compI+cnt]===str[s.compI])cnt++;
        s.compResult.push({char:str[s.compI],count:cnt});
        s.hi=[s.compI];
        s.compI+=cnt;
      } else s.done=true;
    }

    // MAP
    function stepMap(s, alg) {
      if(s.hashI < s.hashKeys.length){ const k=s.hashKeys[s.hashI]; s.hashMap[k]=(s.hashMap[k]||0)+1; s.hi=[s.hashI]; s.hashI++; } else s.done=true;
    }

    // GREEDY
    function stepGreedy(s, alg) {
      if(s.arrI < s.arr.length){ s.hi=[s.arrI]; s.arrI++; } else s.done=true;
    }

    // QUEUE
    function stepQueue(s, alg) {
      if(s.stackStep < 16){
        if(s.stackStep%3===0&&s.stackArr.length>0) s.stackArr.shift();
        else s.stackArr.push(Math.floor(Math.random()*90)+10);
        s.hi=[s.stackArr.length-1]; s.stackStep++;
      } else s.done=true;
    }

    // ─── DRAW ───
    function draw() {
      if (!ctx || !cvs.value || !visState.cat) return;
      const dpr = window.devicePixelRatio || 1;
      const W = cvs.value.width / dpr;
      const H = cvs.value.height / dpr;
      ctx.save();
      ctx.clearRect(0, 0, W*dpr, H*dpr);

      const bg = light.value ? '#f8fafc' : '#0d1220';
      ctx.fillStyle = bg;
      ctx.fillRect(0,0,W*dpr,H*dpr);
      ctx.scale(1,1); // already scaled at init

      const cat = visState.cat;
      if(cat==='Sorting') drawSort(W, H);
      else if(cat==='Searching') drawSearch(W, H);
      else if(cat==='Graph') drawGraph(W, H);
      else if(cat==='Tree') drawTree(W, H);
      else if(cat==='Linked List') drawLL(W, H);
      else if(cat==='Dynamic Programming') drawDP(W, H);
      else if(cat==='Array') drawArray(W, H);
      else if(cat==='Stack') drawStack(W, H);
      else if(cat==='String') drawString(W, H);
      else if(cat==='Matrix') drawMatrix(W, H);
      else if(cat==='Bit Manipulation') drawBit(W, H);
      else if(cat==='Backtracking') drawBacktrack(W, H);
      else if(cat==='Math') drawMath(W, H);
      else if(cat==='Heap') drawHeapVis(W, H);
      else if(cat==='Compression') drawCompression(W, H);
      else if(cat==='Map') drawMap(W, H);
      else if(cat==='Greedy'||cat==='Queue') drawSort(W, H);
      else drawSort(W, H);

      ctx.restore();
    }

    const C = () => light.value ? {
      bg:'#f8fafc', bar:'#cbd5e1', hi:'#0284c7', done:'#16a34a',
      node:'#e2e8f0', nodeB:'#94a3b8', nodeHi:'#0284c7', nodeVisit:'#16a34a',
      edge:'#cbd5e1', edgeHi:'#0284c7', txt:'#0f172a', txt2:'#64748b',
      dp:'#bfdbfe', dpHi:'#0284c7', dpDone:'#bbf7d0',
      ll:'#e2e8f0', llHi:'#0284c7', llVisit:'#16a34a',
      mat:'#e2e8f0', matHi:'#0284c7', matVisit:'rgba(2,132,199,.25)',
      bit:'#e2e8f0', bitHi:'#0284c7',
      str:'#e2e8f0', strHi:'#0284c7', strMatch:'#16a34a',
    } : {
      bg:'#0d1220', bar:'#1e3a52', hi:'#38bdf8', done:'#4ade80',
      node:'#1c2d42', nodeB:'#2d4a6b', nodeHi:'#38bdf8', nodeVisit:'#4ade80',
      edge:'#1e3a52', edgeHi:'#38bdf8', txt:'#e2e8f0', txt2:'#64748b',
      dp:'#1a2e42', dpHi:'#38bdf8', dpDone:'#166534',
      ll:'#1c2d42', llHi:'#38bdf8', llVisit:'#4ade80',
      mat:'#1c2d42', matHi:'#38bdf8', matVisit:'rgba(56,189,248,.3)',
      bit:'#1c2d42', bitHi:'#38bdf8',
      str:'#1c2d42', strHi:'#38bdf8', strMatch:'#4ade80',
    };

    function drawSort(W, H) {
      const s = visState, c = C();
      const a = s.arr, n = a.length;
      const gap=2, maxV=Math.max(...a,1);
      const bw = Math.max(4, Math.floor((W-48-gap*(n-1))/n));
      const maxH = H-60;
      a.forEach((v,i)=>{
        const x=24+i*(bw+gap), bh=Math.floor((v/maxV)*maxH), y=H-36-bh;
        ctx.fillStyle = s.done ? c.done : (s.hi.includes(i)?c.hi:c.bar);
        ctx.beginPath(); ctx.roundRect(x,y,bw,bh,[Math.min(2,bw/2),Math.min(2,bw/2),0,0]); ctx.fill();
        if(n<=20&&bw>=12){ ctx.fillStyle=c.txt2; ctx.font=`9px ${IBM}`; ctx.textAlign='center'; ctx.fillText(v,x+bw/2,H-22); }
      });
      label(W,H,c,`${fmt(s.alg)} · n=${n}`);
    }

    const IBM = "'IBM Plex Mono',monospace";

    function drawSearch(W, H) {
      const s = visState, c = C();
      const a = s.searchArr, n = a.length;
      const gap=2, maxV=Math.max(...a,1);
      const bw = Math.max(4, Math.floor((W-48-gap*(n-1))/n));
      const maxH = H-70;
      a.forEach((v,i)=>{
        const x=24+i*(bw+gap), bh=Math.floor((v/maxV)*maxH), y=H-50-bh;
        let col = c.bar;
        if(i===s.found) col=c.done;
        else if(s.hi.includes(i)) col=c.hi;
        else if(s.special && s.special.includes(i)) col=light.value?'#bfdbfe':'#1e3a52';
        ctx.fillStyle=col;
        ctx.beginPath(); ctx.roundRect(x,y,bw,bh,[Math.min(2,bw/2),Math.min(2,bw/2),0,0]); ctx.fill();
        if(n<=20&&bw>=12){ ctx.fillStyle=c.txt2; ctx.font=`9px ${IBM}`; ctx.textAlign='center'; ctx.fillText(v,x+bw/2,H-35); }
      });
      // target marker
      ctx.fillStyle=c.hi; ctx.font=`11px ${IBM}`; ctx.textAlign='left';
      ctx.fillText(`target: ${s.target}`, 24, 20);
      if(s.found>=0){ ctx.fillStyle=c.done; ctx.fillText(`found at idx ${s.found}`, 24, 36); }
      label(W,H,c,`${fmt(s.alg)}`);
    }

    function drawGraph(W, H) {
      const s = visState, c = C();
      const scaleX = W/700, scaleY = H/320;
      // draw edges
      ctx.lineWidth=1.5;
      for(const e of s.edges){
        const n1=s.nodes[e.from], n2=s.nodes[e.to];
        const x1=n1.x*scaleX, y1=n1.y*scaleY+10, x2=n2.x*scaleX, y2=n2.y*scaleY+10;
        ctx.strokeStyle=e.hi?c.edgeHi:c.edge;
        ctx.lineWidth=e.hi?2:1;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
        // weight
        ctx.fillStyle=c.txt2; ctx.font=`9px ${IBM}`; ctx.textAlign='center';
        ctx.fillText(e.w, (x1+x2)/2, (y1+y2)/2-3);
      }
      // draw nodes
      for(const [i,n] of s.nodes.entries()){
        const x=n.x*scaleX, y=n.y*scaleY+10, r=16;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fillStyle = n.visited ? c.nodeVisit : (n.active||s.hi.includes(i) ? c.nodeHi : c.node);
        ctx.fill();
        ctx.strokeStyle = n.visited ? c.nodeVisit : c.nodeB;
        ctx.lineWidth = n.active||s.hi.includes(i) ? 2 : 1;
        ctx.stroke();
        ctx.fillStyle=n.visited?'#fff':(light.value?'#0f172a':'#e2e8f0');
        ctx.font=`bold 11px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(n.label, x, y);
      }
      ctx.textBaseline='alphabetic';
      label(W,H,c,`${fmt(s.alg)} · BFS traversal`);
    }

    function drawTree(W, H) {
      const s = visState, c = C();
      const nodes = s.treeNodes, n = nodes.length;
      const levels = Math.ceil(Math.log2(n+1));
      const nodeR = Math.min(20, (W/2) / Math.pow(2, levels));
      // compute positions
      const pos = nodes.map((_,i)=>{
        const level = Math.floor(Math.log2(i+1));
        const posInLevel = i - (Math.pow(2,level)-1);
        const nodesInLevel = Math.pow(2,level);
        const x = W * (posInLevel+0.5) / nodesInLevel;
        const y = 30 + level * (H-60) / (levels);
        return {x,y};
      });
      // edges
      for(let i=0;i<n;i++){
        const nd=nodes[i];
        if(nd.left>=0&&nd.left<n){ const {x:x1,y:y1}=pos[i],{x:x2,y:y2}=pos[nd.left]; ctx.strokeStyle=c.edge; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
        if(nd.right>=0&&nd.right<n){ const {x:x1,y:y1}=pos[i],{x:x2,y:y2}=pos[nd.right]; ctx.strokeStyle=c.edge; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
      }
      // nodes
      for(let i=0;i<n;i++){
        const {x,y}=pos[i], nd=nodes[i];
        ctx.beginPath(); ctx.arc(x,y,nodeR,0,Math.PI*2);
        ctx.fillStyle = nd.visited ? c.nodeVisit : (s.hi.includes(i) ? c.nodeHi : c.node);
        ctx.fill();
        ctx.strokeStyle = c.nodeB; ctx.lineWidth=1; ctx.stroke();
        ctx.fillStyle=nd.visited?'#fff':(light.value?'#0f172a':'#e2e8f0');
        ctx.font=`bold ${Math.max(8,nodeR-4)}px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(nd.v, x, y);
      }
      ctx.textBaseline='alphabetic';
      label(W,H,c,`${fmt(s.alg)} · visited: ${s.treeVisited.map(i=>nodes[i].v).join('→')}`);
    }

    function drawLL(W, H) {
      const s = visState, c = C();
      const nodes = s.llNodes, n = nodes.length;
      const boxW=60, boxH=40, gap=20, totalW=n*(boxW+gap)-gap;
      const startX=(W-totalW)/2, y=H/2-20;
      nodes.forEach((nd,i)=>{
        const x=startX+i*(boxW+gap);
        ctx.fillStyle = nd.visited ? (s.hi.includes(i)?c.llHi:c.llVisit) : c.ll;
        ctx.strokeStyle = s.hi.includes(i) ? c.llHi : c.nodeB;
        ctx.lineWidth = s.hi.includes(i) ? 2 : 1;
        ctx.beginPath(); ctx.roundRect(x,y,boxW,boxH,[6]); ctx.fill(); ctx.stroke();
        ctx.fillStyle=light.value?'#0f172a':'#e2e8f0';
        ctx.font=`bold 13px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(nd.val, x+boxW/2, y+boxH/2);
        // arrow
        if(i<n-1){
          const ax=x+boxW+2, ay=y+boxH/2;
          ctx.strokeStyle=c.edge; ctx.lineWidth=1.5;
          ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(ax+gap-4,ay); ctx.stroke();
          // arrowhead
          ctx.fillStyle=c.edge;
          ctx.beginPath(); ctx.moveTo(ax+gap-2,ay); ctx.lineTo(ax+gap-8,ay-4); ctx.lineTo(ax+gap-8,ay+4); ctx.fill();
        }
      });
      ctx.textBaseline='alphabetic';
      label(W,H,c,`${fmt(s.alg)} · node ${s.llActive}/${n}`);
    }

    function drawDP(W, H) {
      const s = visState, c = C();
      const n = s.dpTable.length;
      const cellW = Math.max(30, Math.min(60, (W-80)/n));
      const cellH = 50, startX=(W-n*cellW)/2, y=H/2-cellH/2;
      // table
      s.dpTable.forEach((v,i)=>{
        const x=startX+i*cellW;
        ctx.fillStyle = i===s.dpStep-1 ? c.dpHi : (i<s.dpStep-1 ? c.dpDone : c.dp);
        ctx.strokeStyle=c.nodeB; ctx.lineWidth=1;
        ctx.beginPath(); ctx.rect(x,y,cellW,cellH); ctx.fill(); ctx.stroke();
        ctx.fillStyle=light.value?'#0f172a':'#e2e8f0';
        ctx.font=`10px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(v, x+cellW/2, y+cellH/2);
        ctx.fillStyle=c.txt2; ctx.font=`9px ${IBM}`;
        ctx.fillText(`[${i}]`, x+cellW/2, y+cellH+14);
      });
      ctx.textBaseline='alphabetic';
      label(W,H,c,`${fmt(s.alg)} · dp table`);
    }

    function drawArray(W, H) {
      const s = visState, c = C();
      const a = s.arr, n = a.length;
      const gap=2, maxV=Math.max(...a,1);
      const bw=Math.max(4, Math.floor((W-48-gap*(n-1))/n)), maxH=H-70;
      a.forEach((v,i)=>{
        const x=24+i*(bw+gap), bh=Math.floor((v/maxV)*maxH), y=H-50-bh;
        ctx.fillStyle=s.hi.includes(i)?c.hi:(s.done?c.done:c.bar);
        ctx.beginPath(); ctx.roundRect(x,y,bw,bh,[Math.min(2,bw/2),Math.min(2,bw/2),0,0]); ctx.fill();
        if(n<=20&&bw>=12){ ctx.fillStyle=c.txt2; ctx.font=`9px ${IBM}`; ctx.textAlign='center'; ctx.fillText(v,x+bw/2,H-35); }
      });
      label(W,H,c,`${fmt(s.alg)} · i=${s.arrI}`);
    }

    function drawStack(W, H) {
      const s = visState, c = C();
      const stk = s.stackArr, n = stk.length;
      const boxW=80, boxH=32, gap=3, startY=H-40;
      const x=(W-boxW)/2;
      const maxShow = Math.floor((H-60)/(boxH+gap));
      const show = stk.slice(Math.max(0,n-maxShow));
      show.forEach((v,i)=>{
        const realI=n-show.length+i;
        const y=startY-(i+1)*(boxH+gap);
        ctx.fillStyle = realI===n-1 ? c.hi : c.ll;
        ctx.strokeStyle=c.nodeB; ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(x,y,boxW,boxH,[4]); ctx.fill(); ctx.stroke();
        ctx.fillStyle=light.value?'#0f172a':'#e2e8f0';
        ctx.font=`12px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(v, x+boxW/2, y+boxH/2);
      });
      // base line
      ctx.strokeStyle=c.nodeB; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x-10,startY); ctx.lineTo(x+boxW+10,startY); ctx.stroke();
      ctx.textBaseline='alphabetic';
      label(W,H,c,`${fmt(s.alg)} · size=${n}`);
    }

    function drawString(W, H) {
      const s = visState, c = C();
      const str = s.strS, pat = s.strP;
      const charW=Math.min(32,(W-48)/str.length), charH=40, y=H/2-charH/2-20;
      const startX=(W-str.length*charW)/2;
      // main string
      str.split('').forEach((ch,i)=>{
        const x=startX+i*charW;
        const isMatch=s.strMatches.includes(i)||(i>=s.strI-pat.length&&i<s.strI&&s.strMatches.includes(s.strI-pat.length));
        ctx.fillStyle = i===s.strI-1 ? c.strHi : (isMatch ? c.strMatch : c.str);
        ctx.strokeStyle=c.nodeB; ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(x,y,charW-2,charH,[4]); ctx.fill(); ctx.stroke();
        ctx.fillStyle=light.value?'#0f172a':'#e2e8f0';
        ctx.font=`bold 13px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(ch, x+charW/2-1, y+charH/2);
      });
      // pattern
      const py=y+charH+20, pStartX=(W-pat.length*charW)/2;
      ctx.fillStyle=c.txt2; ctx.font=`9px ${IBM}`; ctx.textAlign='center';
      ctx.fillText('pattern:', pStartX-30, py+20);
      pat.split('').forEach((ch,i)=>{
        const x=pStartX+i*charW;
        ctx.fillStyle=c.hi; ctx.strokeStyle=c.nodeB; ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(x,py,charW-2,charH,[4]); ctx.fill(); ctx.stroke();
        ctx.fillStyle='#fff';
        ctx.font=`bold 13px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(ch, x+charW/2-1, py+charH/2);
      });
      ctx.textBaseline='alphabetic';
      label(W,H,c,`${fmt(s.alg)} · matches: ${s.strMatches.length}`);
    }

    function drawMatrix(W, H) {
      const s = visState, c = C();
      const m = s.matData, rows=m.length, cols=m[0].length;
      const cellW=Math.floor((W-60)/cols), cellH=Math.floor((H-80)/rows);
      const startX=(W-cols*cellW)/2, startY=(H-rows*cellH)/2;
      m.forEach((row,ri)=>row.forEach((v,ci)=>{
        const x=startX+ci*cellW, y=startY+ri*cellH;
        const key=`${ri},${ci}`;
        const isVisited=s.matVisited.includes(key);
        const isCurrent=ri===s.matI&&ci===s.matJ;
        ctx.fillStyle=isCurrent?c.matHi:(isVisited?c.matVisit:c.mat);
        ctx.strokeStyle=c.nodeB; ctx.lineWidth=1;
        ctx.beginPath(); ctx.rect(x,y,cellW,cellH); ctx.fill(); ctx.stroke();
        ctx.fillStyle=isCurrent?'#fff':(light.value?'#0f172a':'#e2e8f0');
        ctx.font=`11px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(v, x+cellW/2, y+cellH/2);
      }));
      ctx.textBaseline='alphabetic';
      label(W,H,c,`${fmt(s.alg)} · visited ${s.matVisited.length}/${rows*cols}`);
    }

    function drawBit(W, H) {
      const s = visState, c = C();
      const num = s.bitNum;
      const bits = Array.from({length:8}, (_,i)=>(num>>(7-i))&1);
      const boxW=50, boxH=50, gap=8, totalW=8*(boxW+gap)-gap;
      const startX=(W-totalW)/2, y=H/2-boxH/2;
      bits.forEach((b,i)=>{
        const x=startX+i*(boxW+gap);
        const isHi=s.hi.includes(7-i)||s.hi.includes(i);
        ctx.fillStyle=isHi?c.bitHi:(b?c.nodeHi:c.bit);
        ctx.strokeStyle=c.nodeB; ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(x,y,boxW,boxH,[6]); ctx.fill(); ctx.stroke();
        ctx.fillStyle=b?'#fff':(light.value?'#64748b':'#94a3b8');
        ctx.font=`bold 20px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(b, x+boxW/2, y+boxH/2);
        ctx.fillStyle=c.txt2; ctx.font=`9px ${IBM}`;
        ctx.fillText(`2^${7-i}`, x+boxW/2, y+boxH+14);
      });
      ctx.textBaseline='alphabetic';
      ctx.fillStyle=c.hi; ctx.font=`12px ${IBM}`; ctx.textAlign='center';
      ctx.fillText(`decimal: ${num}`, W/2, y-12);
      label(W,H,c,`${fmt(s.alg)}`);
    }

    function drawBacktrack(W, H) {
      const s = visState, c = C();
      const arr = s.btArr, n = arr.length;
      const boxW=55, boxH=40, gap=12;
      const totalW=n*(boxW+gap)-gap, startX=(W-totalW)/2, y=60;
      arr.forEach((v,i)=>{
        const x=startX+i*(boxW+gap);
        ctx.fillStyle=s.hi.includes(i)?c.hi:c.bar;
        ctx.strokeStyle=c.nodeB; ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(x,y,boxW,boxH,[6]); ctx.fill(); ctx.stroke();
        ctx.fillStyle=light.value?'#0f172a':'#e2e8f0';
        ctx.font=`bold 14px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(v, x+boxW/2, y+boxH/2);
      });
      // current path
      const curr=s.btCurrent, results=s.btResult;
      ctx.fillStyle=c.txt2; ctx.font=`11px ${IBM}`; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
      ctx.fillText('Current: ['+curr.join(', ')+']', 24, y+boxH+30);
      results.slice(-5).forEach((r,i)=>{
        ctx.fillStyle=c.done; ctx.fillText('✓ ['+r.join(', ')+']', 24, y+boxH+50+i*18);
      });
      label(W,H,c,`${fmt(s.alg)} · solutions: ${results.length}`);
    }

    function drawMath(W, H) {
      const s = visState, c = C();
      if(s.alg==='primes_sieve_of_eratosthenes'||s.alg==='prime_check'||s.alg==='goldbach') {
        const n=s.mathN, cellW=Math.min(40,Math.floor((W-60)/n)), cellH=40;
        const totalW=n*cellW, startX=(W-totalW)/2, y=H/2-cellH/2;
        Array.from({length:n-2},(_,i)=>i+2).forEach((v,i)=>{
          const x=startX+i*cellW;
          const isPrime=s.mathPrimes.includes(v);
          const isCurr=v===s.mathCurrent;
          ctx.fillStyle=isCurr?c.hi:(isPrime?c.done:c.bar);
          ctx.strokeStyle=c.nodeB; ctx.lineWidth=1;
          ctx.beginPath(); ctx.rect(x,y,cellW,cellH); ctx.fill(); ctx.stroke();
          ctx.fillStyle=light.value?'#0f172a':'#e2e8f0';
          ctx.font=`${Math.max(8,cellW-8)}px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(v,x+cellW/2,y+cellH/2);
        });
        ctx.textBaseline='alphabetic';
        ctx.fillStyle=c.done; ctx.font=`11px ${IBM}`; ctx.textAlign='left';
        ctx.fillText(`primes: ${s.mathPrimes.join(', ')}`, 24, 22);
      } else {
        // generic bar chart for math
        const vals=Array.from({length:s.mathN},(_,i)=>Math.round(Math.sin(i*0.4)*100+120));
        const maxV=Math.max(...vals,1), gap=2;
        const bw=Math.max(4, Math.floor((W-48-gap*(vals.length-1))/vals.length)), maxH=H-60;
        vals.forEach((v,i)=>{
          const x=24+i*(bw+gap), bh=Math.floor((v/maxV)*maxH), y=H-36-bh;
          ctx.fillStyle=i<s.mathStep?c.done:(i===s.mathStep?c.hi:c.bar);
          ctx.beginPath(); ctx.roundRect(x,y,bw,bh,[Math.min(2,bw/2),Math.min(2,bw/2),0,0]); ctx.fill();
        });
      }
      label(W,H,c,`${fmt(s.alg)}`);
    }

    function drawHeapVis(W, H) {
      const s = visState, c = C();
      const a = s.heapArr, n = a.length;
      const gap=2, maxV=Math.max(...a,1);
      const bw=Math.max(4, Math.floor((W-48-gap*(n-1))/n)), maxH=H-80;
      a.forEach((v,i)=>{
        const x=24+i*(bw+gap), bh=Math.floor((v/maxV)*maxH), y=H-50-bh;
        ctx.fillStyle=s.hi.includes(i)?c.hi:c.bar;
        ctx.beginPath(); ctx.roundRect(x,y,bw,bh,[Math.min(2,bw/2),Math.min(2,bw/2),0,0]); ctx.fill();
      });
      // parent lines
      for(let i=1;i<Math.min(n,15);i++){
        const par=Math.floor((i-1)/2);
        const pw=bw, ph=bw;
        const px=24+par*(bw+gap)+bw/2, py=H-50-Math.floor((a[par]/maxV)*maxH);
        const cx_=24+i*(bw+gap)+bw/2, cy_=H-50-Math.floor((a[i]/maxV)*maxH);
        ctx.strokeStyle=c.edge; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(cx_,cy_); ctx.stroke();
      }
      label(W,H,c,`${fmt(s.alg)} · heap property`);
    }

    function drawCompression(W, H) {
      const s = visState, c = C();
      const str=s.compStr, result=s.compResult;
      const charW=Math.min(30,(W-60)/str.length), charH=36;
      const startX=(W-str.length*charW)/2, y=80;
      str.split('').forEach((ch,i)=>{
        const x=startX+i*charW;
        const inResult=result.some((r,ri)=>{let offset=0; for(let k=0;k<ri;k++)offset+=result[k].count; return i>=offset&&i<offset+r.count;});
        ctx.fillStyle=i<s.compI?(inResult?c.done:c.nodeHi):(i===s.compI?c.hi:c.bar);
        ctx.strokeStyle=c.nodeB; ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(x,y,charW-1,charH,[3]); ctx.fill(); ctx.stroke();
        ctx.fillStyle=light.value?'#0f172a':'#e2e8f0';
        ctx.font=`bold 12px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(ch,x+charW/2,y+charH/2);
      });
      // result
      const encoded=result.map(r=>`${r.count}${r.char}`).join('');
      ctx.fillStyle=c.done; ctx.font=`13px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('→ '+encoded, W/2, H*0.7);
      ctx.textBaseline='alphabetic';
      label(W,H,c,`${fmt(s.alg)}`);
    }

    function drawMap(W, H) {
      const s = visState, c = C();
      const keys=s.hashKeys, map=s.hashMap;
      const boxW=80, boxH=40, gap=12;
      const n=keys.length, totalW=n*(boxW+gap)-gap;
      const startX=(W-totalW)/2, y=H/2-boxH;
      keys.forEach((k,i)=>{
        const x=startX+i*(boxW+gap);
        ctx.fillStyle=i<s.hashI?(c.nodeVisit):(i===s.hashI?c.hi:c.ll);
        ctx.strokeStyle=c.nodeB; ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(x,y,boxW,boxH,[6]); ctx.fill(); ctx.stroke();
        ctx.fillStyle=light.value?'#0f172a':'#e2e8f0';
        ctx.font=`11px ${IBM}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(`"${k}"`, x+boxW/2, y+boxH/2);
        if(map[k]!==undefined){
          ctx.fillStyle=c.done;
          ctx.fillText(`→ ${map[k]}`, x+boxW/2, y+boxH+18);
        }
      });
      ctx.textBaseline='alphabetic';
      label(W,H,c,`${fmt(s.alg)} · hash map`);
    }

    function label(W,H,c,text) {
      ctx.fillStyle=c.txt2; ctx.font=`11px ${IBM}`; ctx.textAlign='center';
      ctx.fillText(text, W/2, H-8);
    }

    // ─── ANIMATION LOOP ───
    function loopAnim() {
      if (!playing.value) return;
      const now = performance.now();
      const delay = Math.max(2, 600 - speed.value * 0.58);
      if (now - lastTime >= delay) {
        lastTime = now;
        doStep();
      }
      raf = requestAnimationFrame(loopAnim);
    }

    function togglePlay() {
      if (visState.done) { restart(); return; }
      playing.value = !playing.value;
      if (playing.value) { lastTime = 0; loopAnim(); }
      else cancelAnimationFrame(raf);
    }

    function stepOnce() {
      if (playing.value) { playing.value = false; cancelAnimationFrame(raf); }
      doStep();
    }

    function restart() {
      playing.value = false;
      cancelAnimationFrame(raf);
      stepN.value = 0;
      buildState(selCat.value, sel.value);
      draw();
      setTimeout(() => { playing.value = true; loopAnim(); }, 100);
    }

    function toggleTheme() {
      light.value = !light.value;
      document.documentElement.classList.toggle('light', light.value);
      nextTick(() => draw());
    }

    onMounted(() => {
      ex['Sorting'] = true;
      setTimeout(() => pick('Sorting','bubble_sort'), 100);
      window.addEventListener('resize', () => { if (cvs.value) { initCanvas(); draw(); } });
    });

    watch(tab, () => { if (tab.value==='Visualize') nextTick(() => { initCanvas(); draw(); }); });

    return {
      light, drawerOpen, q, ex, selCat, sel, tab, code,
      speed, playing, stepN, cvs, info, tabs, filtered,
      canInstall, installPWA,
      fmt, toggleCat, onSearch, pick,
      togglePlay, stepOnce, restart, toggleTheme
    };
  }
}).mount('#app');

// ─── SERVICE WORKER ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
