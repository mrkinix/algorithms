<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BC Algo">
<meta name="description" content="Interactive algorithm visualizer for every major algorithm category">
<link rel="manifest" href="manifest.json">
<title>BC Algorithms</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

/* ─── TOKENS ─── */
:root{
  --bg:        #0a0e1a;
  --bg1:       #0d1220;
  --bg2:       #111827;
  --surface:   #161d2e;
  --surface2:  #1c2538;
  --border:    #1e2d47;
  --border2:   #243349;
  --txt:       #e2e8f0;
  --txt2:      #94a3b8;
  --txt3:      #4a5568;
  --accent:    #38bdf8;
  --accent2:   #7dd3fc;
  --accentbg:  rgba(56,189,248,.10);
  --accentbg2: rgba(56,189,248,.06);
  --green:     #4ade80;
  --greenbg:   rgba(74,222,128,.08);
  --red:       #f87171;
  --redbg:     rgba(248,113,113,.08);
  --yellow:    #fbbf24;
  --purple:    #a78bfa;
  --purplebg:  rgba(167,139,250,.08);
  --orange:    #fb923c;
  --sidebar-w: 272px;
  --hdr-h:     52px;
  --radius:    10px;
  --font:      'IBM Plex Sans', system-ui, sans-serif;
  --mono:      'IBM Plex Mono', 'Courier New', monospace;
}
.light{
  --bg:       #f8fafc;
  --bg1:      #f1f5f9;
  --bg2:      #e9eef6;
  --surface:  #ffffff;
  --surface2: #f4f7fb;
  --border:   #dde3ed;
  --border2:  #c8d2e0;
  --txt:      #0f172a;
  --txt2:     #475569;
  --txt3:     #94a3b8;
  --accent:   #0284c7;
  --accent2:  #0369a1;
  --accentbg: rgba(2,132,199,.08);
  --accentbg2:rgba(2,132,199,.05);
  --green:    #16a34a;
  --greenbg:  rgba(22,163,74,.07);
  --red:      #dc2626;
  --redbg:    rgba(220,38,38,.07);
  --purple:   #7c3aed;
  --purplebg: rgba(124,58,237,.07);
}

/* ─── FONT BASE ─── */
body{font-family:var(--font);color:var(--txt);background:var(--bg);font-size:14px;line-height:1.5}
::selection{background:var(--accentbg);color:var(--accent)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ─── APP SHELL ─── */
#app{display:flex;height:100dvh;overflow:hidden;position:relative}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(2px);z-index:200;display:none}
.overlay.show{display:block}

/* ─── SIDEBAR ─── */
.sidebar{
  width:var(--sidebar-w);background:var(--bg1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100dvh;
  flex-shrink:0;position:relative;
  transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:201;
}
.sb-head{
  height:var(--hdr-h);display:flex;align-items:center;gap:10px;
  padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-box{
  width:28px;height:28px;background:var(--accent);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:600;font-size:14px;color:#0a0e1a;
  flex-shrink:0;
}
.logo-name{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--txt);letter-spacing:-.3px}
.logo-name span{color:var(--accent)}

.sb-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.sb-search input{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  border-radius:8px;padding:7px 12px;font-size:13px;font-family:var(--font);
  color:var(--txt);outline:none;transition:border-color .15s;
}
.sb-search input:focus{border-color:var(--accent)}
.sb-search input::placeholder{color:var(--txt3)}

.sb-scroll{flex:1;overflow-y:auto;padding:6px 8px}

.cat-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;border-radius:8px;cursor:pointer;
  transition:background .12s;user-select:none;gap:6px;
}
.cat-row:hover{background:var(--surface)}
.cat-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--txt2);flex:1}
.cat-arrow{font-size:9px;color:var(--txt3);transition:transform .2s;flex-shrink:0}
.cat-open .cat-arrow{transform:rotate(90deg)}
.cat-count{font-family:var(--mono);font-size:10px;color:var(--txt3);background:var(--surface2);
  border:1px solid var(--border);border-radius:12px;padding:1px 7px;flex-shrink:0}
.cat-open .cat-count{color:var(--accent);border-color:var(--border2)}

.alg-sub{padding-left:8px;margin-bottom:4px}
.alg-row{
  padding:5px 10px;border-radius:7px;cursor:pointer;font-size:13px;
  color:var(--txt2);transition:all .12s;display:flex;align-items:center;gap:8px;
}
.alg-row:hover{background:var(--surface);color:var(--txt)}
.alg-row.sel{background:var(--accentbg);color:var(--accent);font-weight:500}
.alg-dot{width:4px;height:4px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:.15s}
.alg-row.sel .alg-dot{background:var(--accent)}

.sb-foot{
  padding:10px 14px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.gh{font-size:11px;color:var(--txt3);text-decoration:none;display:flex;align-items:center;gap:5px;transition:.12s}
.gh:hover{color:var(--accent)}
.theme-tog{
  width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);
  background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:.12s;color:var(--txt);
}
.theme-tog:hover{border-color:var(--accent);background:var(--accentbg)}

/* ─── MAIN ─── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100dvh;overflow:hidden}

.topbar{
  height:var(--hdr-h);background:var(--bg1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
}
.menu-btn{
  display:none;width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);
  background:var(--surface);cursor:pointer;align-items:center;justify-content:center;
  font-size:16px;color:var(--txt);flex-shrink:0;
}
.tb-title{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--txt)}
.tb-cat{font-size:11px;color:var(--txt3);font-family:var(--mono)}
.tb-spacer{flex:1}
.live-badge{
  font-family:var(--mono);font-size:10px;padding:3px 8px;
  background:var(--greenbg);color:var(--green);border-radius:12px;
  border:1px solid rgba(74,222,128,.2);letter-spacing:.06em;
}
.install-btn{
  font-size:11px;padding:4px 10px;background:var(--accentbg);color:var(--accent);
  border:1px solid var(--border2);border-radius:8px;cursor:pointer;font-family:var(--mono);
  transition:.15s;display:none;align-items:center;gap:5px;
}
.install-btn.show{display:flex}
.install-btn:hover{background:var(--accent);color:#0a0e1a}

.content{flex:1;overflow-y:auto;padding:20px}

/* ─── EMPTY ─── */
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:.3}
.empty-glyph{font-size:56px;filter:grayscale(1)}
.empty-txt{font-family:var(--mono);font-size:16px;text-align:center;line-height:1.6}

/* ─── TABS ─── */
.tabs{display:flex;gap:2px;margin-bottom:18px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;padding:3px;width:fit-content}
.tab{
  padding:6px 16px;border-radius:7px;border:none;background:none;
  cursor:pointer;font-size:12px;font-weight:500;color:var(--txt2);
  font-family:var(--mono);transition:.15s;letter-spacing:.02em;
}
.tab.on{background:var(--accentbg);color:var(--accent)}

/* ─── CONTROLS ─── */
.controls{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;
}
.cbtn{
  padding:6px 14px;border-radius:8px;border:1px solid var(--border2);
  background:var(--bg2);cursor:pointer;font-size:12px;color:var(--txt);
  font-family:var(--mono);transition:.15s;display:flex;align-items:center;gap:6px;
}
.cbtn:hover{border-color:var(--accent);background:var(--accentbg);color:var(--accent)}
.playbtn{
  padding:7px 20px;border-radius:8px;border:1px solid var(--accent);
  background:var(--accent);cursor:pointer;font-size:12px;color:#0a0e1a;
  font-family:var(--mono);font-weight:600;transition:.15s;display:flex;align-items:center;gap:6px;
}
.playbtn:hover{background:var(--accent2);border-color:var(--accent2)}
.playbtn.paused{background:transparent;color:var(--accent);border-color:var(--accent)}
.playbtn.paused:hover{background:var(--accentbg)}
.speed-row{display:flex;align-items:center;gap:8px;margin-left:auto}
.spd-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--txt3);font-family:var(--mono)}
input[type=range]{accent-color:var(--accent);width:90px}
.stat-row{font-family:var(--mono);font-size:11px;color:var(--txt3)}
.stat-row span{color:var(--accent)}

/* ─── CANVAS ─── */
.cvs-wrap{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;margin-bottom:16px;
}
canvas{width:100%;display:block}

/* ─── INFO PANEL ─── */
.info-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.cplx-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;
}
.cplx-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:4px;font-family:var(--mono)}
.cplx-val{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--txt)}

/* ─── ELI5 ─── */
.eli5{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.eli5-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.eli5-emoji{font-size:22px}
.eli5-title{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--txt);letter-spacing:.02em}
.eli5-body{
  font-size:14px;line-height:1.7;color:var(--txt2);padding:14px;
  background:var(--bg2);border-radius:8px;border-left:3px solid var(--accent);
  margin-bottom:16px;
}
.eli5-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.eli5-col-hd{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-family:var(--mono)}
.eli5-col-hd.g{color:var(--green)}.eli5-col-hd.r{color:var(--red)}.eli5-col-hd.b{color:var(--accent)}
.eli5-ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.eli5-ul li{font-size:13px;color:var(--txt2);line-height:1.5;padding-left:12px;position:relative}
.eli5-ul li::before{content:'';position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%}
.eli5-ul.g li::before{background:var(--green)}.eli5-ul.r li::before{background:var(--red)}.eli5-ul.b li::before{background:var(--accent)}
.avoid-note{margin-top:12px;font-size:11px;color:var(--txt3);font-style:italic}
.avoid-note strong{color:var(--txt2);font-style:normal}

/* ─── CODE (MONOKAI) ─── */
.code-wrap{
  background:#272822;border:1px solid #3e3d32;border-radius:var(--radius);
  padding:20px;overflow:auto;max-height:72vh;
}
.code-wrap pre{
  font-family:var(--mono);font-size:13px;line-height:1.7;
  white-space:pre-wrap;word-break:break-word;color:#f8f8f2;
}
.code-hdr{
  background:#1e1f1a;border:1px solid #3e3d32;border-bottom:none;
  border-radius:var(--radius) var(--radius) 0 0;
  padding:8px 16px;display:flex;align-items:center;gap:8px;
}
.code-dots{display:flex;gap:5px}
.code-dots span{width:10px;height:10px;border-radius:50%}
.code-fname{font-family:var(--mono);font-size:11px;color:#75715e;margin-left:auto}

/* Monokai syntax */
.mk-kw{color:#f92672}
.mk-fn{color:#a6e22e}
.mk-st{color:#e6db74}
.mk-cm{color:#75715e;font-style:italic}
.mk-nm{color:#ae81ff}
.mk-op{color:#f8f8f2}
.mk-bi{color:#66d9ef}

/* ─── DESC ─── */
.desc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px}
.desc-title{font-family:var(--mono);font-weight:600;font-size:20px;color:var(--txt);margin-bottom:8px}
.desc-sub{font-size:13px;color:var(--txt2);line-height:1.7;margin-bottom:20px}

/* ─── ANIM ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .2s ease both}

/* ─── MOBILE ─── */
@media(max-width:700px){
  .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-110%);box-shadow:8px 0 40px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex}
  .eli5-grid{grid-template-columns:1fr}
  .info-wrap{grid-template-columns:1fr 1fr 1fr}
  .speed-row{margin-left:0;width:100%}
  .content{padding:12px}
  .controls{padding:10px}
  .tab{padding:6px 12px}
  .topbar{padding:0 12px}
}
@media(max-width:420px){
  .info-wrap{grid-template-columns:1fr 1fr}
  .tabs{width:100%}
  .tab{flex:1;text-align:center}
}
</style>
</head>
<body>
<div id="app">
  <!-- overlay -->
  <div class="overlay" :class="{show:drawerOpen}" @click="drawerOpen=false"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" :class="{open:drawerOpen}">
    <div class="sb-head">
      <div class="logo">
        <div class="logo-box">B</div>
        <div class="logo-name">BC<span>Algo</span></div>
      </div>
    </div>
    <div class="sb-search">
      <input v-model="q" placeholder="Search…" @input="onSearch">
    </div>
    <div class="sb-scroll">
      <div v-for="(algs,cat) in filtered" :key="cat">
        <div class="cat-row" :class="{'cat-open':ex[cat]}" @click="toggleCat(cat)">
          <span class="cat-name">{{ cat }}</span>
          <span class="cat-count">{{ algs.length }}</span>
          <span class="cat-arrow">▶</span>
        </div>
        <div class="alg-sub" v-if="ex[cat]">
          <div v-for="a in algs" :key="a"
            class="alg-row" :class="{sel:sel===a}"
            @click="pick(cat,a)">
            <span class="alg-dot"></span>{{ fmt(a) }}
          </div>
        </div>
      </div>
    </div>
    <div class="sb-foot">
      <a href="https://github.com/keon/algorithms" target="_blank" class="gh">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        keon/algorithms
      </a>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="install-btn" :class="{show:canInstall}" @click="installPWA">⊕ Install</button>
        <button class="theme-tog" @click="toggleTheme">{{ light?'🌙':'☀️' }}</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <button class="menu-btn" @click="drawerOpen=true">☰</button>
      <div v-if="sel">
        <div class="tb-title">{{ fmt(sel) }}</div>
        <div class="tb-cat">{{ selCat }}</div>
      </div>
      <div v-else style="font-family:var(--mono);font-size:14px;color:var(--txt3)">BC Algorithms</div>
      <div class="tb-spacer"></div>
      <span v-if="sel" class="live-badge">LIVE</span>
    </header>

    <div class="content">

      <!-- EMPTY -->
      <div v-if="!sel" class="empty anim" style="height:calc(100dvh - 52px - 40px)">
        <div class="empty-glyph">⌬</div>
        <div class="empty-txt">select an algorithm<br>from the sidebar</div>
      </div>

      <!-- SELECTED VIEW -->
      <div v-else class="anim" :key="sel">

        <div class="tabs">
          <button v-for="t in tabs" :key="t" class="tab" :class="{on:tab===t}" @click="tab=t">{{ t }}</button>
        </div>

        <!-- ═══ VISUALIZE ═══ -->
        <template v-if="tab==='Visualize'">

          <div class="info-wrap">
            <div class="cplx-card">
              <div class="cplx-lbl">Time</div>
              <div class="cplx-val">{{ info.time }}</div>
            </div>
            <div class="cplx-card">
              <div class="cplx-lbl">Space</div>
              <div class="cplx-val">{{ info.space }}</div>
            </div>
          </div>

          <div class="controls">
            <button class="cbtn" @click="restart">⟳ New</button>
            <button class="playbtn" :class="{paused:playing}" @click="togglePlay">
              {{ playing ? '⏸ Pause' : '▶ Run' }}
            </button>
            <button class="cbtn" @click="stepOnce">Step →</button>
            <div class="speed-row">
              <span class="spd-lbl">Speed</span>
              <input type="range" v-model.number="speed" min="10" max="990">
            </div>
            <span class="stat-row">step <span>{{ stepN }}</span></span>
          </div>

          <div class="cvs-wrap">
            <canvas ref="cvs" height="360"></canvas>
          </div>

          <!-- ELI5 -->
          <div class="eli5">
            <div class="eli5-hd">
              <span class="eli5-emoji">🧒</span>
              <span class="eli5-title">ELI5 — Explain Like I'm Five</span>
            </div>
            <div class="eli5-body">{{ info.eli5 }}</div>
            <div class="eli5-grid">
              <div>
                <div class="eli5-col-hd g">✓ Pros</div>
                <ul class="eli5-ul g">
                  <li v-for="p in info.pros" :key="p">{{ p }}</li>
                </ul>
              </div>
              <div>
                <div class="eli5-col-hd r">✗ Cons</div>
                <ul class="eli5-ul r">
                  <li v-for="c in info.cons" :key="c">{{ c }}</li>
                </ul>
              </div>
              <div>
                <div class="eli5-col-hd b">⊞ Used In</div>
                <ul class="eli5-ul b">
                  <li v-for="u in info.uses" :key="u">{{ u }}</li>
                </ul>
                <div class="avoid-note"><strong>Avoid:</strong> {{ info.avoid }}</div>
              </div>
            </div>
          </div>
        </template>

        <!-- ═══ CODE ═══ -->
        <template v-if="tab==='Code'">
          <div class="code-hdr">
            <div class="code-dots">
              <span style="background:#ff5f57"></span>
              <span style="background:#febc2e"></span>
              <span style="background:#28c840"></span>
            </div>
            <span class="code-fname">{{ sel }}.py</span>
          </div>
          <div class="code-wrap">
            <pre>{{ code || '# Loading…' }}</pre>
          </div>
        </template>

        <!-- ═══ INFO ═══ -->
        <template v-if="tab==='Info'">
          <div class="desc-card">

// ─── ELI5 DATABASE ───
const ELI5 = {
  // SORTING
  'Sorting:bubble_sort':{eli5:"Walk through the list again and again, swapping any two neighbours that are in the wrong order. Like bubbles of air rising to the surface — big numbers slowly bubble to the end.",pros:['Easy to code','No extra memory','Stable sort'],cons:['O(n²) — very slow on large data','Many unnecessary swaps'],uses:['Teaching sorting basics','Tiny arrays < 20 items'],avoid:'Production code or large datasets',time:'O(n²)',space:'O(1)',desc:'Repeatedly compares adjacent elements and swaps them if in the wrong order. Continues until no swaps occur.'},
  'Sorting:insertion_sort':{eli5:"Like sorting playing cards in your hand: pick one card at a time and slide it left until it's in the right spot among the already-sorted cards.",pros:['Fast on nearly-sorted data','Stable','Very low overhead'],cons:['O(n²) on random data','Many element shifts'],uses:['Small arrays','Nearly-sorted streams','Sub-routine in Timsort'],avoid:'Large random datasets',time:'O(n²)',space:'O(1)',desc:'Builds the sorted array one element at a time by inserting each new element into its correct position.'},
  'Sorting:selection_sort':{eli5:"Scan everything, find the smallest item, put it first. Scan the rest, find the next smallest, put it second. Keep going.",pros:['Minimal swaps O(n)','Simple to understand'],cons:['Always O(n²) comparisons','Not stable'],uses:['When swaps are costly (flash memory)','Tiny arrays'],avoid:'Any performance-sensitive code',time:'O(n²)',space:'O(1)',desc:'Divides array into sorted/unsorted parts; repeatedly picks the minimum from unsorted and appends to sorted.'},
  'Sorting:quick_sort':{eli5:"Pick a pivot number. Put smaller numbers left, bigger ones right. Do the same on each side recursively. Divide and conquer!",pros:['Fastest average case O(n log n)','In-place (O(log n) stack)','Cache-friendly'],cons:['Worst case O(n²) with bad pivot','Not stable','Recursive stack risk'],uses:["Most languages' built-in sort",'General purpose sorting'],avoid:'When guaranteed worst-case is required',time:'O(n log n)',space:'O(log n)',desc:'Divide-and-conquer: pick a pivot, partition around it, recursively sort both partitions.'},
  'Sorting:merge_sort':{eli5:"Split the list in half. Sort each half. Merge them like shuffling two sorted card decks. Always guaranteed fast!",pros:['Guaranteed O(n log n)','Stable','Excellent for linked lists'],cons:['O(n) extra memory','Slower constants than quicksort'],uses:['External sort (data > RAM)','Stable sort needs','Standard library sorts'],avoid:'Memory-constrained environments',time:'O(n log n)',space:'O(n)',desc:'Recursively splits the array, sorts each half, and merges them back in sorted order.'},
  'Sorting:heap_sort':{eli5:"Build a heap (a tree where the top is always the biggest). Keep pulling the top off and placing it at the end. Guaranteed fast with no extra memory!",pros:['Guaranteed O(n log n)','In-place O(1) space','Consistent performance'],cons:['Not stable','Poor cache behavior','Slower than quicksort in practice'],uses:['Real-time / embedded systems','When O(1) space is required'],avoid:'When average-case speed matters most',time:'O(n log n)',space:'O(1)',desc:'Converts the array to a max-heap, then repeatedly extracts the max to produce sorted output.'},
  'Sorting:shell_sort':{eli5:"Like insertion sort but you compare items far apart first, then closer. Pre-arranging from a distance makes the final pass super fast.",pros:['Much faster than insertion sort','In-place','Simple to implement'],cons:['Not stable','Complex time analysis','Slower than O(n log n) algorithms'],uses:['Embedded systems','Limited memory environments'],avoid:'When a guaranteed complexity is needed',time:'O(n log² n)',space:'O(1)',desc:'A generalization of insertion sort that sorts elements at decreasing gap intervals.'},
  'Sorting:counting_sort':{eli5:"Count how many times each number appears. Use those counts to place numbers in the right spots. No comparisons needed at all!",pros:['Linear time O(n+k)','Stable','Very fast for small integer ranges'],cons:['Only integers in a known range','Needs O(k) extra memory'],uses:['Integer sorting with small range','Radix sort sub-routine'],avoid:'Floats, strings, or huge value ranges',time:'O(n+k)',space:'O(k)',desc:'Counts occurrences of each value, uses prefix sums to determine sorted positions.'},
  'Sorting:radix_sort':{eli5:"Sort numbers digit by digit from rightmost to leftmost, using counting sort each time. After all digits, the array is fully sorted!",pros:['Linear O(d·n) for fixed-width ints','Stable'],cons:['Only integers/fixed-length strings','More complex code'],uses:['Phone numbers','IP addresses','Fixed-width integer arrays'],avoid:'Variable-length or floating-point data',time:'O(d·n)',space:'O(n+k)',desc:'Sorts integers by processing individual digits from least to most significant using stable sub-sorts.'},
  'Sorting:bucket_sort':{eli5:"Scatter numbers into buckets by their range. Sort each small bucket. Pour them all out in order.",pros:['O(n+k) average for uniform data','Parallelizable'],cons:['O(n²) worst case','Needs extra memory','Sensitive to data distribution'],uses:['Uniform distribution floats [0,1)','Distributed sorting'],avoid:'Skewed or clustered data',time:'O(n+k)',space:'O(n)',desc:'Distributes elements into equal-width buckets, sorts each bucket, then concatenates.'},
  'Sorting:bogo_sort':{eli5:"Shuffle the list randomly. Is it sorted? No? Shuffle again. Repeat until you get lucky. This is a JOKE algorithm — never ever use it!",pros:["It's funny","Terminates... eventually"],cons:['Average O(n·n!) — practically infinite','Randomness-dependent'],uses:['Teaching worst-case algorithms','Comedy'],avoid:'Everything in existence',time:'O(n·n!)',space:'O(1)',desc:'Randomly permutes the array until it happens to be sorted. A joke sorting algorithm.'},
  'Sorting:gnome_sort':{eli5:"Move forward if items are in order, swap and step back if they're not. Like a garden gnome sorting flower pots.",pros:['Simple code','In-place and stable'],cons:['O(n²) worst case','Slow in practice'],uses:['Teaching','Tiny arrays'],avoid:'Anything real',time:'O(n²)',space:'O(1)',desc:'Moves through the array, swapping adjacent elements and stepping back until the whole array is sorted.'},
  'Sorting:cocktail_shaker_sort':{eli5:"Like bubble sort but goes back and forth — forward AND backward each pass. Both ends get sorted simultaneously.",pros:['Slightly faster than bubble sort','Handles turtles (small values at end)'],cons:['Still O(n²)','More complex than bubble sort'],uses:['Teaching bidirectional traversal'],avoid:'Large datasets',time:'O(n²)',space:'O(1)',desc:'A bidirectional variant of bubble sort that passes left-to-right then right-to-left each iteration.'},
  'Sorting:comb_sort':{eli5:"Like bubble sort but instead of comparing neighbours, compare items further apart first, shrinking the gap each pass. Much faster than bubble sort.",pros:['Faster than bubble sort in practice','Simple to implement','In-place'],cons:['Not stable','Complex worst-case analysis'],uses:['When bubble sort is too slow but simplicity matters'],avoid:'Production environments',time:'O(n²)',space:'O(1)',desc:'Improves bubble sort by using a gap > 1 initially, gradually shrinking it to 1.'},
  'Sorting:cycle_sort':{eli5:"Think of each element as belonging to a cycle. Move each element directly to its correct position, completing cycles one at a time. Minimizes writes!",pros:['Theoretical minimum writes O(n)','In-place'],cons:['O(n²) comparisons','Complex to implement'],uses:['Flash/EEPROM where writes are expensive'],avoid:'General-purpose sorting',time:'O(n²)',space:'O(1)',desc:'Places each element in its correct position directly, minimizing the total number of write operations.'},
  'Sorting:pancake_sort':{eli5:"You can only flip a prefix of the array (like flipping a stack of pancakes). Repeatedly find the max and flip it to the front, then flip it to its final position.",pros:['Only needs prefix reversal operations','Interesting sorting model'],cons:['O(n²) performance','Not practical'],uses:['Biological sorting models','Theoretical CS'],avoid:'Any real sorting task',time:'O(n²)',space:'O(1)',desc:'Sorts by repeatedly flipping prefixes of the array to move elements to their correct positions.'},
  'Sorting:wiggle_sort':{eli5:"Rearrange the array so it alternates: small, big, small, big... Like a zigzag line. Not fully sorted, just wiggled!",pros:['O(n) linear time','In-place'],cons:['Not a full sort — just a specific arrangement','Limited use cases'],uses:['Interview problem','Specific data processing patterns'],avoid:'When you need fully sorted output',time:'O(n)',space:'O(1)',desc:'Rearranges the array so nums[0] ≤ nums[1] ≥ nums[2] ≤ nums[3]… in an alternating pattern.'},
  // SEARCHING
  'Searching:binary_search':{eli5:"Open a phone book to the middle. Is your name before or after? Throw away half the book. Repeat. You find the name in just log₂(n) steps!",pros:['O(log n) — extremely fast','Simple and well-understood'],cons:['Requires sorted input','Not for linked lists'],uses:['Database indexes','Sorted arrays','Standard library searches'],avoid:'Unsorted collections',time:'O(log n)',space:'O(1)',desc:'Finds a target in a sorted array by halving the search space at each step.'},
  'Searching:linear_search':{eli5:"Check each item one by one from the start until you find what you want. Simple, but slow for large lists.",pros:['Works on unsorted data','No preprocessing','Simple'],cons:['O(n) worst case','Slow on large data'],uses:['Small unsorted lists','Linked lists','One-off searches'],avoid:'Large datasets or repeated searches',time:'O(n)',space:'O(1)',desc:'Scans each element sequentially until the target is found or the list ends.'},
  'Searching:jump_search':{eli5:"Instead of checking every element, jump ahead in fixed blocks. When you overshoot, go back and do a linear search in the last block.",pros:['O(√n) — between linear and binary','Works with sequential access'],cons:['Requires sorted input','Worse than binary search'],uses:['Sorted arrays with expensive random access','Magnetic disks'],avoid:'When binary search is available',time:'O(√n)',space:'O(1)',desc:'Jumps ahead by fixed steps, then does a backward linear search in the found block.'},
  'Searching:interpolation_search':{eli5:"Instead of always checking the middle, estimate where the target should be based on its value — like guessing the page of a word in a dictionary.",pros:['O(log log n) for uniform data','Faster than binary on uniform distributions'],cons:['O(n) worst case on non-uniform data','Complex formula'],uses:['Uniformly distributed sorted arrays','Phone book searches'],avoid:'Non-uniform or small datasets',time:'O(log log n)',space:'O(1)',desc:'Improves binary search by estimating the target position using interpolation on the value range.'},
  'Searching:exponential_search':{eli5:"Start from index 1, keep doubling (1, 2, 4, 8, 16…) until you exceed the target. Then run binary search in that range.",pros:['Good for unbounded/infinite arrays','O(log n) average'],cons:['Requires sorted input','More complex than binary search'],uses:['Unbounded/infinite sorted arrays','When range is unknown'],avoid:'Bounded arrays where binary search works',time:'O(log n)',space:'O(1)',desc:'Finds range by exponential jumps, then performs binary search within that range.'},
  'Searching:ternary_search':{eli5:"Like binary search but splits into three parts instead of two. Check two midpoints to decide which third contains your target.",pros:['Works on unimodal functions','O(log₃ n)'],cons:['More comparisons per step than binary search','Not faster overall'],uses:['Finding min/max of unimodal functions','Optimization problems'],avoid:'Standard sorted array searching',time:'O(log n)',space:'O(1)',desc:'Divides the search space into three parts to find a target in a sorted array or min/max of a unimodal function.'},
  // GRAPH
  'Graph:dijkstra':{eli5:"Finding shortest path in a city map: always visit the nearest unvisited city, update distances to its neighbours, repeat. Greedily picks the shortest path!",pros:['Optimal for non-negative weights','O((V+E)log V) with heap'],cons:['Fails with negative edges','Memory intensive for large graphs'],uses:['GPS navigation','Network routing','Game pathfinding'],avoid:'Graphs with negative edge weights',time:'O((V+E)log V)',space:'O(V)',desc:"Greedy single-source shortest path algorithm for graphs with non-negative edge weights."},
  'Graph:bellman_ford':{eli5:"Unlike Dijkstra, this relaxes ALL edges V-1 times. Slower but handles negative weights and detects negative cycles.",pros:['Handles negative edge weights','Detects negative cycles','Simpler implementation'],cons:['O(V·E) — slower than Dijkstra','Not efficient for large sparse graphs'],uses:['Currency arbitrage detection','Network routing with negative costs'],avoid:'Large graphs where Dijkstra suffices',time:'O(V·E)',space:'O(V)',desc:'Computes shortest paths from source by relaxing all edges repeatedly, detecting negative cycles.'},
  'Graph:a_star':{eli5:"Like Dijkstra but smarter: uses a heuristic to guess which direction to explore first. Like GPS using 'roughly how far is my destination' to guide the search.",pros:['Faster than Dijkstra with good heuristic','Optimal with admissible heuristic'],cons:['Heuristic design is problem-specific','High memory usage'],uses:['Game pathfinding','Robotics','Puzzle solving (8-puzzle)'],avoid:'When no good heuristic exists',time:'O(E)',space:'O(V)',desc:'Best-first search using f(n)=g(n)+h(n); combines actual cost and heuristic to find optimal paths efficiently.'},
  'Graph:traversal':{eli5:"Visit every node in a graph. BFS uses a queue (level by level), DFS uses a stack (dive deep first). Both eventually visit all reachable nodes.",pros:['Finds all reachable nodes','Builds the foundation for most graph algorithms'],cons:['O(V+E) — must visit all nodes','BFS uses more memory; DFS risks stack overflow'],uses:['Web crawlers','Social network analysis','Component detection'],avoid:'When you only need one path',time:'O(V+E)',space:'O(V)',desc:'BFS explores nodes level by level using a queue. DFS explores as deep as possible before backtracking.'},
  'Graph:cycle_detection':{eli5:"Walk through the graph. If you visit a node you've already seen in the current path, there's a cycle — like walking in circles!",pros:['Detects cycles in O(V+E)','Works for directed and undirected graphs'],cons:['Different algorithms for directed vs undirected'],uses:['Deadlock detection','Build system dependency checking','Circuit analysis'],avoid:'Trees (they can\'t have cycles by definition)',time:'O(V+E)',space:'O(V)',desc:'Detects cycles in a graph using DFS by tracking currently-visited nodes in the recursion stack.'},
  'Graph:topological_sort_bfs':{eli5:"In a dependency graph (A must come before B), find an ordering where all dependencies come first. Like ordering tasks in a project!",pros:['Finds valid task ordering','Detects cycles (no valid ordering exists)'],cons:['Only works on DAGs (no cycles)','Multiple valid orderings exist'],uses:['Build systems (make, gradle)','Course prerequisite ordering','Package managers'],avoid:'Graphs with cycles',time:'O(V+E)',space:'O(V)',desc:"Kahn's algorithm: uses in-degree counts and a queue to produce a topological order of a DAG."},
  'Graph:minimum_spanning_tree':{eli5:"Connect all cities with roads, using as little total road length as possible. Kruskal's picks the cheapest edges; Prim's grows from a starting node.",pros:['Minimum total edge weight','No cycles in result'],cons:['Only for connected undirected graphs','Unique edges required for unique MST'],uses:['Network cable layout','Circuit design','Cluster analysis'],avoid:'Directed graphs or when not all nodes must connect',time:'O(E log E)',space:'O(V)',desc:"Finds the spanning tree with minimum total edge weight using Kruskal's or Prim's algorithm."},
  'Graph:maximum_flow':{eli5:"Water flowing through pipes with limited capacity. Find the maximum amount of water that can flow from source to sink.",pros:['Optimal solution','Multiple algorithms available'],cons:['Complex to implement','O(V·E²) for Edmonds-Karp'],uses:['Network bandwidth','Job assignment','Baseball elimination problems'],avoid:'When flow network structure doesn\'t apply',time:'O(V·E²)',space:'O(V+E)',desc:'Finds the maximum flow through a flow network from source to sink using augmenting paths.'},
  // DYNAMIC PROGRAMMING
  'Dynamic Programming:fibonacci':{eli5:"Instead of recalculating fib(5) over and over in recursion, write answers on sticky notes. fib(10) just looks up fib(9) and fib(8) — already computed!",pros:['Transforms O(2ⁿ) to O(n)','Core DP pattern — memoization'],cons:['Uses extra O(n) memory','Iterative solution is even simpler'],uses:['Teaching memoization','Sequence generation','Golden ratio approximation'],avoid:'When iterative loop suffices',time:'O(n)',space:'O(n)',desc:'Computes Fibonacci numbers using memoization or bottom-up DP, avoiding redundant recursion.'},
  'Dynamic Programming:knapsack':{eli5:"Your bag fits 5kg. Items have weights and values. What combination gives the most value without exceeding the limit? DP tries all combos efficiently by remembering sub-answers.",pros:['Guaranteed optimal solution','Classic DP pattern'],cons:['O(n·W) — slow for large capacities','Only works for integer weights'],uses:['Resource allocation','Portfolio optimization','Ad selection systems'],avoid:'Continuous weights or huge capacities',time:'O(n·W)',space:'O(n·W)',desc:'Solves 0/1 knapsack: maximize value of items fitting within a weight limit using a 2D DP table.'},
  'Dynamic Programming:longest_increasing':{eli5:"In the sequence 3,1,4,1,5,9,2,6 — what's the longest subsequence that keeps going up? DP tracks the best ending at each position.",pros:['O(n log n) with patience sorting','Classic interview problem'],cons:['Only subsequence, not substring'],uses:['Stock price trend analysis','Sequence analysis in bioinformatics'],avoid:'When you need contiguous substring',time:'O(n log n)',space:'O(n)',desc:'Finds the length of the longest strictly increasing subsequence using dynamic programming.'},
  'Dynamic Programming:coin_change':{eli5:"Given coins of value 1, 5, 10 and a target amount, what's the minimum number of coins to make it? DP builds up from amount=0.",pros:['Guaranteed optimal','Classic DP template'],cons:['O(n·amount) time and space'],uses:['Vending machines','Currency exchange','Resource allocation'],avoid:'When amount is astronomically large',time:'O(n·amount)',space:'O(amount)',desc:'Finds minimum number of coins to make a target amount using bottom-up dynamic programming.'},
  'Dynamic Programming:edit_distance':{eli5:"How many insertions, deletions, or substitutions to turn 'kitten' into 'sitting'? DP fills a grid of sub-problem answers.",pros:['Exact optimal solution','Works for any string pair'],cons:['O(m·n) time and space'],uses:['Spell checkers','DNA sequence alignment','Diff tools'],avoid:'Very long strings without approximation',time:'O(m·n)',space:'O(m·n)',desc:'Computes the Levenshtein distance: minimum edit operations to transform one string into another.'},
  'Dynamic Programming:max_subarray':{eli5:"Find the contiguous sub-array with the largest sum. Kadane's algorithm: at each step, decide to extend the current sub-array or start fresh.",pros:['O(n) linear time','Classic Kadane\'s algorithm'],cons:['Only contiguous sub-arrays'],uses:['Stock profit maximization','Signal processing','Image analysis'],avoid:'Non-contiguous subset problems',time:'O(n)',space:'O(1)',desc:"Kadane's algorithm: finds the maximum sum contiguous sub-array in linear time."},
  'Dynamic Programming:climbing_stairs':{eli5:"You can take 1 or 2 steps at a time. How many ways to reach step n? It's just the Fibonacci sequence! Each step's count = sum of previous two.",pros:['O(n) simple DP','Teaches DP fundamentals'],cons:['Limited to this specific problem type'],uses:['Teaching DP basics','Interview warmup'],avoid:'When you actually need to climb stairs',time:'O(n)',space:'O(1)',desc:'Counts distinct ways to climb n stairs taking 1 or 2 steps at a time — equivalent to Fibonacci.'},
  // TREE
  'Tree:traversal_inorder':{eli5:"Visit left child, then current node, then right child. For a Binary Search Tree, this visits nodes in perfectly sorted order — like reading left to right!",pros:['Produces sorted output for BST','Simple recursion'],cons:['O(h) stack space for deep trees'],uses:['Getting sorted output from BST','Expression tree evaluation','BST validation'],avoid:'When level-order (BFS) traversal is needed',time:'O(n)',space:'O(h)',desc:'Recursively visits left subtree → root → right subtree. Produces sorted order for BSTs.'},
  'Tree:traversal_level_order':{eli5:"Visit all nodes floor by floor — all root's children first, then their children. Uses a queue to track who's next.",pros:['Finds shortest path in unweighted trees','Intuitive level-by-level view'],cons:['O(w) memory where w = max width'],uses:['Finding minimum depth','Serializing trees','Level-by-level processing'],avoid:'Deep narrow trees (DFS is better)',time:'O(n)',space:'O(w)',desc:'BFS-based traversal visiting nodes level by level using a queue.'},
  'Tree:traversal_preorder':{eli5:"Visit the current node first, then left, then right. Great for copying or printing the tree structure from top to bottom.",pros:['Good for tree serialization','Simple recursion'],cons:['Not sorted output'],uses:['Tree serialization','Directory listing','Expression prefix notation'],avoid:'When sorted output is needed',time:'O(n)',space:'O(h)',desc:'Recursively visits root → left → right. Used for tree serialization and copying.'},
  'Tree:traversal_postorder':{eli5:"Visit left child, then right child, then the current node. Like cleaning up — children before parents. Perfect for deleting trees or evaluating expressions.",pros:['Correct order for deleting trees','Expression evaluation'],cons:['Less intuitive','Not sorted'],uses:['Deleting trees','Postfix expression evaluation','Directory size calculation'],avoid:'When pre/in-order is needed',time:'O(n)',space:'O(h)',desc:'Recursively visits left → right → root. Used for deletion and postfix expression evaluation.'},
  'Tree:invert_tree':{eli5:"Swap every left and right child in the entire tree. The mirror image of the original tree!",pros:['O(n) — visits every node once','Clean recursive solution'],cons:['Modifies tree in place'],uses:['Mirroring data structures','Symmetry checking','Interview classic'],avoid:'When original tree must be preserved',time:'O(n)',space:'O(h)',desc:'Recursively swaps the left and right children of every node to produce the mirror image of the tree.'},
  'Tree:max_height':{eli5:"How many floors does the tree have? Recursively find the height of left and right subtrees, return the bigger one plus one for the current node.",pros:['Simple O(n) recursion','Foundation for many tree algorithms'],cons:['Recursive — O(h) stack for deep trees'],uses:['Balancing checks','Tree analysis'],avoid:'Extremely deep unbalanced trees (stack overflow)',time:'O(n)',space:'O(h)',desc:'Recursively computes tree height as 1 + max(left_height, right_height).'},

function getInfo(cat, alg) {
  const key = `${cat}:${alg}`;
  if (ELI5[key]) return ELI5[key];
  // Smart defaults per category
  const defaults = {
    'Sorting':{time:'O(n²)',space:'O(1)'},
    'Searching':{time:'O(log n)',space:'O(1)'},
    'Graph':{time:'O(V+E)',space:'O(V)'},
    'Dynamic Programming':{time:'O(n²)',space:'O(n)'},
    'Tree':{time:'O(n)',space:'O(h)'},
    'Linked List':{time:'O(n)',space:'O(1)'},
    'String':{time:'O(n)',space:'O(n)'},
    'Array':{time:'O(n)',space:'O(1)'},
    'Backtracking':{time:'O(2ⁿ)',space:'O(n)'},
    'Math':{time:'O(√n)',space:'O(1)'},
    'Matrix':{time:'O(n²)',space:'O(1)'},
    'Stack':{time:'O(n)',space:'O(n)'},
    'Heap':{time:'O(n log n)',space:'O(n)'},
    'Compression':{time:'O(n log n)',space:'O(n)'},
    'Bit Manipulation':{time:'O(1)',space:'O(1)'},
    'Map':{time:'O(n)',space:'O(n)'},
    'Queue':{time:'O(n)',space:'O(n)'},
  };
  const d = defaults[cat] || {time:'O(n)',space:'O(1)'};
  return {
    eli5:`This is a ${cat} algorithm. Step through the animation to see how it processes data towards the solution.`,
    pros:['Elegant and well-studied','Clear problem decomposition'],
    cons:['Check complexity before scaling','May have edge cases'],
    uses:['Competitive programming','System design','Core CS education'],
    avoid:'When a simpler built-in function already solves it',
    desc:`A ${cat} algorithm that demonstrates key computer science concepts. See the Code tab for the original Python implementation from keon/algorithms.`,
    time:d.time, space:d.space
  };
}

createApp({
  setup() {
    const light = ref(false);

    const sel = ref(null);
    const tab = ref('Visualize');
    const code = ref('');
    const speed = ref(400);
    const playing = ref(false);
    const stepN = ref(0);
    const cvs = ref(null);
    const canInstall = ref(false);
    let deferredPrompt = null;
    let ctx = null;
    let raf = null;
    let lastTime = 0;
    let visState = {};
    let catGroup = ref('');

    // PWA install
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      canInstall.value = true;

    function installPWA() {

    const filtered = computed(() => {
      if (!q.value) return ALGS;
      const qv = q.value.toLowerCase();

        const f = algs.filter(a => a.includes(qv) || cat.toLowerCase().includes(qv));
        if (f.length) r[cat] = f;
      }
      return r;
    });

    const info = computed(() => getInfo(selCat.value, sel.value));
    const tabs = computed(() => ['Visualize','Code','Info']);

    function fmt(s) { return s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }

    function toggleCat(cat) { ex[cat] = !ex[cat]; }

    function onSearch() {
      if (q.value) for (const c of Object.keys(filtered.value)) ex[c] = true;
    }

    async function pick(cat, alg) {
      selCat.value = cat;
      sel.value = alg;
      tab.value = 'Visualize';
      playing.value = false;
      cancelAnimationFrame(raf);
      stepN.value = 0;
      drawerOpen.value = false;
      catGroup.value = cat;

      const folder = cat.toLowerCase().replace(/\s+/g,'_');
      const url = `https://raw.githubusercontent.com/keon/algorithms/main/algorithms/${folder}/${alg}.py`;
      fetch(url).then(r=>r.text()).then(t=>{ code.value=t; }).catch(()=>{ code.value=`# Could not fetch ${alg}.py\n# Visit: https://github.com/keon/algorithms`; });

      await nextTick();
