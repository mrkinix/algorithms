<script type="module">
import { createApp, reactive, ref, computed, nextTick } from 'vue';
import { ELI5 } from './eli5.js';

// Add roundRect to Canvas prototype
CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
  if (w < 2 * r) r = w / 2;
  if (h < 2 * r) r = h / 2;
  this.moveTo(x + r, y);
  this.lineTo(x + w - r, y);
  this.quadraticCurveTo(x + w, y, x + w, y + r);
  this.lineTo(x + w, y + h - r);
  this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  this.lineTo(x + r, y + h);
  this.quadraticCurveTo(x, y + h, x, y + h - r);
  this.lineTo(x, y + r);
  this.quadraticCurveTo(x, y, x + r, y);
  return this;
};

// ═══════════════════════════════════════════════
// ALGORITHM DATABASE
// ═══════════════════════════════════════════════
const ALGS = {
  'Array':['delete_nth','flatten','garage','josephus','limit','longest_non_repeat','max_ones_index','merge_intervals','missing_ranges','move_zeros','n_sum','plus_one','remove_duplicates','rotate','summarize_ranges','three_sum','two_sum','trimmean'],
  'Backtracking':['add_operators','anagram','combination_sum','factor_combinations','generate_parenthesis','letter_combination','palindrome_partitioning','permute','permute_unique','subsets','subsets_unique'],
  'Bit Manipulation':['add_bitwise_operator','binary_gap','count_ones','find_difference','find_missing_number','flip_bit_longest_sequence','gray_code','has_alternative_bit','power_of_two','reverse_bits','single_number','single_number2','swap_pair'],
  'Compression':['huffman_coding','rle_compression','elias'],
  'Dynamic Programming':['buy_sell_stock','climbing_stairs','coin_change','edit_distance','egg_drop','fibonacci','house_robber','job_scheduling','knapsack','longest_common_subsequence','longest_increasing','max_product_subarray','max_subarray','min_cost_path','word_break'],
  'Graph':['a_star','bellman_ford','check_bipartite','cycle_detection','dijkstra','find_path','kahns_algorithm','markov_chain','maximum_flow','minimum_spanning_tree','topological_sort_bfs','topological_sort_dfs','traversal'],
  'Greedy':['gale_shapley','max_contiguous_subsequence_sum'],
  'Heap':['k_closest_points','merge_sorted_k_lists','sliding_window_max'],
  'Linked List':['add_two_numbers','delete_node','first_cyclic_node','is_cyclic','is_palindrome','kth_to_last','merge_two_list','remove_duplicates','remove_range','reverse','rotate_list','swap_in_pairs'],
  'Map':['is_anagram','is_isomorphic','randomized_set','valid_sudoku','word_pattern'],
  'Math':['combination','euler_totient','extended_gcd','factorial','fibonacci','gcd','goldbach','hailstone','linear_regression','modular_exponential','nth_digit','power','prime_check','primes_sieve_of_eratosthenes','sqrt_precision_factor'],
  'Matrix':['bomb_enemy','count_paths','rotate_image','search_in_sorted_matrix','spiral_traversal','sudoku_validator'],
  'Queue':['max_sliding_window','moving_average','reconstruct_queue'],
  'Searching':['binary_search','exponential_search','find_min_rotate','first_occurrence','interpolation_search','jump_search','last_occurrence','linear_search','next_greatest_letter','search_insert','search_range','search_rotate','ternary_search','two_sum'],
  'Sorting':['bogo_sort','bubble_sort','bucket_sort','cocktail_shaker_sort','comb_sort','counting_sort','cycle_sort','gnome_sort','heap_sort','insertion_sort','merge_sort','pancake_sort','quick_sort','radix_sort','selection_sort','shell_sort','stooge_sort','wiggle_sort'],
  'Stack':['is_consecutive','is_sorted','ordered_stack','remove_min','simplify_path','valid_parenthesis'],
  'String':['atbash_cipher','caesar_cipher','count_binary_substring','decode_string','first_unique_char','fizzbuzz','group_anagrams','int_to_roman','is_palindrome','is_rotated','knuth_morris_pratt','longest_common_prefix','longest_palindromic_substring','manacher','rabin_karp','reverse_string','roman_to_int','z_algorithm'],
  'Tree':['binary_tree_paths','bst_height','bst_is_bst','bst_kth_smallest','bst_lowest_common_ancestor','invert_tree','is_balanced','is_subtree','is_symmetric','lowest_common_ancestor','max_height','max_path_sum','path_sum','same_tree','traversal_inorder','traversal_level_order','traversal_postorder','traversal_preorder','traversal_zigzag']
};

const DEFAULT_ELI5 = (cat, alg) => ({
  eli5:`This ${cat} algorithm processes input data step by step to arrive at the correct output. Step through the animation to observe how state changes with each operation.`,
  pros:['Well-studied algorithm with known complexity','Clear and deterministic behavior'],
  cons:['May not be optimal for all input distributions','Verify complexity before use at scale'],
  uses:['Competitive programming','CS education','Foundation for more complex algorithms'],
  avoid:'When a simpler built-in function already solves the problem',
  time:'O(n)',
  space:'O(1)',
  desc:`A ${cat} algorithm — ${fmt(alg)}. See the Code tab for the original Python implementation. Step through the animation to understand each phase.`
});

function fmt(s){ return s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }
function getInfo(cat,alg){ return ELI5[`${cat}:${alg}`] || DEFAULT_ELI5(cat,alg); }

// ═══════════════════════════════════════════════
// VUE APP
// ═══════════════════════════════════════════════
const app = createApp({
  setup(){
    const theme = ref(localStorage.getItem('bc-theme') || 'dark');
    const drawerOpen = ref(false);
    const q = ref('');
    const ex = reactive({});
    const selCat = ref(null);
    const selAlg = ref(null);
    const tab = ref('vis');
    const code = ref('');
    const speed = ref(300);
    const playing = ref(false);
    const cvs = ref(null);
    const searchInp = ref(null);
    const sbScroll = ref(null);
    const sidebarEl = ref(null);
    const histIdx = ref(0);
    
    // Visualizer state refs
    const visParams = ref([]);
    const visLegend = ref([]);
    const visStats = ref([]);
    const visStateLabel = ref('');
    const canvasH = ref(280);

    let ctx = null;
    let history = [];
    let currentVis = null;
    let rafId = null;
    let lastT = 0;
    let resizeObserver = null;

    // ─── FILTERED ALGS ───
    const filtered = computed(()=>{
      if(!q.value) return ALGS;
      const qv = q.value.toLowerCase();
      const r={};
      for(const [cat,algs] of Object.entries(ALGS)){
        const f=algs.filter(a=>a.includes(qv)||cat.toLowerCase().includes(qv));
        if(f.length) r[cat]=f;
      }
      return r;
    });

    const info = computed(()=> selAlg.value ? getInfo(selCat.value, selAlg.value) : {});

    // ─── SIDEBAR ───
    function toggleCat(cat){ ex[cat]=!ex[cat]; }
    function expandAll(){ for(const c of Object.keys(filtered.value)) ex[c]=true; }
    function collapseAll(){ for(const c of Object.keys(ALGS)) ex[c]=false; }
    
    function onSearch(){
      if(q.value) for(const c of Object.keys(filtered.value)) ex[c]=true;
    }
    
    function onSbScroll(e){
      if(e.target.scrollTop === 0 && searchInp.value) searchInp.value.focus();
    }

    // ─── PICK ALGORITHM ───
    async function pick(cat, alg){
      stopAnim();
      selCat.value = cat;
      selAlg.value = alg;
      tab.value = 'vis';
      code.value = '';
      histIdx.value = 0;
      history = [];
      playing.value = false;
      drawerOpen.value = false;

      // Fetch code with error handling
      const folder = cat.toLowerCase().replace(/\s+/g,'_');
      try {
        const response = await fetch(`https://raw.githubusercontent.com/mrkinix/algorithms/main/algorithms/${folder}/${alg}.py`);
        if (response.ok) {
          code.value = await response.text();
        } else {
          code.value = `# ${alg}.py\n# Could not load from GitHub\n# https://github.com/mrkinix/algorithms`;
        }
      } catch (e) {
        code.value = `# ${alg}.py\n# Error loading source\n# ${e.message}`;
      }

      await nextTick();
      initVis(cat, alg);
    }

    // ─── THEME ───
    function setTheme(t){
      theme.value = t;
      localStorage.setItem('bc-theme', t);
      document.documentElement.classList.remove('dark','sepia','light');
      if(t!=='dark') document.documentElement.classList.add(t);
      // Update Android nav bar color
      const colors = {dark:'#0d1117',sepia:'#ede4d8',light:'#f6f8fa'};
      document.getElementById('themeColor').setAttribute('content', colors[t]);
      if(currentVis) draw();
    }

    // ─── CANVAS INIT ───
    function initCanvas(){
      if(!cvs.value) return false;
      const el = cvs.value;
      const dpr = window.devicePixelRatio || 1;
      const w = el.parentElement.offsetWidth;
      const h = canvasH.value;
      if (w === 0 || h === 0) return false;
      
      el.width = w * dpr;
      el.height = h * dpr;
      el.style.width = w + 'px';
      el.style.height = h + 'px';
      ctx = el.getContext('2d');
      ctx.scale(dpr, dpr);
      return true;
    }

    function getW(){ return cvs.value ? cvs.value.parentElement.offsetWidth : 300; }
    function getH(){ return canvasH.value; }

    // ─── COLORS BASED ON THEME ───
    function getColors(){
      const t = theme.value;
      if(t==='dark') return {
        bg:'#0d1117',bg2:'#161b22',bg3:'#1c2128',
        bar:'#1e3a52',barAlt:'#1a3347',
        hi:'#38bdf8',hi2:'#7dd3fc',
        done:'#4ade80',done2:'#86efac',
        warn:'#fbbf24',warn2:'#fde68a',
        red:'#f87171',red2:'#fca5a5',
        purple:'#a78bfa',
        pivot:'#fb923c',
        txt:'#e6edf3',txt2:'#8b949e',txt3:'#484f58',
        border:'#30363d',
        nodeDefault:'#1c2d42',nodeBorder:'#2d4a6b',
        nodeHi:'#38bdf8',nodeHiTxt:'#0d1117',
        nodeVisit:'#1a472a',nodeVisitBorder:'#4ade80',nodeVisitTxt:'#4ade80',
        edge:'#1e3a52',edgeHi:'#38bdf8',
        pointer:'#38bdf8',
      };
      if(t==='sepia') return {
        bg:'#f4ede3',bg2:'#ede4d8',bg3:'#e6dace',
        bar:'#c4a882',barAlt:'#b89970',
        hi:'#7c5a2e',hi2:'#9b7040',
        done:'#2d6a4f',done2:'#52b788',
        warn:'#996a00',warn2:'#c9900a',
        red:'#9b2226',red2:'#c44a4f',
        purple:'#5e3a8c',
        pivot:'#a84a00',
        txt:'#2c1f0e',txt2:'#6b5540',txt3:'#a8906e',
        border:'#c4b49e',
        nodeDefault:'#ddd0c4',nodeBorder:'#a89880',
        nodeHi:'#7c5a2e',nodeHiTxt:'#f4ede3',
        nodeVisit:'#1a472a',nodeVisitBorder:'#2d6a4f',nodeVisitTxt:'#2d6a4f',
        edge:'#c4a882',edgeHi:'#7c5a2e',
        pointer:'#7c5a2e',
      };
      return { // light
        bg:'#f6f8fa',bg2:'#ffffff',bg3:'#f0f4f8',
        bar:'#bfdbfe',barAlt:'#93c5fd',
        hi:'#0284c7',hi2:'#38bdf8',
        done:'#16a34a',done2:'#4ade80',
        warn:'#d97706',warn2:'#fbbf24',
        red:'#dc2626',red2:'#f87171',
        purple:'#7c3aed',
        pivot:'#ea580c',
        txt:'#1f2328',txt2:'#57606a',txt3:'#8c959f',
        border:'#d0d7de',
        nodeDefault:'#e8ecf0',nodeBorder:'#afb8c1',
        nodeHi:'#0284c7',nodeHiTxt:'#ffffff',
        nodeVisit:'#dcfce7',nodeVisitBorder:'#16a34a',nodeVisitTxt:'#16a34a',
        edge:'#d0d7de',edgeHi:'#0284c7',
        pointer:'#0284c7',
      };
    }

    // ─── PARAMS ───
    function onParamChange(){
      if(currentVis){ 
        currentVis.rebuild(); 
        draw(); 
      }
    }

    function getParam(id){ 
      const p = visParams.value.find(x => x.id === id); 
      return p ? p.value : null; 
    }

    // ─── VISUALIZER INIT ───
    function initVis(cat, alg){
      stopAnim();
      history = [];
      histIdx.value = 0;
      playing.value = false;

      currentVis = buildVis(cat, alg);
      if(!currentVis) return;

      // Set canvas height based on cat
      canvasH.value = cat === 'Matrix' ? 320 : cat === 'Graph' ? 320 : cat === 'Tree' ? 300 : 280;

      nextTick(() => {
        if (initCanvas()) {
          currentVis.rebuild();
          draw();
        }
      });
    }

    function draw(){
      if(!ctx || !currentVis || !cvs.value) return;
      const W = getW(), H = getH();
      if (W === 0 || H === 0) return;
      
      ctx.save();
      const dpr = window.devicePixelRatio || 1;
      ctx.clearRect(0, 0, W * dpr, H * dpr);
      const C = getColors();
      ctx.fillStyle = C.bg;
      ctx.fillRect(0, 0, W * dpr, H * dpr);
      
      try {
        currentVis.draw(ctx, W, H, C);
      } catch (e) {
        console.error('Draw error:', e);
      }
      
      ctx.restore();
      
      // update stats
      if(currentVis.getStats) visStats.value = currentVis.getStats();
      if(currentVis.getLabel) visStateLabel.value = currentVis.getLabel();
    }

    function snapshotState(){
      if(!currentVis || !currentVis.snapshot) return;
      const snap = currentVis.snapshot();
      if(snap){
        history = history.slice(0, histIdx.value);
        history.push(snap);
        histIdx.value = history.length;
      }
    }

    function doStep(){
      if(!currentVis) return;
      snapshotState();
      const alive = currentVis.step();
      draw();
      if(!alive){ 
        stopAnim(); 
        playing.value = false; 
      }
    }

    function stepFwd(){ 
      if(currentVis && !currentVis.done) doStep(); 
    }

    function stepBack(){
      if(histIdx.value <= 0) return;
      histIdx.value--;
      if(currentVis && currentVis.restore && history[histIdx.value]){
        currentVis.restore(history[histIdx.value]);
        draw();
      }
    }

    function togglePlay(){
      if(currentVis && currentVis.done){ 
        restart(); 
        return; 
      }
      playing.value = !playing.value;
      if(playing.value) schedAnim();
      else stopAnim();
    }

    function stopAnim(){ 
      playing.value = false; 
      if (rafId) {
        cancelAnimationFrame(rafId); 
        rafId = null;
      }
    }

    function schedAnim(){
      if(!playing.value) return;
      rafId = requestAnimationFrame((t)=>{
        if(!playing.value) return;
        const delay = Math.max(5, 700 - speed.value * 0.7);
        if(t - lastT >= delay){
          lastT = t;
          doStep();
        }
        if(playing.value) schedAnim();
      });
    }

    function restart(){
      stopAnim();
      history = [];
      histIdx.value = 0;
      playing.value = false;
      if(currentVis){ 
        currentVis.rebuild(); 
        draw(); 
      }
    }

    // ─── MONO FONT HELPER ───
    const MONO = "'IBM Plex Mono',monospace";
    function monoFont(size){ return `${size}px ${MONO}`; }

    // ═══════════════════════════════════════════════
    // VISUALIZER BUILDERS
    // ═══════════════════════════════════════════════
    function buildVis(cat, alg){
      const builders = {
        'Sorting': buildSortVis,
        'Searching': buildSearchVis,
        'Graph': buildGraphVis,
        'Tree': buildTreeVis,
        'Linked List': buildLinkedListVis,
        'Dynamic Programming': buildDPVis,
        'Array': buildArrayVis,
        'Stack': buildStackVis,
        'Queue': buildQueueVis,
        'String': buildStringVis,
        'Matrix': buildMatrixVis,
        'Bit Manipulation': buildBitVis,
        'Backtracking': buildBacktrackVis,
        'Math': buildMathVis,
        'Heap': buildHeapVis,
        'Compression': buildCompressionVis,
        'Map': buildMapVis,
        'Greedy': buildGreedyVis,
      };
      const builder = builders[cat];
      return builder ? builder(alg) : buildGenericVis(cat, alg);
    }

    // ─────────────────────────────────────────────
    // SORTING VISUALIZER
    // ─────────────────────────────────────────────
    function buildSortVis(alg){
      visParams.value = [
        {id:'n',label:'Array Size',type:'range',min:8,max:60,step:1,value:28},
        {id:'input',label:'Input',type:'toggle',options:[
          {v:'random',l:'Random'},{v:'nearly',l:'Nearly Sorted'},{v:'reversed',l:'Reversed'},{v:'few_unique',l:'Few Unique'}
        ],value:'random'},
      ];
      visLegend.value = [
        {color:'#38bdf8',label:'Comparing'},
        {color:'#fb923c',label:'Pivot'},
        {color:'#4ade80',label:'Sorted'},
        {color:'#fbbf24',label:'Swapping'},
      ];

      let arr=[], n=28, hi=[], pivot=-1, sorted=[], swaps=0, comps=0, state={}, done=false;

      function genArr(){
        const type = getParam('input');
        n = getParam('n');
        arr = Array.from({length:n},(_,i)=>Math.round(30+(i/n)*300));
        if(type==='random') arr=arr.sort(()=>Math.random()-.5);
        else if(type==='nearly'){
          arr=arr.sort(()=>Math.random()-.5);
          for(let i=0;i<Math.floor(n*0.1);i++){const a=Math.floor(Math.random()*n),b=Math.floor(Math.random()*n);[arr[a],arr[b]]=[arr[b],arr[a]];}
        }
        else if(type==='reversed') arr=arr.reverse();
        else arr=arr.map(()=>Math.floor(Math.random()*4+1)*60);
        hi=[]; pivot=-1; sorted=[]; swaps=0; comps=0; done=false;
        initSortState();
      }

      function initSortState(){
        const a=arr; const nn=a.length;
        state={};
        if(alg==='bubble_sort'||alg==='exchange_sort') state={i:0,j:0};
        else if(alg==='insertion_sort') state={i:1};
        else if(alg==='selection_sort') state={i:0};
        else if(alg==='quick_sort') state={stack:[[0,nn-1]]};
        else if(alg==='merge_sort') state={width:1};
        else if(alg==='heap_sort') {
          for(let k=Math.floor(nn/2)-1;k>=0;k--) _heapify(a,nn,k);
          state={hk:nn-1,phase:'extract'};
          sorted=[];
        }
        else if(alg==='shell_sort') state={gap:Math.floor(nn/2),i:Math.floor(nn/2)};
        else if(alg==='counting_sort'||alg==='radix_sort') state={phase:'init'};
        else if(alg==='gnome_sort') state={i:1};
        else if(alg==='cocktail_shaker_sort') state={lo:0,hi:nn-1,forward:true};
        else if(alg==='comb_sort') state={gap:nn,shrink:1.3,swapped:false,i:0};
        else if(alg==='cycle_sort') state={cycleStart:0};
        else if(alg==='pancake_sort') state={size:nn};
        else if(alg==='wiggle_sort') state={i:0};
        else if(alg==='stooge_sort') state={calls:[[0,nn-1,0]]};
        else if(alg==='bogo_sort') state={checks:0};
        else if(alg==='bucket_sort') state={phase:'init'};
        else state={i:0,j:0};
      }

      function _heapify(a,n,i){
        let lg=i,l=2*i+1,r=2*i+2;
        if(l<n&&a[l]>a[lg])lg=l;
        if(r<n&&a[r]>a[lg])lg=r;
        if(lg!==i){[a[i],a[lg]]=[a[lg],a[i]];_heapify(a,n,lg);}
      }

      function isSorted(a){ for(let i=1;i<a.length;i++)if(a[i]<a[i-1])return false; return true; }

      function step(){
        if(done) return false;
        const a=arr, nn=a.length;
        comps++;

        switch(alg){
          case 'bubble_sort': case 'exchange_sort': {
            const {i,j}=state;
            if(i<nn){
              if(j<nn-i-1){
                hi=[j,j+1]; comps++;
                if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];swaps++;}
                state.j++;
              } else {
                sorted=[...sorted,nn-i-1];
                state.j=0; state.i++;
              }
            } else { done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            break;
          }
          case 'insertion_sort': {
            let {i}=state;
            if(i<nn){
              let key=a[i],j=i-1; hi=[i];
              while(j>=0&&a[j]>key){a[j+1]=a[j];j--;swaps++;comps++;}
              a[j+1]=key; state.i++;
              sorted=[...Array.from({length:state.i},(_,k)=>k)];
            } else { done=true; hi=[]; }
            break;
          }
          case 'selection_sort': {
            let {i}=state;
            if(i<nn-1){
              let mn=i;
              for(let k=i+1;k<nn;k++){comps++;if(a[k]<a[mn])mn=k;}
              hi=[i,mn];
              if(mn!==i){[a[i],a[mn]]=[a[mn],a[i]];swaps++;}
              sorted=[...sorted,i]; state.i++;
            } else { done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            break;
          }
          case 'quick_sort': {
            if(!state.stack.length){done=true;sorted=Array.from({length:nn},(_,k)=>k);hi=[];break;}
            const [lo,hi_]=state.stack.pop();
            if(lo<hi_){
              const pv=a[hi_]; pivot=hi_; let p=lo;
              for(let k=lo;k<hi_;k++){comps++;if(a[k]<=pv){[a[k],a[p]]=[a[p],a[k]];p++;swaps++;}}
              [a[p],a[hi_]]=[a[hi_],a[p]]; swaps++;
              hi=[p]; sorted=[...sorted,p];
              state.stack.push([lo,p-1],[p+1,hi_]);
            }
            if(!state.stack.length){done=true;sorted=Array.from({length:nn},(_,k)=>k);hi=[];pivot=-1;}
            break;
          }
          case 'merge_sort': {
            let {width}=state;
            if(width<nn){
              for(let k=0;k<nn;k+=width*2){
                const l=k,m=Math.min(k+width-1,nn-1),r=Math.min(k+width*2-1,nn-1);
                if(m<r){
                  const L=a.slice(l,m+1),R=a.slice(m+1,r+1);
                  let i=0,j=0,idx=l;
                  while(i<L.length&&j<R.length){comps++;a[idx++]=(L[i]<=R[j])?L[i++]:R[j++];}
                  while(i<L.length)a[idx++]=L[i++];
                  while(j<R.length)a[idx++]=R[j++];
                }
              }
              hi=[Math.floor(nn/2)]; state.width*=2;
            } else { done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            break;
          }
          case 'heap_sort': {
            const {hk}=state;
            if(hk>0){
              [a[0],a[hk]]=[a[hk],a[0]]; swaps++;
              hi=[0,hk]; sorted=[...sorted,hk];
              _heapify(a,hk,0); state.hk--;
            } else { done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            break;
          }
          case 'shell_sort': {
            let {gap,i}=state;
            if(gap>0){
              if(i<nn){
                let tmp=a[i],j=i; hi=[i];
                while(j>=gap&&a[j-gap]>tmp){a[j]=a[j-gap];j-=gap;swaps++;comps++;}
                a[j]=tmp; state.i++;
              } else { state.gap=Math.floor(gap/1.5)||0; state.i=state.gap; }
            } else { done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            break;
          }
          case 'counting_sort': case 'radix_sort': {
            const mx=Math.max(...a),mn=Math.min(...a),cnt=new Array(mx-mn+1).fill(0);
            a.forEach(v=>cnt[v-mn]++);
            let idx=0; cnt.forEach((c,i)=>{while(c-->0){a[idx++]=i+mn;}});
            sorted=Array.from({length:nn},(_,k)=>k); hi=[0,nn-1]; done=true;
            break;
          }
          case 'gnome_sort': {
            let {i}=state;
            if(i<nn){
              hi=[Math.max(0,i-1),i]; comps++;
              if(i===0||a[i]>=a[i-1]) state.i++;
              else{[a[i],a[i-1]]=[a[i-1],a[i]];swaps++;state.i--;}
            } else { done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            break;
          }
          case 'cocktail_shaker_sort': {
            let {lo,hi:h,forward}=state;
            if(lo<h){
              if(forward){
                let sw=false;
                for(let j=lo;j<h;j++){comps++;if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];swaps++;sw=true;}}
                sorted=[...sorted,h]; state.hi=h-1; state.forward=false;
              } else {
                let sw=false;
                for(let j=state.hi;j>lo;j--){comps++;if(a[j]<a[j-1]){[a[j],a[j-1]]=[a[j-1],a[j]];swaps++;sw=true;}}
                sorted=[...sorted,lo]; state.lo=lo+1; state.forward=true;
              }
            } else { done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            break;
          }
          case 'comb_sort': {
            let {gap,shrink,i}=state;
            if(gap===undefined){gap=Math.floor(nn/shrink);state.gap=gap;state.swapped=false;state.i=0;}
            if(gap>=1){
              if(i+gap<nn){
                comps++;
                if(a[i]>a[i+gap]){[a[i],a[i+gap]]=[a[i+gap],a[i]];swaps++;state.swapped=true;}
                hi=[i,i+gap]; state.i++;
              } else {
                state.gap=Math.max(1,Math.floor(gap/shrink));
                state.i=0; state.swapped=false;
              }
            } else { done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            break;
          }
          case 'wiggle_sort': {
            let {i}=state;
            if(i<nn-1){
              hi=[i,i+1]; comps++;
              if((i%2===0&&a[i]>a[i+1])||(i%2===1&&a[i]<a[i+1])){[a[i],a[i+1]]=[a[i+1],a[i]];swaps++;}
              state.i++;
            } else { done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            break;
          }
          case 'cycle_sort': {
            let {cycleStart}=state;
            if(cycleStart<nn-1){
              let item=a[cycleStart],pos=cycleStart;
              for(let k=cycleStart+1;k<nn;k++){comps++;if(a[k]<item)pos++;}
              if(pos===cycleStart){state.cycleStart++;break;}
              while(item===a[pos])pos++;
              [a[pos],item]=[item,a[pos]]; swaps++; hi=[pos,cycleStart];
              while(pos!==cycleStart){
                pos=cycleStart;
                for(let k=cycleStart+1;k<nn;k++){comps++;if(a[k]<item)pos++;}
                while(item===a[pos])pos++;
                [a[pos],item]=[item,a[pos]]; swaps++;
              }
              sorted=[...sorted,cycleStart]; state.cycleStart++;
            } else { done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            break;
          }
          case 'pancake_sort': {
            let {size}=state;
            if(size>1){
              let maxIdx=0;
              for(let k=1;k<size;k++){comps++;if(a[k]>a[maxIdx])maxIdx=k;}
              if(maxIdx!==size-1){
                if(maxIdx>0){a.slice(0,maxIdx+1).reverse().forEach((v,i)=>a[i]=v);swaps+=maxIdx+1;}
                a.slice(0,size).reverse().forEach((v,i)=>a[i]=v); swaps+=size;
                hi=[0,size-1,maxIdx];
              }
              sorted=[...sorted,size-1]; state.size--;
            } else { done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            break;
          }
          case 'stooge_sort': {
            if(!state.calls.length){done=true;sorted=Array.from({length:nn},(_,k)=>k);hi=[];break;}
            const [l,r,phase]=state.calls.pop();
            const t_=Math.floor((r-l+1)/3);
            if(phase===0){
              comps++;
              if(a[l]>a[r]){[a[l],a[r]]=[a[r],a[l]];swaps++;}
              hi=[l,r];
              if(r-l+1>2){
                state.calls.push([l,r-t_,0],[l+t_,r,0],[l,r-t_,0]);
              }
            }
            break;
          }
          case 'bogo_sort': {
            state.checks++;
            if(isSorted(a)){ done=true; sorted=Array.from({length:nn},(_,k)=>k); hi=[]; }
            else { for(let k=nn-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[a[k],a[j]]=[a[j],a[k]];} swaps+=nn; hi=[0,nn-1]; }
            if(state.checks>500){done=true;hi=[];}
            break;
          }
          case 'bucket_sort': {
            const mx=Math.max(...a),mn=Math.min(...a);
            const buckets=Array.from({length:Math.min(10,nn)},()=>[]);
            a.forEach(v=>{const bi=Math.min(Math.floor((v-mn)/(mx-mn+1)*buckets.length),buckets.length-1);buckets[bi].push(v);});
            buckets.forEach(b=>b.sort((x,y)=>x-y));
            let idx=0; buckets.forEach(b=>b.forEach(v=>a[idx++]=v));
            sorted=Array.from({length:nn},(_,k)=>k); hi=[0,nn-1]; done=true;
            break;
          }
          default: {
            // generic bubble fallback
            const {i,j}=state;
            if(i<nn){ if(j<nn-i-1){hi=[j,j+1];if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];swaps++;}state.j++;}
              else{sorted=[...sorted,nn-i-1];state.j=0;state.i++;} }
            else{done=true;hi=[];}
          }
        }
        return !done;
      }

      function draw(ctx, W, H, C){
        const a=arr, nn=a.length;
        if(!nn) return;
        const mx=Math.max(...a,1);
        const gap=2, bw=Math.max(3,Math.floor((W-32-gap*(nn-1))/nn));
        const maxH=H-56, baseY=H-30;

        a.forEach((v,i)=>{
          const x=16+i*(bw+gap), bh=Math.max(4,Math.floor((v/mx)*maxH)), y=baseY-bh;
          let color=C.bar;
          if(sorted.includes(i)) color=C.done;
          else if(i===pivot) color=C.pivot;
          else if(hi.includes(i)) color = hi[0]===i ? C.hi : C.hi2;
          ctx.fillStyle=color;
          const r=Math.min(2,bw/2);
          ctx.beginPath(); ctx.roundRect(x,y,bw,bh,[r,r,0,0]); ctx.fill();

          // value labels if bars are wide enough
          if(bw>=18&&nn<=25){
            ctx.fillStyle=C.txt3; ctx.font=monoFont(9); ctx.textAlign='center';
            ctx.fillText(v, x+bw/2, baseY+14);
          }
        });

        // Draw labels for highlighted elements
        hi.forEach((idx,ii)=>{
          if(idx<0||idx>=nn) return;
          const x=16+idx*(bw+gap);
          const bh=Math.max(4,Math.floor((arr[idx]/mx)*maxH));
          const y=baseY-bh;
          ctx.fillStyle=ii===0?C.hi:C.hi2;
          ctx.font=monoFont(10); ctx.textAlign='center';
          ctx.fillText(ii===0?'i':'j', x+bw/2, y-4);
        });

        // pivot label
        if(pivot>=0&&pivot<nn){
          const x=16+pivot*(bw+gap);
          const bh=Math.max(4,Math.floor((arr[pivot]/mx)*maxH));
          ctx.fillStyle=C.pivot;
          ctx.font=monoFont(10); ctx.textAlign='center';
          ctx.fillText('pivot', x+bw/2, baseY-bh-4);
        }

        // algo name + stats overlay
        ctx.fillStyle=C.txt2; ctx.font=monoFont(10); ctx.textAlign='left';
        ctx.fillText(fmt(alg), 16, 18);
        ctx.textAlign='right';
        ctx.fillText(`swaps:${swaps}  comps:${comps}`, W-16, 18);
      }

      function rebuild(){ genArr(); }
      function getStats(){ return [{k:'swaps',v:swaps},{k:'comps',v:comps},{k:'sorted',v:sorted.length+'/'+arr.length}]; }
      function getLabel(){ return done?'Done — array sorted!':hi.length?`Comparing indices [${hi.join(',')}]`:'Ready'; }
      function snapshot(){ return {arr:[...arr],hi:[...hi],sorted:[...sorted],pivot,swaps,comps,done,state:JSON.parse(JSON.stringify(state))}; }
      function restore(s){ arr=s.arr;hi=s.hi;sorted=s.sorted;pivot=s.pivot;swaps=s.swaps;comps=s.comps;done=s.done;state=s.state; }

      return {rebuild,step,draw,getStats,getLabel,snapshot,restore,get done(){return done;}};
    }

    // ─────────────────────────────────────────────
    // SEARCHING VISUALIZER
    // ─────────────────────────────────────────────
    function buildSearchVis(alg){
      visParams.value = [
        {id:'n',label:'Array Size',type:'range',min:10,max:40,step:1,value:20},
        {id:'target_mode',label:'Target',type:'toggle',options:[{v:'exists',l:'Exists'},{v:'missing',l:'Missing'}],value:'exists'},
      ];
      visLegend.value = [
        {color:'#38bdf8',label:'Comparing (mid/current)'},
        {color:'#1e3a52',label:'Active Range'},
        {color:'#4ade80',label:'Found'},
        {color:'#f87171',label:'Eliminated'},
        {color:'#fbbf24',label:'Jump Block'},
      ];

      let arr=[], target=0, lo=0, high=0, mid=-1, found=-1, eliminated=[], jumpBlock=[], state={}, done=false;
      let steps=0, comparisons=0;

      function rebuild(){
        const n=getParam('n');
        arr=Array.from({length:n},(_,i)=>Math.round(5+i*(95/n)+(Math.random()*8))).sort((a,b)=>a-b);
        // unique
        const seen=new Set(); arr=arr.filter(v=>!seen.has(v)&&seen.add(v));
        while(arr.length<n) arr.push(arr[arr.length-1]+Math.floor(Math.random()*5)+1);
        arr=arr.slice(0,n);

        const mode=getParam('target_mode');
        target = mode==='exists' ? arr[Math.floor(Math.random()*arr.length)] : arr[arr.length-1]+3;
        lo=0; high=arr.length-1; mid=-1; found=-1; eliminated=[]; jumpBlock=[]; done=false; steps=0; comparisons=0;
        initState();
      }

      function initState(){
        const n=arr.length;
        lo=0; high=n-1; mid=-1; found=-1; eliminated=[]; jumpBlock=[]; steps=0;
        if(alg==='linear_search'||alg==='two_sum') state={i:0};
        else if(alg==='jump_search') state={block:Math.floor(Math.sqrt(n)),prev:0,step:'jump'};
        else if(alg==='ternary_search') state={lo:0,hi:n-1};
        else if(alg==='interpolation_search') state={lo:0,hi:n-1,estimated:-1};
        else state={lo:0,hi:n-1}; // binary variants
      }

      function step(){
        if(done) return false;
        steps++; comparisons++;

        if(alg==='linear_search'){
          const {i}=state;
          if(i<arr.length){
            mid=i; comparisons++;
            if(arr[i]===target){found=i;done=true;}
            else{eliminated=[...eliminated,i];state.i++;}
          } else { done=true; }
          return !done;
        }

        if(alg==='jump_search'){
          const n=arr.length, {block,prev}=state;
          if(state.step==='jump'){
            if(prev<n&&arr[Math.min(prev+block,n)-1]<target){
              jumpBlock=[prev,Math.min(prev+block,n)-1];
              mid=Math.min(prev+block,n)-1;
              state.prev+=block;
            } else {
              state.step='linear'; state.linI=prev;
              jumpBlock=[prev,Math.min(prev+block,n)-1];
            }
          } else {
            const i=state.linI;
            if(i<Math.min(state.prev+block,n)){
              mid=i;
              if(arr[i]===target){found=i;done=true;}
              else if(arr[i]>target){done=true;}
              else state.linI++;
            } else done=true;
          }
          return !done;
        }

        if(alg==='ternary_search'){
          let {lo:l,hi:h}=state;
          if(l>h){done=true;return false;}
          const t1=Math.floor(l+(h-l)/3), t2=Math.floor(h-(h-l)/3);
          mid=t1; lo=l; high=h;
          comparisons+=2;
          if(arr[t1]===target){found=t1;done=true;}
          else if(arr[t2]===target){found=t2;done=true;}
          else if(target<arr[t1]){
            eliminated=[...eliminated,...Array.from({length:h-t1+1},(_,i)=>t1+i+1).filter(i=>i<arr.length)];
            state.hi=t1-1;
          } else if(target>arr[t2]){
            eliminated=[...eliminated,...Array.from({length:t2-l+1},(_,i)=>l+i).filter(i=>i<arr.length)];
            state.lo=t2+1;
          } else {
            eliminated=[...eliminated,...Array.from({length:t1-l+1},(_,i)=>l+i).filter(i=>i<arr.length),...Array.from({length:h-t2+1},(_,i)=>t2+i+1).filter(i=>i<arr.length)];
            state.lo=t1+1; state.hi=t2-1;
          }
          return !done;
        }

        if(alg==='interpolation_search'){
          let {lo:l,hi:h}=state;
          if(l>h||arr[l]>target||arr[h]<target){done=true;return false;}
          const pos=l+Math.floor((target-arr[l])/(arr[h]-arr[l])*(h-l));
          const p=Math.max(l,Math.min(h,pos||Math.floor((l+h)/2)));
          mid=p; lo=l; high=h; state.estimated=p;
          comparisons++;
          if(arr[p]===target){found=p;done=true;}
          else if(arr[p]<target){eliminated=[...eliminated,...Array.from({length:p-l+1},(_,i)=>l+i).filter(i=>i<arr.length)];state.lo=p+1;}
          else{eliminated=[...eliminated,...Array.from({length:h-p+1},(_,i)=>p+i).filter(i=>i<arr.length)];state.hi=p-1;}
          return !done;
        }

        // Binary search variants
        let {lo:l,hi:h}=state;
        if(l>h){done=true;return false;}
        const m=Math.floor((l+h)/2);
        mid=m; lo=l; high=h;
        comparisons++;
        if(arr[m]===target){found=m;done=true;}
        else if(arr[m]<target){
          eliminated=[...eliminated,...Array.from({length:m-l+1},(_,i)=>l+i).filter(i=>i<arr.length)];
          state.lo=m+1;
        } else {
          eliminated=[...eliminated,...Array.from({length:h-m+1},(_,i)=>m+i).filter(i=>i<arr.length)];
          state.hi=m-1;
        }
        return !done;
      }

      function draw(ctx, W, H, C){
        const n=arr.length;
        const mx=Math.max(...arr,1);
        const gap=3, bw=Math.max(8,Math.floor((W-32-gap*(n-1))/n)), maxH=H-80, baseY=H-40;

        // Range bracket
        if(lo>=0&&high>=0&&high<n&&!done){
          ctx.fillStyle=C.accbg||'rgba(56,189,248,.06)';
          const x1=16+lo*(bw+gap)-4, x2=16+high*(bw+gap)+bw+4;
          ctx.beginPath(); ctx.roundRect(x1, baseY-maxH-10, x2-x1, maxH+20, [4]); ctx.fill();
        }

        arr.forEach((v,i)=>{
          const x=16+i*(bw+gap), bh=Math.max(4,Math.floor((v/mx)*maxH)), y=baseY-bh;
          let color=C.bar;
          if(found===i) color=C.done;
          else if(i===mid) color=C.hi;
          else if(eliminated.includes(i)) color=C.red+'44';
          else if(jumpBlock.length&&i>=jumpBlock[0]&&i<=jumpBlock[1]) color=C.warn;
          else if(i>=lo&&i<=high&&!done) color=C.barAlt||C.bar;
          ctx.fillStyle=color;
          ctx.beginPath(); ctx.roundRect(x,y,bw,bh,[Math.min(2,bw/2),Math.min(2,bw/2),0,0]); ctx.fill();

          // value
          ctx.fillStyle=C.txt3; ctx.font=monoFont(9); ctx.textAlign='center';
          ctx.fillText(v, x+bw/2, baseY+14);

          // index
          if(i===mid){
            ctx.fillStyle=C.hi; ctx.font=monoFont(10);
            ctx.fillText(alg==='ternary_search'?'m1':'mid', x+bw/2, y-14);
          }
          if(found===i){
            ctx.fillStyle=C.done; ctx.font=monoFont(10);
            ctx.fillText('✓', x+bw/2, y-4);
          }
        });

        // pointer labels
        if(!done&&lo<=high){
          [['lo',lo,C.txt2],['hi',high,C.txt2]].forEach(([lbl,idx,col])=>{
            if(idx<0||idx>=n) return;
            const x=16+idx*(bw+gap)+bw/2;
            ctx.fillStyle=col; ctx.font=monoFont(10); ctx.textAlign='center';
            ctx.fillText(lbl, x, baseY+26);
          });
        }

        // target + result info
        ctx.fillStyle=C.txt2; ctx.font=monoFont(11); ctx.textAlign='left';
        ctx.fillText(`target = ${target}`, 16, 18);
        if(found>=0){ ctx.fillStyle=C.done; ctx.fillText(`→ found at index ${found}`, 16, 34); }
        else if(done){ ctx.fillStyle=C.red; ctx.fillText('→ not found', 16, 34); }
        ctx.fillStyle=C.txt3; ctx.textAlign='right';
        ctx.fillText(`${fmt(alg)}`, W-16, 18);
      }

      function getStats(){ return [{k:'comparisons',v:comparisons},{k:'steps',v:steps},{k:'target',v:target},{k:found>=0?'found at':'status',v:found>=0?found:'not found'}]; }
      function getLabel(){ return done?(found>=0?`Target ${target} found at index ${found}`:`Target ${target} not in array`):`Searching for ${target}…`; }
      function snapshot(){ return {arr:[...arr],target,lo,high,mid,found,eliminated:[...eliminated],jumpBlock:[...jumpBlock],state:JSON.parse(JSON.stringify(state)),done,steps,comparisons}; }
      function restore(s){ arr=s.arr;target=s.target;lo=s.lo;high=s.high;mid=s.mid;found=s.found;eliminated=s.eliminated;jumpBlock=s.jumpBlock;state=s.state;done=s.done;steps=s.steps;comparisons=s.comparisons; }

      return {rebuild,step,draw,getStats,getLabel,snapshot,restore,get done(){return done;}};
    }

    // ─────────────────────────────────────────────
    // GRAPH VISUALIZER
    // ─────────────────────────────────────────────
    function buildGraphVis(alg){
      visParams.value = [
        {id:'n',label:'Nodes',type:'range',min:5,max:12,step:1,value:7},
        {id:'algo',label:'Algorithm',type:'toggle',options:[{v:'bfs',l:'BFS'},{v:'dfs',l:'DFS'},{v:'dijkstra',l:'Dijkstra'}],value:alg==='dijkstra'?'dijkstra':'bfs'},
      ];
      visLegend.value = [
        {color:'#38bdf8',label:'Current'},
        {color:'#4ade80',label:'Visited'},
        {color:'#fbbf24',label:'In Queue/Stack'},
        {color:'#f87171',label:'Back Edge (Cycle)'},
      ];

      let nodes=[], edges=[], visited=new Set(), queue=[], stack=[], path=[], done=false, steps=0;
      let distances={}, prev={}, relaxed=[];

      function rebuild(){
        const n=getParam('n');
        const W=getW(), H=getH();
        // Layout nodes in circle
        nodes=Array.from({length:n},(_,i)=>{
          const angle=(2*Math.PI*i/n)-Math.PI/2;
          const r=Math.min(W,H)*0.32;
          return {
            id:i, label:String.fromCharCode(65+i),
            x:W/2+r*Math.cos(angle), y:H/2+r*Math.sin(angle)+10,
            state:'unvisited', dist:i===0?0:Infinity
          };
        });
        // Generate edges
        edges=[];
        for(let i=0;i<n;i++){
          const nc=1+Math.floor(Math.random()*2);
          for(let k=0;k<nc;k++){
            const t=(i+1+Math.floor(Math.random()*(n-2)))%n;
            if(t!==i&&!edges.find(e=>(e.f===i&&e.t===t)||(e.f===t&&e.t===i))){
              edges.push({f:i,t,w:Math.floor(Math.random()*9)+1,state:'default'});
            }
          }
        }
        // ensure connectivity
        for(let i=1;i<n;i++){
          if(!edges.find(e=>e.f===i-1&&e.t===i||e.f===i&&e.t===i-1))
            edges.push({f:i-1,t:i,w:Math.floor(Math.random()*9)+1,state:'default'});
        }

        visited=new Set(); queue=[0]; stack=[0]; path=[]; relaxed=[]; done=false; steps=0;
        nodes[0].state='in_queue';
        distances={}; prev={};
        nodes.forEach(n=>{ distances[n.id]=n.id===0?0:Infinity; });
      }

      function step(){
        if(done) return false;
        const algo=getParam('algo');
        steps++;

        if(algo==='dijkstra'){
          const unvisited=nodes.filter(n=>!visited.has(n.id));
          if(!unvisited.length){done=true;return false;}
          // pick min distance unvisited
          const curr=unvisited.reduce((a,b)=>distances[a.id]<=distances[b.id]?a:b);
          if(distances[curr.id]===Infinity){done=true;return false;}
          visited.add(curr.id);
          nodes[curr.id].state='visited';
          path=[...path,curr.id];
          // relax neighbors
          relaxed=[];
          edges.filter(e=>e.f===curr.id||e.t===curr.id).forEach(e=>{
            const nb=e.f===curr.id?e.t:e.f;
            const newDist=distances[curr.id]+e.w;
            if(newDist<distances[nb]){
              distances[nb]=newDist; prev[nb]=curr.id;
              nodes[nb].dist=newDist;
              relaxed.push(nb); e.state='relaxed';
              nodes[nb].state=visited.has(nb)?'visited':'in_queue';
            }
          });
          if(unvisited.length<=1) done=true;
          return !done;
        }

        if(algo==='dfs'){
          if(!stack.length){done=true;return false;}
          const curr=stack.pop();
          if(!visited.has(curr)){
            visited.add(curr); nodes[curr].state='visited';
            path=[...path,curr];
            const neighbors=edges.filter(e=>e.f===curr||e.t===curr).map(e=>e.f===curr?e.t:e.f);
            for(const nb of neighbors){
              if(!visited.has(nb)){
                nodes[nb].state='in_queue'; stack.push(nb);
                edges.find(e=>(e.f===curr&&e.t===nb)||(e.f===nb&&e.t===curr))&&(edges.find(e=>(e.f===curr&&e.t===nb)||(e.f===nb&&e.t===curr)).state='used');
              } else {
                const e=edges.find(e=>(e.f===curr&&e.t===nb)||(e.f===nb&&e.t===curr));
                if(e) e.state='back';
              }
            }
          }
          if(!stack.length&&visited.size>=nodes.length) done=true;
          return !done;
        }

        // BFS
        if(!queue.length){done=true;return false;}
        const curr=queue.shift();
        if(visited.has(curr)){ return true; }
        visited.add(curr); nodes[curr].state='visited';
        path=[...path,curr];
        const neighbors=edges.filter(e=>e.f===curr||e.t===curr).map(e=>e.f===curr?e.t:e.f);
        for(const nb of neighbors){
          if(!visited.has(nb)&&!queue.includes(nb)){
            queue.push(nb); nodes[nb].state='in_queue';
            edges.find(e=>(e.f===curr&&e.t===nb)||(e.f===nb&&e.t===curr))&&(edges.find(e=>(e.f===curr&&e.t===nb)||(e.f===nb&&e.t===curr)).state='used');
          }
        }
        if(!queue.length&&visited.size>=nodes.length) done=true;
        return !done;
      }

      function draw(ctx, W, H, C){
        const algo=getParam('algo');
        // scale nodes to current canvas size
        const NR=Math.min(W,H)*0.32;
        nodes.forEach((n,i)=>{
          const angle=(2*Math.PI*i/nodes.length)-Math.PI/2;
          n.x=W/2+NR*Math.cos(angle); n.y=H/2-10+NR*Math.sin(angle);
        });

        // Edges
        edges.forEach(e=>{
          const n1=nodes[e.f], n2=nodes[e.t];
          if (!n1 || !n2) return;
          ctx.strokeStyle=e.state==='used'?C.hi:e.state==='relaxed'?C.done:e.state==='back'?C.red:C.edge;
          ctx.lineWidth=e.state!=='default'?2:1;
          ctx.beginPath(); ctx.moveTo(n1.x,n1.y); ctx.lineTo(n2.x,n2.y); ctx.stroke();
          // weight
          ctx.fillStyle=C.txt3; ctx.font=monoFont(10); ctx.textAlign='center';
          ctx.fillText(e.w,(n1.x+n2.x)/2+6,(n1.y+n2.y)/2-4);
        });

        // Nodes
        const r=Math.max(14,Math.min(20,W/nodes.length*0.4));
        nodes.forEach(n=>{
          ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2);
          let bg=C.nodeDefault, border=C.nodeBorder, txt=C.txt1||C.txt;
          if(n.state==='visited'){bg=C.nodeVisit;border=C.nodeVisitBorder;txt=C.nodeVisitTxt;}
          else if(n.state==='in_queue'){bg=C.yellowbg||'rgba(251,191,36,.15)';border=C.warn;txt=C.warn;}
          if(n.id===path[path.length-1]){bg=C.hi;border=C.hi;txt=C.nodeHiTxt;}
          ctx.fillStyle=bg; ctx.fill();
          ctx.strokeStyle=border; ctx.lineWidth=2; ctx.stroke();
          ctx.fillStyle=txt; ctx.font=`bold ${monoFont(r>15?11:9)}`; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(n.label,n.x,n.y);
          ctx.textBaseline='alphabetic';
          // distance for dijkstra
          if(algo==='dijkstra'&&distances[n.id]!==undefined){
            ctx.fillStyle=C.acc||C.hi; ctx.font=monoFont(9); ctx.textAlign='center';
            ctx.fillText(distances[n.id]===Infinity?'∞':distances[n.id], n.x, n.y+r+12);
          }
        });

        // Queue/Stack display
        const qs = algo==='dfs'?stack:queue;
        if(qs.length){
          const lbl = algo==='dfs'?'Stack:':'Queue:';
          ctx.fillStyle=C.txt2; ctx.font=monoFont(10); ctx.textAlign='left';
          ctx.fillText(lbl+' ['+qs.map(i=>nodes[i]?.label||i).join('→')+']', 12, H-12);
        }
        if(path.length){
          ctx.fillStyle=C.txt3; ctx.font=monoFont(10); ctx.textAlign='left';
          ctx.fillText('Order: '+path.map(i=>nodes[i]?.label||i).join('→'), 12, 16);
        }
      }

      function getStats(){ return [{k:'visited',v:visited.size+'/'+nodes.length},{k:'steps',v:steps}]; }
      function getLabel(){ return done?'Traversal complete!':queue.length?`Processing: [${queue.map(i=>nodes[i]?.label).join(',')}]`:'Ready'; }
      function snapshot(){ return {nodes:JSON.parse(JSON.stringify(nodes)),edges:JSON.parse(JSON.stringify(edges)),visited:new Set(visited),queue:[...queue],stack:[...stack],path:[...path],done,steps,distances:{...distances},prev:{...prev}}; }
      function restore(s){ nodes=JSON.parse(JSON.stringify(s.nodes));edges=JSON.parse(JSON.stringify(s.edges));visited=new Set(s.visited);queue=[...s.queue];stack=[...s.stack];path=[...s.path];done=s.done;steps=s.steps;distances={...s.distances};prev={...s.prev}; }
      return {rebuild,step,draw,getStats,getLabel,snapshot,restore,get done(){return done;}};
    }

    // ─────────────────────────────────────────────
    // TREE VISUALIZER
    // ─────────────────────────────────────────────
    function buildTreeVis(alg){
      visParams.value = [
        {id:'n',label:'Nodes',type:'range',min:5,max:15,step:1,value:10},
        {id:'type',label:'Tree',type:'toggle',options:[{v:'bst',l:'BST'},{v:'random',l:'Random'}],value:'bst'},
      ];
      visLegend.value = [
        {color:'#38bdf8',label:'Current'},
        {color:'#4ade80',label:'Visited'},
        {color:'#fbbf24',label:'In Queue'},
        {color:'#f87171',label:'Not Taken'},
      ];

      let nodes=[], visited=[], current=-1, queue=[], order=[], done=false, steps=0;

      function rebuild(){
        const n=getParam('n');
        let vals;
        if(getParam('type')==='bst'){
          vals=[]; const used=new Set();
          while(vals.length<n){const v=Math.floor(Math.random()*90)+5; if(!used.has(v)){vals.push(v);used.add(v);}}
          vals.sort((a,b)=>a-b); // insert in sorted order → balanced BST
        } else {
          vals=Array.from({length:n},()=>Math.floor(Math.random()*90)+5);
        }
        nodes=vals.map((v,i)=>({v,visited:false,active:false,left:2*i+1<n?2*i+1:-1,right:2*i+2<n?2*i+2:-1}));
        visited=[]; current=-1; queue=[0]; order=[]; done=false; steps=0;

        if(alg==='traversal_inorder'){queue=[]; buildInorder(0);}
        else if(alg==='traversal_postorder'){queue=[]; buildPostorder(0);}
        else if(alg==='traversal_preorder'){queue=[0];}
        else if(alg==='traversal_level_order'){queue=[0];}
        else queue=[0];
      }

      function buildInorder(i){ if(i<0||i>=nodes.length)return; buildInorder(nodes[i].left); queue.push(i); buildInorder(nodes[i].right); }
      function buildPostorder(i){ if(i<0||i>=nodes.length)return; buildPostorder(nodes[i].left); buildPostorder(nodes[i].right); queue.push(i); }

      function step(){
        if(done||!queue.length){done=true;return false;}
        steps++;
        const idx=queue.shift();
        nodes[idx].visited=true; nodes[idx].active=true;
        current=idx; order.push(idx);
        visited.push(idx);

        if(alg==='traversal_level_order'){
          if(nodes[idx].left>=0) queue.push(nodes[idx].left);
          if(nodes[idx].right>=0) queue.push(nodes[idx].right);
        }
        if(!queue.length) done=true;
        return !done;
      }

      function calcPos(n, W, H){
        const pos=[];
        function assign(i,lo,hi,depth){
          if(i<0||i>=n) return;
          const x=W*(lo+hi)/2, y=30+depth*(H-50)/Math.ceil(Math.log2(n+1));
          pos[i]={x,y};
          const mid=(lo+hi)/2;
          assign(nodes[i].left, lo, mid, depth+1);
          assign(nodes[i].right, mid, hi, depth+1);
        }
        assign(0,0,1,0);
        return pos;
      }

      function draw(ctx, W, H, C){
        if(!nodes.length) return;
        const pos=calcPos(nodes.length, W, H);
        const r=Math.min(16, Math.max(10, W/(nodes.length*2.5)));

        // Edges
        nodes.forEach((n,i)=>{
          if(!pos[i]) return;
          [n.left,n.right].forEach(ci=>{
            if(ci<0||ci>=nodes.length||!pos[ci]) return;
            ctx.strokeStyle=C.edge; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(pos[i].x,pos[i].y); ctx.lineTo(pos[ci].x,pos[ci].y); ctx.stroke();
          });
        });

        // Nodes
        nodes.forEach((n,i)=>{
          if(!pos[i]) return;
          const {x,y}=pos[i];
          ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
          let bg=C.nodeDefault, border=C.nodeBorder, txtCol=C.txt;
          if(n.visited){bg=C.nodeVisit;border=C.nodeVisitBorder;txtCol=C.nodeVisitTxt;}
          if(i===current){bg=C.hi;border=C.hi;txtCol=C.nodeHiTxt;}
          if(queue.includes(i)){bg=C.yellowbg||'rgba(251,191,36,.15)';border=C.warn;}
          ctx.fillStyle=bg; ctx.fill();
          ctx.strokeStyle=border; ctx.lineWidth=2; ctx.stroke();
          ctx.fillStyle=txtCol; ctx.font=`bold ${monoFont(Math.max(8,r-3))}`; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(n.v,x,y); ctx.textBaseline='alphabetic';
        });

        // Traversal order
        if(order.length){
          ctx.fillStyle=C.txt2; ctx.font=monoFont(10); ctx.textAlign='left';
          ctx.fillText('Visit order: '+order.map(i=>nodes[i].v).join(' → '), 12, H-8);
        }
      }

      function getStats(){ return [{k:'visited',v:visited.length+'/'+nodes.length},{k:'order',v:order.map(i=>nodes[i].v).join(',')}]; }
      function getLabel(){ return done?'Traversal complete: '+order.map(i=>nodes[i].v).join('→'):current>=0?`Visiting node ${nodes[current]?.v}`:'Ready'; }
      function snapshot(){ return {nodes:JSON.parse(JSON.stringify(nodes)),visited:[...visited],current,queue:[...queue],order:[...order],done,steps}; }
      function restore(s){ nodes=JSON.parse(JSON.stringify(s.nodes));visited=[...s.visited];current=s.current;queue=[...s.queue];order=[...s.order];done=s.done;steps=s.steps; }
      return {rebuild,step,draw,getStats,getLabel,snapshot,restore,get done(){return done;}};
    }

    // ─────────────────────────────────────────────
    // LINKED LIST VISUALIZER
    // ─────────────────────────────────────────────
    function buildLinkedListVis(alg){
      visParams.value = [{id:'n',label:'Length',type:'range',min:4,max:12,step:1,value:7}];
      visLegend.value = [
        {color:'#38bdf8',label:'Current / Pointer 1'},
        {color:'#4ade80',label:'Visited / Done'},
        {color:'#fbbf24',label:'Pointer 2 (fast)'},
        {color:'#f87171',label:'To be removed'},
      ];

      let nodes=[], ptr1=-1, ptr2=-1, done=false, steps=0, result=[], state={}, hasCycle=false;

      function rebuild(){
        const n=getParam('n');
        nodes=Array.from({length:n},(_,i)=>({val:Math.floor(Math.random()*90)+5,state:'default',next:i+1<n?i+1:-1}));
        ptr1=0; ptr2=0; done=false; steps=0; result=[]; state={slow:0,fast:0,prev:-1,i:0}; hasCycle=false;

        if(alg==='is_cyclic'||alg==='first_cyclic_node'){
          // optionally create cycle
          if(Math.random()>.4){ hasCycle=true; nodes[n-1].next=Math.floor(n/2); }
        }
      }

      function step(){
        if(done) return false;
        steps++;

        if(alg==='reverse'){
          let {prev,curr,i}=state;
          if(curr===undefined){state={prev:-1,curr:0,i:0};}
          const {curr:c}=state;
          if(c===-1||c>=nodes.length){done=true;result=[];let h=state.prev; while(h>=0&&h<nodes.length){result.push(h);h=nodes[h].origNext||nodes[h].next>h?-1:nodes[h].next;}return false;}
          nodes[c].state='active'; ptr1=c;
          const origNext=nodes[c].next; nodes[c].origNext=origNext;
          nodes[c].next=state.prev; nodes[c].state='visited';
          state.prev=c; state.curr=origNext; state.i++;
          result=[state.prev];
          return true;
        }

        if(alg==='is_cyclic'||alg==='first_cyclic_node'){
          let {slow,fast}=state;
          if(fast===-1||!hasCycle||(nodes[fast]?.next===-1&&!hasCycle)){done=true;return false;}
          ptr1=slow; ptr2=fast;
          if (nodes[slow]) nodes[slow].state='slow';
          if (nodes[fast]) nodes[fast].state='fast';
          const ns=nodes[slow]?.next>=0?nodes[slow].next:-1;
          const nf=nodes[fast]?.next>=0?(nodes[nodes[fast].next]?.next>=0?nodes[nodes[fast].next].next:-1):-1;
          state.slow=ns>=0?ns:0; state.fast=nf>=0?nf:0;
          if(hasCycle&&state.slow===state.fast){done=true;}
          if(steps>nodes.length*3) done=true;
          return !done;
        }

        if(alg==='is_palindrome'||alg==='kth_to_last'){
          if(state.i<nodes.length){ ptr1=state.i; ptr2=Math.max(0,nodes.length-1-state.i); nodes[ptr1].state='active'; nodes[ptr2].state='active'; state.i++; if(state.i>=Math.floor(nodes.length/2))done=true; } else done=true;
          return !done;
        }

        if(alg==='merge_two_list'){
          if(!state.listB){ state.listB=Array.from({length:Math.ceil(nodes.length/2)},()=>Math.floor(Math.random()*90)+5).sort((a,b)=>a-b); state.listBIdx=0; nodes=nodes.slice(0,Math.ceil(nodes.length/2)).sort((a,b)=>a.val-b.val); }
          if(state.i<nodes.length||state.listBIdx<state.listB.length){
            const av=state.i<nodes.length?nodes[state.i].val:Infinity;
            const bv=state.listBIdx<state.listB.length?state.listB[state.listBIdx]:Infinity;
            if(av<=bv){nodes[state.i].state='visited';ptr1=state.i;state.i++;}
            else{result.push({val:bv});state.listBIdx++;}
          } else done=true;
          return !done;
        }

        // generic traverse
        if(state.i<nodes.length){ ptr1=state.i; nodes[state.i].state='visited'; state.i++; } else done=true;
        return !done;
      }

      function draw(ctx, W, H, C){
        const n=nodes.length;
        const boxW=Math.max(40,Math.min(65,(W-32)/(n+0.5))), boxH=40, gap=Math.max(8,Math.min(24,(W-32)/n-boxW));
        const totalW=n*(boxW+gap)-gap, startX=(W-totalW)/2, y=H/2-boxH/2;

        // draw connections
        nodes.forEach((nd,i)=>{
          if(nd.next<0) return;
          const x1=startX+i*(boxW+gap)+boxW, y1=y+boxH/2;
          const x2=startX+nd.next*(boxW+gap), y2=y+boxH/2;
          const isCycle=nd.next<i;

          ctx.strokeStyle = isCycle?C.red:C.edge;
          ctx.lineWidth=isCycle?2:1;
          if(isCycle){
            // draw arc below
            ctx.beginPath();
            ctx.arc((x1+x2)/2, y+boxH+20, Math.abs(x2-x1)/2, 0, Math.PI, false);
            ctx.stroke();
          } else {
            ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2-4,y2); ctx.stroke();
            // arrowhead
            ctx.fillStyle=C.edge;
            ctx.beginPath(); ctx.moveTo(x2-2,y2); ctx.lineTo(x2-8,y2-4); ctx.lineTo(x2-8,y2+4); ctx.fill();
          }
        });

        // draw boxes
        nodes.forEach((nd,i)=>{
          const x=startX+i*(boxW+gap);
          let bg=C.nodeDefault, border=C.nodeBorder;
          if(nd.state==='visited'){bg=C.done+'33';border=C.done;}
          if(nd.state==='active'||i===ptr1){bg=C.hi+'33';border=C.hi;}
          if(i===ptr2&&ptr2!==ptr1){bg=C.warn+'33';border=C.warn;}
          if(nd.state==='slow'){bg=C.hi+'33';border=C.hi;}
          if(nd.state==='fast'){bg=C.warn+'33';border=C.warn;}

          ctx.fillStyle=bg; ctx.strokeStyle=border; ctx.lineWidth=2;
          ctx.beginPath(); ctx.roundRect(x,y,boxW,boxH,[6]); ctx.fill(); ctx.stroke();

          ctx.fillStyle=C.txt; ctx.font=`bold ${monoFont(13)}`; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(nd.val, x+boxW/2, y+boxH/2); ctx.textBaseline='alphabetic';

          // pointer labels
          if(i===ptr1){ ctx.fillStyle=C.hi; ctx.font=monoFont(9); ctx.textAlign='center'; ctx.fillText(alg==='is_cyclic'?'slow':'ptr', x+boxW/2, y-8); }
          if(i===ptr2&&ptr2!==ptr1){ ctx.fillStyle=C.warn; ctx.font=monoFont(9); ctx.textAlign='center'; ctx.fillText('fast', x+boxW/2, y-8); }
        });

        // result / state info
        if(done){
          ctx.fillStyle=C.done; ctx.font=monoFont(11); ctx.textAlign='center';
          if(alg==='is_cyclic') ctx.fillText(hasCycle?'Cycle detected!':'No cycle found', W/2, H-12);
          else ctx.fillText('Done', W/2, H-12);
        }
      }

      function getStats(){ return [{k:'steps',v:steps},{k:'ptr1',v:ptr1}]; }
      function getLabel(){ return done?'Complete':alg==='is_cyclic'?`Slow:${ptr1} Fast:${ptr2}`:`Visiting node ${ptr1}`; }
      function snapshot(){ return {nodes:JSON.parse(JSON.stringify(nodes)),ptr1,ptr2,done,steps,result:[...result],state:JSON.parse(JSON.stringify(state)),hasCycle}; }
      function restore(s){ nodes=JSON.parse(JSON.stringify(s.nodes));ptr1=s.ptr1;ptr2=s.ptr2;done=s.done;steps=s.steps;result=[...s.result];state=JSON.parse(JSON.stringify(s.state));hasCycle=s.hasCycle; }
      return {rebuild,step,draw,getStats,getLabel,snapshot,restore,get done(){return done;}};
    }

    // ─────────────────────────────────────────────
    // DYNAMIC PROGRAMMING VISUALIZER
    // ─────────────────────────────────────────────
    function buildDPVis(alg){
      visParams.value = [{id:'n',label:'N',type:'range',min:4,max:16,step:1,value:10}];
      visLegend.value = [
        {color:'#38bdf8',label:'Current cell'},
        {color:'#4ade80',label:'Computed'},
        {color:'#fbbf24',label:'Dependencies'},
        {color:'#484f58',label:'Not yet computed'},
      ];

      let dp=[], n=10, current=-1, deps=[], done=false, steps=0, is2D=false;
      let dp2=[], input=[], coins=[], str1='', str2='';

      function rebuild(){
        n=getParam('n'); 
        dp=[]; deps=[]; current=-1; done=false; steps=0; is2D=false;

        if(alg==='fibonacci'||alg==='climbing_stairs'){
          dp=new Array(n+1).fill(0); 
          dp[0]=alg==='fibonacci'?0:1; 
          dp[1]=1;
          current=2;
        } else if(alg==='coin_change'){
          coins=[1,3,5]; 
          dp=new Array(n+1).fill(Infinity); 
          dp[0]=0; 
          current=1;
        } else if(alg==='max_subarray'){
          input=Array.from({length:n},()=>Math.floor(Math.random()*20)-7);
          dp=new Array(n).fill(0); 
          dp[0]=input[0]; 
          current=1;
        } else if(alg==='longest_increasing'){
          input=Array.from({length:n},(_,i)=>Math.floor(Math.random()*30)+i);
          input=input.sort(()=>Math.random()-.5);
          dp=new Array(n).fill(1); 
          current=1;
        } else if(alg==='buy_sell_stock'){
          input=Array.from({length:n},()=>Math.floor(Math.random()*80)+20);
          dp=new Array(n).fill(0); 
          current=1;
        } else if(alg==='edit_distance'||alg==='longest_common_subsequence'){
          is2D=true;
          str1=Array.from({length:Math.min(6,n>0?n:6)},()=>'abcde'[Math.floor(Math.random()*5)]).join('');
          str2=Array.from({length:Math.min(6,n>0?n:6)},()=>'abcde'[Math.floor(Math.random()*5)]).join('');
          dp2=Array.from({length:str1.length+1},(_,i)=>Array.from({length:str2.length+1},(_,j)=>{
            if(i===0)return j; if(j===0)return i; return 0;
          }));
          current=0; // [i,j] as i*(len+1)+j
        } else {
          dp=new Array(n+1).fill(0); 
          current=1;
        }
      }

      function step(){
        if(done) return false;
        steps++;

        if(is2D){
          const m=str1.length, nn2=str2.length;
          let i=Math.floor(current/(nn2+1)), j=current%(nn2+1);
          if(i>m){done=true;return false;}
          if(i>0&&j>0){
            if(alg==='edit_distance'){
              if(str1[i-1]===str2[j-1]) dp2[i][j]=dp2[i-1][j-1];
              else dp2[i][j]=1+Math.min(dp2[i-1][j],dp2[i][j-1],dp2[i-1][j-1]);
            } else {
              dp2[i][j]=str1[i-1]===str2[j-1]?dp2[i-1][j-1]+1:Math.max(dp2[i-1][j],dp2[i][j-1]);
            }
            deps=[[i-1,j],[i,j-1],[i-1,j-1]];
          }
          current++; 
          i=Math.floor(current/(nn2+1)); 
          j=current%(nn2+1);
          if(i>m) done=true;
          return !done;
        }

        if(alg==='fibonacci'){
          if(current>n){done=true;return false;}
          deps=[current-1,current-2]; 
          dp[current]=dp[current-1]+dp[current-2]; 
          current++;
          if(current>n) done=true;
        } else if(alg==='climbing_stairs'){
          if(current>n){done=true;return false;}
          deps=[current-1,current-2]; 
          dp[current]=(dp[current-1]||0)+(dp[current-2]||0); 
          current++;
          if(current>n) done=true;
        } else if(alg==='coin_change'){
          if(current>n){done=true;return false;}
          deps=[]; 
          coins.forEach(c=>{if(current-c>=0&&dp[current-c]!==Infinity){deps.push(current-c);const nc=dp[current-c]+1;if(nc<dp[current])dp[current]=nc;}});
          current++;
          if(current>n) done=true;
        } else if(alg==='max_subarray'){
          if(current>=n){done=true;return false;}
          deps=[current-1]; 
          dp[current]=Math.max(input[current],dp[current-1]+input[current]); 
          current++;
          if(current>=n) done=true;
        } else if(alg==='longest_increasing'){
          if(current>=n){done=true;return false;}
          deps=[]; 
          for(let j=0;j<current;j++){if(input[j]<input[current]){deps.push(j);dp[current]=Math.max(dp[current],dp[j]+1);}} 
          current++;
          if(current>=n) done=true;
        } else if(alg==='buy_sell_stock'){
          if(current>=n){done=true;return false;}
          const minSoFar=Math.min(...input.slice(0,current));
          dp[current]=Math.max(dp[current-1],input[current]-minSoFar); 
          current++;
          if(current>=n) done=true;
        } else {
          if(current>n){done=true;return false;}
          dp[current]=dp[current-1]+current; 
          deps=[current-1]; 
          current++;
          if(current>n) done=true;
        }
        return !done;
      }

      function draw(ctx, W, H, C){
        if(is2D){
          // 2D table
          const m=str1.length, nn2=str2.length;
          const cellW=Math.min(50,Math.floor((W-60)/(nn2+2))), cellH=Math.min(40,Math.floor((H-60)/(m+2)));
          const ox=40, oy=30;
          const ci=Math.floor(current/(nn2+1)), cj=current%(nn2+1);

          // headers
          ctx.fillStyle=C.txt2; ctx.font=monoFont(11); ctx.textAlign='center';
          ctx.fillText('', ox, oy-6);
          for(let j=0;j<=nn2;j++) ctx.fillText(j===0?'':(str2[j-1]||''), ox+(j+1)*cellW+cellW/2, oy-6);
          for(let i=0;i<=m;i++) ctx.fillText(i===0?'':(str1[i-1]||''), ox-8, oy+(i+1)*cellH+cellH/2+4);

          for(let i=0;i<=m;i++) for(let j=0;j<=nn2;j++){
            const x=ox+(j+1)*cellW, y=oy+(i+1)*cellH;
            const isC=i===ci&&j===cj, isDep=deps.some(d=>d[0]===i&&d[1]===j), isDone=(i<ci||(i===ci&&j<cj));
            ctx.fillStyle=isC?C.hi:isDep?C.warn:isDone?C.done+'44':C.bg3;
            ctx.strokeStyle=C.border; ctx.lineWidth=1;
            ctx.beginPath(); ctx.rect(x,y,cellW,cellH); ctx.fill(); ctx.stroke();
            ctx.fillStyle=isC?C.nodeHiTxt:C.txt; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(dp2[i]?.[j]??'', x+cellW/2, y+cellH/2); ctx.textBaseline='alphabetic';
          }
          ctx.fillStyle=C.txt2; ctx.font=monoFont(10); ctx.textAlign='center';
          ctx.fillText(`"${str1}" → "${str2}"  result=${dp2[m]?.[nn2]??'?'}`, W/2, H-8);
          return;
        }

        // 1D table
        const tableArr = input.length ? input : dp;
        const cellW=Math.min(50,Math.floor((W-32)/(n+1))), cellH=44, ox=16, oy=Math.floor((H-cellH*2-30)/2);

        // Input row (if applicable)
        if(input.length){
          ctx.fillStyle=C.txt3; ctx.font=monoFont(9); ctx.textAlign='right';
          ctx.fillText('input:', ox-2, oy+cellH/2+4);
          input.forEach((v,i)=>{
            const x=ox+i*cellW;
            ctx.fillStyle=i<current?C.done+'44':C.bg3;
            ctx.strokeStyle=C.border; ctx.lineWidth=1;
            ctx.beginPath(); ctx.rect(x,oy,cellW,cellH); ctx.fill(); ctx.stroke();
            ctx.fillStyle=C.txt; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.font=monoFont(12); ctx.fillText(v, x+cellW/2, oy+cellH/2); ctx.textBaseline='alphabetic';
          });
        }

        // DP row
        const dpy=input.length?oy+cellH+12:oy;
        ctx.fillStyle=C.txt3; ctx.font=monoFont(9); ctx.textAlign='right';
        ctx.fillText('dp:', ox-2, dpy + cellH/2 + 4);

        dp.forEach((v,i)=>{
          const x=ox+i*cellW;
          const isCur = i===current;
          const isDone = i<current;
          ctx.fillStyle = isCur ? C.hi : isDone ? C.done+'44' : C.bg3;
          ctx.strokeStyle = C.border;
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.rect(x,dpy,cellW,cellH); ctx.fill(); ctx.stroke();

          ctx.fillStyle = isCur ? C.nodeHiTxt : C.txt;
          ctx.font = monoFont(12); ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(v===Infinity?'∞':v, x+cellW/2, dpy+cellH/2);
          ctx.textBaseline='alphabetic';
        });

        ctx.fillStyle=C.txt2; ctx.font=monoFont(10); ctx.textAlign='center';
        ctx.fillText(fmt(alg) + (input.length ? ` max= ${Math.max(...dp)}` : ` result= ${dp[n]}`), W/2, H-12);
      }

      function getStats(){ return [{k:'steps',v:steps},{k:'n',v:n},{k:'result',v:dp[n]??'?'}]; }
      function getLabel(){ return done 
        ? `Done — result = ${dp[n] ?? dp2?.[str1.length]?.[str2.length] ?? '?'}`
        : `Computing dp[${current}]…`; }
      function snapshot(){ return {dp:[...dp],current,done,steps,is2D,dp2:JSON.parse(JSON.stringify(dp2||[])),input:[...(input||[])],str1,str2}; }
      function restore(s){ dp=s.dp; current=s.current; done=s.done; steps=s.steps; is2D=s.is2D; dp2=s.dp2; input=s.input; str1=s.str1; str2=s.str2; }

      return {rebuild,step,draw,getStats,getLabel,snapshot,restore,get done(){return done;}};
    }

    // ─────────────────────────────────────────────
    // STUB VISUALIZERS FOR REMAINING CATEGORIES
    // ─────────────────────────────────────────────
    function buildArrayVis(alg){ return buildGenericVis('Array', alg); }
    function buildMatrixVis(alg){ return buildGenericVis('Matrix', alg); }
    function buildStringVis(alg){ return buildGenericVis('String', alg); }
    function buildBitVis(alg){ return buildGenericVis('Bit Manipulation', alg); }
    function buildBacktrackVis(alg){ return buildGenericVis('Backtracking', alg); }
    function buildMathVis(alg){ return buildGenericVis('Math', alg); }
    function buildHeapVis(alg){ return buildGenericVis('Heap', alg); }
    function buildCompressionVis(alg){ return buildGenericVis('Compression', alg); }
    function buildMapVis(alg){ return buildGenericVis('Map', alg); }
    function buildGreedyVis(alg){ return buildGenericVis('Greedy', alg); }
    function buildStackVis(alg){ return buildGenericVis('Stack', alg); }
    function buildQueueVis(alg){ return buildGenericVis('Queue', alg); }

    // ─── GENERIC FALLBACK VISUALIZER ───
    function buildGenericVis(cat, alg){
      visParams.value = [{id:'n',label:'Size',type:'range',min:5,max:30,step:1,value:12}];
      visLegend.value = [{color:'#38bdf8',label:'Processing'},{color:'#4ade80',label:'Done'}];

      let data = [], stepIdx = 0, done = false;

      function rebuild(){
        const n = getParam('n')||12;
        data = Array.from({length:n},(_,i)=>({val:i+1, state:'pending'}));
        stepIdx = 0; done = false;
      }

      function step(){
        if(done) return false;
        if(stepIdx < data.length){
          data[stepIdx].state = 'done';
          stepIdx++;
        } else done = true;
        return !done;
      }

      function draw(ctx, W, H, C){
        const n = data.length;
        const sz = Math.min(28, (W-40)/n);
        const baseY = H-60;
        data.forEach((d,i)=>{
          const x = 20 + i*sz*1.1;
          const h = 30 + d.val*3;
          ctx.fillStyle = d.state==='done' ? C.done : C.bar;
          ctx.fillRect(x, baseY-h, sz, h);
          ctx.fillStyle = C.txt3;
          ctx.font = monoFont(9);
          ctx.textAlign = 'center';
          ctx.fillText(d.val, x+sz/2, baseY+18);
        });
        ctx.fillStyle = C.txt2; ctx.font = monoFont(11);
        ctx.fillText(`${fmt(cat)} • ${fmt(alg)}`, 20, 28);
      }

      function getStats(){ return [{k:'processed',v:stepIdx+'/'+data.length}]; }
      function getLabel(){ return done ? 'Complete' : `Step ${stepIdx}/${data.length}`; }
      function snapshot(){ return {data:JSON.parse(JSON.stringify(data)),stepIdx,done}; }
      function restore(s){ data=s.data; stepIdx=s.stepIdx; done=s.done; }

      return {rebuild,step,draw,getStats,getLabel,snapshot,restore,get done(){return done;}};
    }

    // ═══════════════════════════════════════════════
    // APP MOUNT + EVENT LISTENERS
    // ═══════════════════════════════════════════════
    onMounted(() => {
      // initial expand first category
      const firstCat = Object.keys(filtered.value)[0] || 'Sorting';
      ex[firstCat] = true;

      // set initial theme
      setTheme(theme.value);

      // keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if(!selAlg.value) return;
        if(e.key === 'ArrowRight') {
          e.preventDefault();
          stepFwd();
        }
        if(e.key === 'ArrowLeft') {
          e.preventDefault();
          stepBack();
        }
        if(e.key === ' ') { 
          e.preventDefault(); 
          togglePlay(); 
        }
        if(e.key === 'r' && (e.metaKey || e.ctrlKey)) { 
          e.preventDefault(); 
          restart(); 
        }
      });

      // resize observer for canvas
      const canvasOuter = document.querySelector('.cvs-outer');
      if (canvasOuter) {
        resizeObserver = new ResizeObserver(() => { 
          if(selAlg.value && cvs.value) { 
            initCanvas(); 
            draw(); 
          } 
        });
        resizeObserver.observe(canvasOuter);
      }
    });

    // Cleanup on unmount
    onMounted(() => {
      return () => {
        stopAnim();
        if (resizeObserver) {
          resizeObserver.disconnect();
        }
      };
    });

    return {
      theme, drawerOpen, q, ex, selCat, selAlg, tab, code, speed, playing,
      cvs, searchInp, sbScroll, sidebarEl, histIdx, visParams, visLegend,
      visStats, visStateLabel, canvasH, filtered, info,

      toggleCat, expandAll, collapseAll, onSearch, onSbScroll,
      pick, setTheme, onParamChange,

      restart, stepBack, stepFwd, togglePlay,

      // expose for template
      fmt,
    };
  }
});

app.mount('#app');
</script>
</body>
